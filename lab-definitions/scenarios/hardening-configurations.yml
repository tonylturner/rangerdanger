id: hardening-configurations
order: "2.3"
name: "Protocol-Hardened Configurations"
summary: "Stress-test your firewall against the canonical distribution-substation attack: a DNP3 Direct Operate injection that disables auto-reclose and trips the recloser from an unauthorized source. Defense in depth via L4 source-pin + ICS DPI is the lesson. Modbus FC5/FC6 variants available as optional sidebars (15 min)."
description: >
  In Lab 2.2 you built a least-privilege firewall policy. This
  exercise stress-tests it against a DNP3 Direct Operate (FC05)
  injection against the recloser — the canonical attack vector in a
  real distribution substation, where DNP3 is the dominant SCADA
  protocol on every protective relay, recloser, regulator, and
  capbank controller (SEL, GE Multilin, S&C, Cooper, Beckwith, et al.).

  The attacker, sitting on Kali in the enterprise zone, sends a
  Direct Operate CROB to flip the recloser's `reclose_enabled` bit
  off, then trips the recloser. Without auto-reclose, what should
  be a brief flicker becomes a sustained outage — every load
  downstream of the recloser (hospital, fire station, customers)
  goes dark, with kinetic impact measured by the OpenDSS power-flow
  solver and surfaced on the Feeder HMI.

  Under the weak baseline this succeeds. Under the hardened policy
  it should fail, blocked by either L4 source-pinning at the
  perimeter (only the RTAC at `10.30.30.20` can reach field on
  DNP3 20000) or ICS DPI (Direct Operate restricted to the RTAC
  even on flows where reads are allowed) — the two layers are
  defense in depth, and re-test shows either one is sufficient.

  Modbus FC6 (regulator tap override) and Modbus FC5 (direct
  breaker trip) are available as optional sidebar attacks within
  the same step. Modbus is real on these device classes (mostly
  for HMI integration) and the DPI lesson generalizes; the
  sidebars exist for instructors who want to demonstrate "the
  same defense closes both protocols" or for cyber-fluent students
  who finish the primary attack early.
nodes:
  - kali-1
tags:
  - dpi
  - dnp3
  - segmentation
  - hardening
  - modbus
steps:
  - title: "Verify normal operations"
    expected_config: weak
    node: rtac-1
    description: |
      Confirm the substation is healthy under the weak baseline:

      - Breaker closed, recloser closed, auto-reclose enabled
      - Regulator in auto, tap near 0
      - Critical-load voltage in ANSI C84.1 Range A (114–126V)

      Read the RTAC's aggregated state via Modbus from the RTAC's own
      terminal. The RTAC re-exposes every field device's state as a
      unified Modbus holding-register view, so a single read captures
      the whole substation:

          mbpoll -a 1 -t 4 -r 1 -c 5 10.30.30.20

      Expected: `[0]=1` (breaker closed), `[1]=1` (recloser closed),
      `[2]=1` (auto-reclose enabled), `[3]≈0` (regulator tap),
      `[4]=0` (regulator auto mode).

          mbpoll -a 1 -t 3 -r 1 -c 6 10.30.30.20

      Analog measurements (FC4, x10 scaling): `[0]≈1200` (substation
      bus 120V), `[1]≈1200` (downstream 120V), `[2]≈1240`
      (critical-load 124V), `[3]≈360` (feeder current 36A).

      :::hint Cyber → state → physics has a ~2–3s lag
      Every protocol write you'll send mutates the field-device sim's
      state immediately, but the *electrical* impact (voltages,
      energization, feeder currents) only updates after the RTAC
      polls field devices (every 2 seconds) and pushes the
      aggregated state to the OpenDSS solver. If you read RTAC tags
      *immediately* after an attack, you may see the device state
      change but not the kinetic outcome yet. Wait 3 seconds, then
      re-read.
      :::

      **Time budget:** 15 minutes.
    action:
      type: check
      expect:
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true
        voltage_normal: true

  - title: "Attack — DNP3 Direct Operate injection against the recloser"
    expected_config: weak
    node: kali-1
    description: |
      From Kali (`10.10.10.50`, enterprise zone), under the weak
      baseline, send a DNP3 Direct Operate (FC05) to the recloser
      (`10.40.40.21`, DNP3 outstation address 2). Two CROB writes:
      first disable auto-reclose, then trip the recloser. Without
      auto-reclose, the trip becomes a sustained outage instead of
      a recoverable flicker.

      The CROB (Control Relay Output Block) targets binary outputs.
      Index 1 on the recloser maps to `reclose_enabled`. Index 0
      maps to `closed`:

          dnp3cmd 10.40.40.21:20000 -a 2 crob 1 latch-off
          dnp3cmd 10.40.40.21:20000 -a 2 crob 0 trip

      > **Background:** CROB (Control Relay Output Block) is DNP3's
      > primary command verb — see [DNP3 in Substations](/knowledge#dnp3)
      > if op codes like `latch-off` and `trip` are new. It also
      > covers why Direct Operate (FC05) is the function code that
      > matters for write restrictions, and why every modern
      > recloser controller (G&W, S&C, NOJA, Cooper, ABB) exposes a
      > DNP3 outstation like this one. The defense-in-depth pattern
      > the next steps demonstrate is covered in
      > [What is ICS DPI?](/knowledge#ics-dpi).

      Wait ~3 seconds for the RTAC's 2-second poll → OpenDSS push to
      land, then confirm the downstream de-energization from the
      RTAC's terminal:

          mbpoll -a 1 -t 4 -r 1 -c 5 10.30.30.20

      Holding register 1 reads `0` (recloser_closed=false) and
      register 2 reads `0` (reclose_enabled=false).

          mbpoll -a 1 -t 3 -r 1 -c 6 10.30.30.20

      Input register 1 (`downstream_voltage_v × 10`) and register 3
      (`feeder_current_a × 10`) both read `0` — the loads
      downstream of the recloser are unenergized. Hospital and fire
      station are dark. The substation bus (input register 0) is
      still energized at the source side because the substation
      breaker is still closed — only the downstream feeder lost
      power.

      **Why it worked:** the weak baseline allows enterprise → field
      DNP3 20000 with no source pinning and no DPI. There's
      nothing to distinguish a Direct Operate (FC05) from a benign
      read (FC01) — they ride on the same TCP port.

      ### Operational consequence at the HMI

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. The breaker is still closed (substation bus energized)
      but everything past the recloser is dark:

      - **Alarm banner:** "RECLOSER OPEN — downstream loads lost"
        and "AUTO-RECLOSE DISABLED — no fault recovery"
      - **General Load** reads "NO POWER" (red)
      - **Critical Load** reads "NO POWER" (red) — *"Hospital and
        fire station without power"* shows in red beneath
      - **Customer-service tile:** "ALL CUSTOMERS WITHOUT POWER"

      The attacker didn't have to trip the substation breaker to
      cause an outage — disabling auto-reclose and tripping the
      recloser had the same effect for everyone downstream.

      :::decision id=attack-hmi-impact options=DOWNSTREAM_OUTAGE,LOW_VOLTAGE_ALARM,FEEDER_OUTAGE,NO_ALARM correct=DOWNSTREAM_OUTAGE
      **What alarm did the Feeder One-Line tab show after this attack?**
      :::

      :::hint Optional: try the same attack via Modbus
      DNP3 is the dominant SCADA protocol on these field devices, but
      Modbus is also present on most installed gear (primarily for
      HMI integration). The same DPI defense closes both protocols,
      and the Modbus variants are pedagogically useful if you want
      to show that "function-code filtering" generalizes across
      protocols. Two optional Modbus attacks:

      **Modbus FC6 — regulator tap override.** From Kali:

          mbpoll -a 1 -t 4 -r 1 10.40.40.22 -- 65520

      `65520` is `-16` as an unsigned 16-bit (two's complement).
      Forces the regulator tap to the minimum position, dropping
      critical-load voltage below ANSI Range A. Wait 3 s, read the
      RTAC analog tags — input register 2 (`critical_load_voltage_v
      × 10`) drops below 1140. HMI shows the **LOW VOLTAGE**
      alarm banner; customers still have power but at unsafe voltage.

      **Modbus FC5 — direct breaker trip.** From Kali:

          mbpoll -a 1 -t 0 -r 1 10.40.40.20 0

      Single write to relay coil 0 (`breaker_closed`). One packet,
      total feeder outage. HMI shows the **FEEDER BREAKER OPEN**
      alarm; entire feeder dark. This is the worst-case
      single-packet kinetic outcome in the lab.

      Both ride on TCP 502 — same DPI defense (function-code
      filtering, source-pinning at L4) closes both. The re-test
      step later covers the hardened-policy behavior for whichever
      of these you tried; if you only ran the primary DNP3 attack,
      the re-test step covers that one.
      :::
    action:
      type: sequence
      commands:
        - device: recloser
          command: disable_reclose
          source: "10.10.10.50"
        - device: recloser
          command: open
          source: "10.10.10.50"

  - title: "Restore the substation"
    expected_config: weak
    description: |
      Use the Supervisory Control tab in the [Feeder HMI](/substation)
      to reset the lab state, or click **Reset Lab** below. This
      restores every device touched by the primary attack and any
      optional sidebar attacks you ran:

      - Relay: clear fault, unlock, close substation breaker
      - Regulator: set to Auto, tap to 0
      - Recloser: clear fault, enable auto-reclose, reset lockout, close
    action:
      type: sequence
      commands:
        - device: relay
          command: clear_fault
          source: "operator"
        - device: relay
          command: unlock
          source: "operator"
        - device: relay
          command: close
          source: "operator"
        - device: regulator
          command: set_auto
          source: "operator"
        - device: regulator
          command: set_tap
          source: "operator"
          value: 0
        - device: recloser
          command: clear_fault
          source: "operator"
        - device: recloser
          command: enable_reclose
          source: "operator"
        - device: recloser
          command: reset_lockout
          source: "operator"
        - device: recloser
          command: close
          source: "operator"

  - title: "Apply the hardened policy"
    description: |
      Apply the hardened firewall configuration with **Apply Hardened**,
      or **Apply Your Plan** if you built a custom policy in Lab 2.2.

      The hardened policy combines two defense-in-depth layers:

      - **L4 source-pinning:** only the RTAC (`10.30.30.20`) can reach
        field devices on Modbus 502 and DNP3 20000. Enterprise and
        vendor sources are blocked at the perimeter — this alone
        closes the primary DNP3 attack and both Modbus sidebars.
      - **ICS DPI:** DNP3 Direct Operate (FC05) restricted to the
        RTAC; Modbus writes (FC5/6/16) restricted to the RTAC even
        on flows where reads are allowed. This catches the same
        attacks if the L4 source pin is ever loosened for
        monitoring access — e.g., letting the engineering
        workstation read RTAC tags would punch through L4, but
        DPI keeps "reads yes, writes no."

      Either layer alone breaks each attack. Together they're
      defense in depth — the re-test step demonstrates this with a
      decision question.

      :::plan-coverage title="Your plan vs the primary attack"
      :::

      If your Lab 1.4 plan didn't pin RTAC-to-field
      (`pin-rtac-to-field`) AND didn't add DNP3 DPI (`dnp3-dpi`),
      the re-test may still succeed under "Apply Your Plan" — that's
      the lab telling you the plan has a gap. Re-attempt with
      **Apply Hardened** to compare.
    action:
      type: firewall
      config: improved

  - title: "Re-test the attack under the hardened policy"
    expected_config: hardened
    node: kali-1
    description: |
      Repeat the DNP3 Direct Operate from Kali:

          dnp3cmd 10.40.40.21:20000 -a 2 crob 1 latch-off

      The connection should time out — containd's L4 source-pin
      blocks the packet at the perimeter before DPI even applies.
      Auto-reclose stays enabled, the recloser stays closed, the
      downstream feeder stays energized.

      Confirm via the RTAC tags that nothing changed:

          mbpoll -a 1 -t 4 -r 1 -c 5 10.30.30.20

      Holding registers 1 and 2 both read `1` (recloser_closed,
      reclose_enabled). The cross-zone DNP3 control surface is
      closed.

      ### Operational consequence at the HMI

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. The attack alarm chain you saw earlier is *absent*:

      - **No alarm banner** at the top
      - **Recloser (79)** still closed, **Auto-reclose ON** green badge
      - **General Load + Critical Load** both energized (green kW)
      - **Customer-service tile:** "N kW serving ~M customers"

      :::decision id=retest-hmi-state options=NORMAL_OPS,DOWNSTREAM_OUTAGE,UNCHANGED_FROM_ATTACK correct=NORMAL_OPS
      **What did the Feeder One-Line tab show after the re-test?**
      :::

      :::decision id=retest-defense-in-depth options=L4_SOURCE_PIN,DNP3_DPI,EITHER_LAYER correct=EITHER_LAYER
      **If the L4 source pin were loosened (e.g., to allow engineering
      workstation monitoring), would the DNP3 Direct Operate restriction
      still block this attack?**
      :::

      :::hint Optional: confirm Modbus is blocked too
      If you ran either of the Modbus sidebar attacks in Step 2,
      repeat them now under the hardened policy — both also time
      out at the L4 perimeter. The same source-pin rule that
      blocked DNP3 above (only `10.30.30.20`/RTAC can reach field
      on TCP/502) closes both Modbus attacks:

          mbpoll -a 1 -t 4 -r 1 10.40.40.22 -- 65520   # FC6 regulator tap
          mbpoll -a 1 -t 0 -r 1 10.40.40.20 0          # FC5 breaker trip

      Both should time out. Confirm via the RTAC tags:

          mbpoll -a 1 -t 4 -r 1 -c 5 10.30.30.20

      `[0]=1` (breaker still closed), `[3]≈0` (regulator tap
      unchanged). One rule, three attack paths neutralized.

      DPI gives you the same defense if the L4 pin ever has to
      loosen — for example to allow eng-ws read-only access. DPI
      can say *"reads yes, writes no"*; port-only filtering can't.
      :::
    action:
      type: command
      device: recloser
      command: disable_reclose
      source: "10.10.10.50"

  - title: "Validate"
    expected_config: hardened
    description: |
      Confirm the attack was blocked, the substation is healthy,
      and the hardened firewall policy is active.

      The cross-zone DNP3 control surface is closed. Lab 2.4 takes
      this further with a holistic positive/negative test pass
      across the full zone-pair matrix and a change-board-ready
      evidence package.
    action:
      type: check
      expect:
        voltage_normal: true
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true
        firewall_config: improved
