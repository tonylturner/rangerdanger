id: baseline-assessment
order: 0
name: "Baseline Traffic Analysis"
summary: "Capture cross-zone traffic at the firewall, identify the critical conduits your operations depend on, and define what good segmentation would look like."
description: >
  Before you can segment a substation network, you need to
  understand two things: what traffic actually exists between
  zones, and which of those flows are required for normal
  operations. In this exercise you'll capture live traffic at
  the firewall, use it to identify the critical conduits
  operations depends on, and frame concrete success criteria
  for segmentation — without building diagrams or matrices.
nodes:
  - fw-1
  - eng-ws-1
tags:
  - assessment
  - pcap
  - baseline
  - defense
steps:
  - title: "Review the substation topology"
    description: >
      Open the [Network Map](/console) and identify the four
      network zones:

        Enterprise  (10.10.10.0/24): corp-ws, kali
        Vendor/DMZ  (10.20.20.0/24): vendor-jump, eng-ws
        OT Ops      (10.30.30.0/24): fuxa-hmi, rtac, openplc, historian, gps
        Field       (10.40.40.0/24): relay, recloser, regulator, capbank

      The containd firewall sits between all four zones and
      acts as the default gateway. Any traffic crossing a zone
      boundary passes through it — that is where we capture.

      Key architectural detail: the RTAC is multi-homed on
      both OT Ops (10.30.30.20) and Field (10.40.40.10). Its
      direct polling of field devices stays on the field
      subnet and does NOT transit the firewall. Remember this
      — it matters when you evaluate segmentation coverage.
    action:
      type: check
      expect:
        breaker_closed: true

  - title: "Generate representative traffic"
    description: >
      Start the traffic generator so we have realistic
      cross-zone flows to capture. This simulates an
      operating substation: HMI polling, historian reads,
      vendor monitoring access, and GPS time sync.

        curl -X POST http://localhost:8088/api/traffic/generate \
          -H 'Content-Type: application/json' \
          -d '{"duration_sec":50}'

      Leave the generator running — we start the capture next.

  - title: "Capture traffic at the firewall"
    node: fw-1
    description: >
      Open the firewall terminal below (or fw-1 on the
      [Network Map](/console)). The firewall runs a Linux
      shell with tcpdump. Start a 60-second capture on all
      interfaces:

        tcpdump -i any -w /data/captures/baseline.pcap -G 60 -W 1

      Wait for tcpdump to print its packet count and exit.
      The promiscuous-mode warning on the "any" device is
      normal and can be ignored.

  - title: "Analyze cross-zone flows"
    node: fw-1
    description: >
      Confirm the capture file, then run a handful of tcpdump
      queries to see what traffic actually crosses zones.

      File present, packet count non-zero:

        ls -lh /data/captures/baseline.pcap
        tcpdump -r /data/captures/baseline.pcap -nn -q 2>&1 | grep -c "IP "

      Build a deduplicated list of every unique src→dst flow
      observed at the firewall. This is your flow inventory —
      you will use it to answer the next step:

        tcpdump -r /data/captures/baseline.pcap -nn -q 2>&1 | awk '/IP / { sub(/:$/,"",$5); sub(/:$/,"",$7); print $5" -> "$7 }' | sort | uniq -c | sort -rn | head -20

      Targeted filters to sanity-check what you see:

      Who in Vendor/DMZ is reaching into OT Operations?

        tcpdump -r /data/captures/baseline.pcap -nn 'src net 10.20.20.0/24' 2>&1 | head -15

      What leaves OT Operations heading for Field devices?

        tcpdump -r /data/captures/baseline.pcap -nn 'src net 10.30.30.0/24 and dst net 10.40.40.0/24' 2>&1 | head -15

      Is Enterprise speaking to OT or Field directly? (Should
      be empty in a healthy baseline.)

        tcpdump -r /data/captures/baseline.pcap -nn 'src net 10.10.10.0/24 and (dst net 10.30.30.0/24 or dst net 10.40.40.0/24)' 2>&1 | head -10

      Important: the firewall only sees traffic that actually
      crosses a zone boundary. Same-subnet flows — for example
      anything between two OT Ops hosts, or between the RTAC's
      field-side interface and a relay on field_net — never
      transit the firewall and will NOT appear in this capture.
      To discover those flows you have to ask the participants
      directly. Query the RTAC's state API from the engineering
      workstation to see which devices it is actively polling:

        curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool | head -40

      The device_comms and devices keys show every field device
      the RTAC is in contact with right now. That communication
      exists, is critical, and is invisible to your firewall.

  - title: "Critical conduits — what MUST flow"
    description: |
      Shift from "what traffic exists" to "what traffic is required for the substation to run."

      From the flow inventory you built with the aggregation command in the previous step, and from the RTAC state API output, identify the critical conduits — the flows this substation cannot lose without breaking operations.

      Answer three questions in your Exercise Notes:

        Q1. Which cross-zone flows did you see at the firewall that look operationally required?

        Q2. Which flows are NOT visible in the firewall capture but must exist for operations (look at the RTAC state API)?

        Q3. If the firewall allowed ONLY the required flows and denied everything else between zones, would the substation still run normally?

      Reason from the output you just produced. You do not need to build a matrix or diagram. If you get stuck, expand the hint below to see the expected answer.

      :::hint Reveal expected answer
      The five critical conduits in this substation are:

        1. HMI → RTAC
           Operator monitoring and supervisory reads.
           Visible in the RTAC API, NOT in the firewall capture (same-subnet within OT Ops).

        2. RTAC → field devices (Modbus / DNP3)
           Primary SCADA polling and control. This is the most important flow in the substation.
           Visible in the RTAC API state, NOT in the firewall capture (same-subnet on field_net because the RTAC is multi-homed).

        3. Historian → RTAC
           Read-only data collection for trending.
           NOT in the firewall capture (same-subnet within OT Ops).

        4. GPS → field devices (NTP)
           Time sync required for sequence-of-events timestamps.
           VISIBLE in the firewall capture as 10.30.30.50 → 10.40.40.x on port 123.

        5. Engineering workstation → RTAC / OpenPLC
           Maintenance and programming access from the vendor DMZ.
           VISIBLE in the firewall capture as 10.20.20.20 → 10.30.30.20:8080 and 10.20.20.20 → 10.30.30.30:8080.

      Answer to Q3: yes, operations would still run, because those five conduits cover all operational dependencies. Everything else you saw in the capture (corporate web, vendor HMI browsing, etc.) is not strictly required to keep the feeder energized and protected.

      Key insight: two of the most important flows (#2 and #3) are completely invisible to the firewall. The firewall is not the whole segmentation story — the RTAC's architecture is.
      :::

  - title: "Required vs risky — what you'd block"
    description: |
      Now look at the same traffic through a security lens. For each category below, decide: would you allow this in production, or is it exposure you'd block?

      Walk through each of these, referencing your flow inventory from step 4:

        [ ] Enterprise → Field on Modbus 502 or DNP3 20000 — legitimate operational flow, or ransomware/lateral-movement risk?

        [ ] Enterprise → OT Ops on any ICS port — does corporate IT need to speak control-plane?

        [ ] Vendor DMZ → OT Ops on Modbus or HMI control — should the vendor be able to write, or only read and monitor?

        [ ] Any non-RTAC OT Ops host → Field devices — should every OT host reach relays, or only the RTAC?

        [ ] Unauthorized Modbus writes / DNP3 Direct Operate — are these blocked and visible, or silent and allowed?

      Write your decisions into the Exercise Notes. These become the input to the next exercise. No matrix, no diagram — just the list of exposures you want to close.

      :::hint Reveal expected answer
      In a hardened substation, the answers are:

        1. Enterprise → Field on Modbus/DNP3: BLOCK.
           Corporate IT should never speak control-plane protocols to field devices. This is the attack path demonstrated in the DNP3 Command Injection exercise.

        2. Enterprise → OT Ops on ICS ports: BLOCK.
           Enterprise may reach OT only through constrained management paths, never on Modbus/DNP3. This closes the Modbus Override staging path.

        3. Vendor → OT Ops on Modbus/HMI control: RESTRICT.
           Vendor remote access should be read-only monitoring and encrypted management (HTTPS, SSH). Direct Modbus writes or HMI control from the vendor DMZ are the vector demonstrated in the Vendor RDP Compromise exercise.

        4. Non-RTAC OT Ops → Field: BLOCK.
           Only the RTAC (pinned to 10.40.40.10) should reach field devices. A compromised OpenPLC or historian must not become an attack path. This is the lateral movement vector in the Modbus Override exercise.

        5. Unauthorized Modbus writes / DNP3 Direct Operate: BLOCK and LOG.
           This requires ICS DPI — port-level filtering is not enough. The firewall needs to understand protocol function codes.
      :::

  - title: "Define success criteria for segmentation"
    description: >
      Before you start changing anything, write down what
      "good" looks like for this substation. These are
      concrete, testable statements — not a plan, not a
      matrix. You will use them in Exercise 6 to validate
      your changes worked.

      Good segmentation for this substation means:

        1. Enterprise cannot directly reach Field devices.
           Test: tcpdump on the firewall's field interface
           should show zero packets originating from 10.10.10.0/24.

        2. Vendor access to OT Ops is constrained and brokered.
           Test: vendor DMZ can reach the RTAC/HMI only on
           approved management ports, not on raw Modbus/DNP3.

        3. Unauthorized writes are blocked and logged.
           Test: a Modbus FC6 write or DNP3 Direct Operate
           from a non-RTAC source should be denied and produce
           a firewall event.

        4. Enterprise ransomware cannot propagate into OT.
           Test: SMB, RDP, and SSH from 10.10.10.0/24 to
           10.30.30.0/24 or 10.40.40.0/24 should be denied.

        5. Operations are not broken by the segmentation change.
           Test: after applying rules, all five critical
           conduits from the previous step continue to work.

      **If your segmentation blocks any of the critical
      conduits you identified earlier, you will break
      operations.** Operational continuity is a hard
      constraint on every decision you make from here.

  - title: "Transition — decide what to fix first"
    description: >
      You have now:

        - observed real traffic at the firewall
        - identified the five critical conduits operations
          depends on
        - listed the exposures you'd want to block
        - written concrete success criteria

      You cannot fix everything at once. Firewall work,
      protocol-aware DPI, architecture review, and validation
      testing all compete for the same limited team capacity.

      In the next exercise —
      [Remediation Planning](/exercises/remediation-planning) —
      you will choose which fixes to execute this quarter
      under a real labor budget with per-role capacity caps.
      Your decisions there will determine which attack paths
      remain open in later exercises.

      Before moving on, confirm the substation is still
      operating normally. This is your "known good" baseline —
      the state your segmentation must preserve.
    action:
      type: check
      expect:
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true
