id: baseline-assessment
order: 0
name: "Baseline Traffic Analysis"
summary: "Capture and analyze normal OT traffic to identify required communication flows before segmentation."
description: >
  Before you can segment a network, you need to know what traffic
  is legitimate and must be preserved. In this exercise you'll
  capture traffic at the firewall — the same chokepoint where you'd
  place a TAP or SPAN in a real environment — then analyze the PCAP
  to identify source-destination pairs, protocols, and the critical
  operational flows that segmentation must not break.
nodes:
  - fw-1
  - eng_workstation
  - kali
tags:
  - assessment
  - pcap
  - baseline
  - defense
steps:
  - title: "Review the substation topology"
    description: >
      Open the RangerDanger Network Map page. Identify the four
      network zones and the key devices in each:

        Enterprise (10.10.10.0/24): corp-ws, kali
        Vendor/DMZ (10.20.20.0/24): vendor-jump, eng-ws
        OT Operations (10.30.30.0/24): fuxa-hmi, rtac, openplc, historian, gps
        Field Devices (10.40.40.0/24): relay, recloser, regulator, capbank

      The containd firewall sits between all four zones. All
      inter-zone traffic passes through it — this is where we
      capture.
    action:
      type: check
      expect:
        breaker_closed: true

  - title: "Start a packet capture on the firewall"
    node: fw-1
    description: >
      Open the firewall terminal and start a 60-second capture
      on all interfaces. This is what you'd do with a TAP or
      SPAN port in a real substation:

        tcpdump -i any -w /data/captures/baseline.pcap -G 60 -W 1

      This writes to /data/captures/ which is shared with the
      engineering workstation at /home/abc/pcaps/.

      Alternatively, use the RangerDanger API:

        curl -X POST http://localhost:8088/api/pcap/start \
          -d '{"duration_sec":60,"name":"baseline"}'

  - title: "Generate representative traffic"
    description: >
      The lab needs traffic to capture. In a real environment,
      this traffic already exists — SCADA polling, HMI reads,
      historian collection. In the lab, we generate it:

        curl -X POST http://localhost:8088/api/traffic/generate \
          -d '{"duration_sec":45}'

      This produces ~23 realistic OT flows per cycle: RTAC
      polling field devices via Modbus and DNP3, HMI reading
      the RTAC, historian collecting data, GPS time sync, and
      some enterprise→OT traffic that shouldn't be there.

      Wait for the capture duration to complete.

  - title: "Verify the capture file"
    node: fw-1
    description: >
      Check that the capture file was created:

        ls -lh /data/captures/baseline.pcap

      Get a quick summary of what's in it:

        tcpdump -r /data/captures/baseline.pcap -q | head -20

      You should see traffic between the OT operations zone
      (10.30.30.x) and field devices (10.40.40.x) on ports
      502 (Modbus) and 20000 (DNP3).

  - title: "Analyze the capture on the engineering workstation"
    node: eng_workstation
    description: >
      Open the engineering workstation GUI (click the UI button
      for eng_workstation on the Network Map, or navigate to
      its webtop URL).

      The capture is available at /home/abc/pcaps/baseline.pcap.

      Option A — Open PCAP Analyzer (desktop shortcut):
      Load baseline.pcap. Review the Asset Summary and Protocol
      Breakdown to see all communicating devices and protocols.

      Option B — Use Wireshark (desktop shortcut):
      Open baseline.pcap. Apply display filter:

        modbus || dnp3 || tcp.port==20000

      Review the conversations (Statistics → Conversations →
      TCP tab) to see which IPs are talking to which.

      Option C — Use tshark from the terminal:

        tshark -r /home/abc/pcaps/baseline.pcap \
          -T fields -e ip.src -e ip.dst -e tcp.dstport \
          | sort | uniq -c | sort -rn | head -20

  - title: "Identify required communication flows"
    description: >
      From your analysis, document the communication flows that
      are required for normal substation operations. These are
      the flows that segmentation MUST preserve:

      Required flows to identify:
      - RTAC (10.30.30.20 / 10.40.40.10) → field devices on Modbus 502
      - RTAC → field devices on DNP3 20000
      - RTAC → OpenDSS physics engine on HTTP 8080
      - HMI (10.30.30.10) → RTAC on Modbus 502 and HTTP 8080
      - Historian (10.30.30.40) → RTAC on HTTP 8080
      - GPS (10.30.30.50) → field devices on NTP 123

      Suspicious flows to flag:
      - Enterprise (10.10.10.x) → field devices (should not exist)
      - Enterprise → OT operations (should be restricted)
      - Any direct non-RTAC → field device traffic

      Use the Notes field below to document your findings.
      These become the requirements for Exercise 1.

  - title: "Validate baseline state"
    description: >
      Confirm the substation is operating normally — all devices
      communicating, loads energized, protection active. This
      is the "known good" state that your segmentation rules
      must preserve.
    action:
      type: check
      expect:
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true
