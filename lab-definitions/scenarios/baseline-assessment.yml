id: baseline-assessment
order: "1.2"
name: "Baseline Traffic Analysis"
summary: "Capture cross-zone traffic at the firewall, identify the critical conduits your operations depend on, and define what good segmentation would look like (30 min)."
description: >
  Before you can segment a substation network, you need to
  understand two things: what traffic actually exists between
  zones, and which of those flows are required for normal
  operations. In this exercise you'll capture live traffic at
  the firewall, use it to identify the critical conduits
  operations depends on, and frame concrete success criteria
  for segmentation - without building diagrams or matrices.
nodes:
  - fw-1
  - eng-ws-1
tags:
  - assessment
  - pcap
  - baseline
  - defense
steps:
  - title: "Walk the topology and inspect the crossings"
    expected_config: weak
    description: |
      Open the [Network Map](/console). Before reading anything below,
      spend two minutes panning around the canvas — the goal of this
      step is to *recognize* the substation, not memorize a table.

      ### Find the four zones

      Four colored zone boundaries are drawn on the canvas. Each
      groups the hosts that live in that zone. Use the table as a
      reference if you need to confirm what you're looking at:

      | Zone | Subnet | Hosts you should see |
      |------|--------|----------------------|
      | **Enterprise** | `10.10.10.0/24` | corp-ws, kali |
      | **Vendor / DMZ** | `10.20.20.0/24` | vendor-jump, eng-ws |
      | **OT Ops** | `10.30.30.0/24` | fuxa-hmi, rtac, openplc, historian, gps |
      | **Field** | `10.40.40.0/24` | relay, recloser, regulator, capbank |

      The **containd firewall** sits between all four zones and acts
      as the default gateway. Any traffic crossing a zone boundary
      passes through it — that is where we capture and analyze
      communication in the next steps.

      ### Switch to the Purdue Model view

      In the canvas controls toggle **Purdue Model View**.
      The layout re-bands the same hosts into the standard Purdue
      architectural levels:

      - **Level 4 · Enterprise** — corporate IT (`10.10.10.0/24`)
      - **Level 3.5 · IDMZ** — vendor / engineering (`10.20.20.0/24`)
      - **Level 3 · Supervisory** — HMI / RTAC / historian (`10.30.30.0/24`)
      - **Level 1 · Field Devices** — relays / recloser / regulator / capbank (`10.40.40.0/24`)

      This is the architectural framing the requirements step (Lab 1.3)
      will use, and the mapping you'll reference when you produce
      evidence in Lab 2.4. Toggle the view off and on a couple of times
      to lock in which RangerDanger zone corresponds to which Purdue
      level.

      > **Background:** open the [Purdue Model Levels (L0–L5)](/knowledge#purdue-model)
      > article in the Knowledge base if the
      > level numbering is new to you. Two minutes is enough — you'll
      > use these labels in Lab 1.3 and 2.4. The Purdue model defines
      > the *architecture*; IEC 62443 builds on it with zones, conduits,
      > and Security Levels (SL) — that's Lab 1.3's framing.

      ### Inspect three inter-zone crossings

      Click directly on the edges that cross between zones. Each
      edge shows a tooltip listing which protocols are traversing
      that boundary right now. Walk these three:

      1. **Enterprise → Field** (`10.10.10.0/24` → `10.40.40.0/24`)
      2. **Vendor → OT Ops** (`10.20.20.0/24` → `10.30.30.0/24`)
      3. **OT Ops → Field** (`10.30.30.0/24` → `10.40.40.0/24`)

      > The **RTAC** (`10.30.30.20`) is the central communication
      > node between OT Ops and the Field network. Its conversations
      > with relays, recloser, and regulator will be the most active
      > path you see at the firewall.

      Record what you observed:

      :::decision id=zones-located options=ALL_FOUR,SOME_MISSING,COULDNT_FIND correct=ALL_FOUR
      **Did you locate all four zones on the canvas?**
      :::

      :::decision id=ent-to-field-protocols options=NO_ICS,MODBUS_OR_DNP3,UNCLEAR correct=MODBUS_OR_DNP3
      **Enterprise → Field crossing — what did the tooltip show?** Under the weak baseline you should be seeing ICS protocols where you would not expect them.
      :::

      :::decision id=ot-to-field-protocols options=MODBUS_OR_DNP3,HTTP_ONLY,NOTHING correct=MODBUS_OR_DNP3
      **OT Ops → Field crossing — what did the tooltip show?** This is the supervisory-control path the RTAC uses.
      :::

      **Time budget for this lab:** 30 minutes total.
    action:
      type: check
      expect:
        breaker_closed: true

  - title: "Generate scenario traffic"
    description: |
      The substation's **autonomous baseline** is already running continuously:

      - RTAC polling field devices via Modbus and DNP3
      - GPS distributing NTP to protection relays
      - HMI and historian reading state from the RTAC

      You will see that traffic in your capture without doing anything.

      What the traffic generator adds is **scenario-driven** activity - engineering workstation maintenance access and vendor remote monitoring. These represent things students would see during an exercise that models engineering or vendor activity. **They are not part of the 24×7 baseline.**

      The lab ships a helper that synthesizes scenario flows so
      you can see them on the wire - this is **lab plumbing**, not
      a production command. Click the **Generate Traffic** button
      below (or hit the helper API directly):

        curl -X POST http://localhost:8088/api/traffic/generate \
          -H 'Content-Type: application/json' \
          -d '{"duration_sec":50}'

      Leave the generator running - we start the capture next.

      ### Sneak preview: the live Traffic Matrix

      While the generator is running, open the [Network Map](/console)
      and click **Traffic Matrix** in the left drawer. This is a live
      view of cross-zone flows — the same data you'll PCAP and
      tshark in the next two steps, but as a real-time grid right
      now. It's a quick way to sanity-check that traffic is flowing
      before you commit to a 60-second capture.

      Look for these flows in the matrix:

      - `10.30.30.20` (RTAC) → `10.40.40.x` (field devices) on
        Modbus 502 / DNP3 20000 — the supervisory polling path,
        should be very active
      - `10.30.30.10` (HMI/historian zone) → `10.30.30.20` (RTAC) —
        intra-zone monitoring, normal
      - Anything from `10.10.10.x` or `10.20.20.x` reaching
        `10.30.30.x` or `10.40.40.x` — these are the cross-zone
        flows the assessment in this lab will catalog

      :::decision id=matrix-rtac-to-field options=ACTIVE,QUIET,NOT_SEEN correct=ACTIVE
      **RTAC ↔ field-device traffic in the Traffic Matrix:** how
      active does it look right now?
      :::

      :::decision id=matrix-enterprise-to-ot-visible options=YES_VISIBLE,NO_NOT_SEEN,UNCLEAR correct=YES_VISIBLE
      **Did you see any enterprise (10.10.10.x) traffic reaching OT
      or field subnets?** Under the weak baseline this should be
      present — you'll formally catalog it in steps 3-7.
      :::

  - title: "Capture traffic at the firewall"
    node: fw-1
    description: |
      Open the firewall terminal below (or `fw-1` on the [Network Map](/console)). The firewall runs a Linux shell with `tcpdump`. Start a 60-second capture across all zone interfaces:

        tcpdump -i any -w /data/captures/baseline.pcap -G 60 -W 1 'not host 127.0.0.1'

      Wait for tcpdump to print its packet count and exit. The promiscuous-mode warning on the `"any"` device is normal and can be ignored.

      > **About the filter:** the only thing we exclude is `127.0.0.1` (loopback), which carries containd's own internal dataplane-to-engine RPC and is unrelated to the substation scenario. Every other packet in the capture is real scenario traffic - no management UI traffic, no platform telemetry, no external browser flows, because the RangerDanger platform runs on its own out-of-band management network and does not appear on any zone interface the firewall sees.

  - title: "Analyze cross-zone flows"
    node: eng-ws-1
    description: |
      Analysis happens on the **engineering workstation**, not on the firewall. The PCAP you just captured is shared with eng-ws at `/home/abc/pcaps/baseline.pcap` via a read-only volume mount - no copy needed. The eng-ws terminal has `tshark` installed, which gives us purpose-built statistics commands that are much shorter and clearer than raw `tcpdump` + `awk`.

      Switch to the **eng-ws** terminal tab (below, or on the [Network Map](/console)) for the rest of this step.

      ### Sanity check

      File present, packet count non-zero:

        ls -lh /home/abc/pcaps/baseline.pcap
        tshark -r /home/abc/pcaps/baseline.pcap 2>/dev/null | wc -l

      ### Build a flow inventory

      We'll build the flow inventory using `tshark -z conv,ip` to
      collapse ephemeral TCP source ports and show one row per
      source-IP / destination-IP pair. This is the view you'll use most
      when reasoning about cross-zone conversations:

        tshark -r /home/abc/pcaps/baseline.pcap -q -z conv,ip 2>/dev/null

      `10.30.30.20 <-> 10.40.40.21` means the RTAC and the recloser
      are in contact; the frame and byte counts tell you how much.

      :::hint Other helpful views (protocol volume + per-TCP-flow detail)
      Two additional `tshark` views are useful when you want a different
      angle on the same capture.

      **Protocol volume** - answers *"what protocols are flowing?"* by
      counting bytes per ICS port:

        tshark -r /home/abc/pcaps/baseline.pcap -q -z io,stat,0,"tcp.port==502","tcp.port==20000","tcp.port==8080","tcp.port==1881","udp.port==123" 2>/dev/null

      Columns are, in order: Modbus TCP/502, DNP3 TCP/20000, HTTP
      TCP/8080, FUXA TCP/1881, NTP UDP/123.

      **Per-TCP-flow detail** - every TCP 5-tuple with frame counts:

        tshark -r /home/abc/pcaps/baseline.pcap -q -z conv,tcp 2>/dev/null | head -20

      Short-lived TCP connections (Modbus, DNP3, HTTP polls) open a
      new connection per request with a fresh ephemeral source port,
      so this view fragments each logical "RTAC polls the relay"
      conversation into many tiny rows. Useful when you want to count
      transactions, not conversations.
      :::

      ### Targeted filters

      tshark uses **display filters** (the same syntax Wireshark uses) with `-Y`. Subnets can be matched with `==` and CIDR notation, for example `ip.src==10.20.20.0/24`.

      **Who in Vendor/DMZ is reaching into OT Operations?**

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'ip.src==10.20.20.0/24 and ip.dst==10.30.30.0/24' 2>/dev/null | head -15

      **What leaves OT Operations heading for Field devices?**

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'ip.src==10.30.30.0/24 and ip.dst==10.40.40.0/24' 2>/dev/null | head -15

      **DNP3 TCP activity on port 20000** — the dominant SCADA protocol for distribution substations (every relay, recloser, regulator, and capbank controller on the wire exposes a DNP3 outstation):

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'tcp.port==20000' 2>/dev/null | head -10

      **Modbus TCP activity on port 502** — widely supported on field devices and often present alongside DNP3, primarily for HMI integration on installed gear:

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'tcp.port==502' 2>/dev/null | head -10

      **All RTAC-originated traffic** (Modbus + DNP3 + HTTP):

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'ip.src==10.30.30.20' 2>/dev/null | head -20

      > The RTAC also has a field-side interface at `10.40.40.10`, but host
      > routing pushes all field-bound traffic out the OT Ops interface, so
      > the wire-visible source on this capture is always `10.30.30.20`.

      **Is Enterprise speaking to OT or Field directly?** (Should be empty in a healthy baseline.)

        tshark -r /home/abc/pcaps/baseline.pcap -Y 'ip.src==10.10.10.0/24 and (ip.dst==10.30.30.0/24 or ip.dst==10.40.40.0/24)' 2>/dev/null

      > The RTAC has interfaces in both OT Ops and Field for realism, but in this lab its communication with field devices is routed through the firewall. This ensures Modbus and DNP3 traffic is visible for analysis.

      ### Key insight: not all important traffic is visible

      Not all operationally important traffic crosses a zone boundary.

      For example:

      - **HMI → RTAC**
      - **Historian → RTAC**

      These flows occur entirely within the OT Ops network and do not traverse the firewall.

      This is intentional:

      - The firewall shows cross-zone communication.
      - It does not show all system communication.

      To confirm these internal control relationships exist even when not visible in the PCAP, check the lab's RTAC status API:

        curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool | head -40

      The `device_comms` and `devices` keys show every field device the RTAC is currently in contact with — proof that the underlying control flows are alive even when they are intra-subnet. (Real RTACs don't expose a JSON state API; this is a lab convenience. The equivalent SCADA-protocol probe from the RTAC terminal is a DNP3 read against an outstation — `dnp3poll 10.40.40.20:20000 -a 1` — or a Modbus read — `mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20`.)

      ### Reflection

      > You have visibility into all cross-zone traffic from the firewall capture.
      > **What important system relationships are you missing?**

  - title: "Critical conduits - what MUST flow"
    description: |
      Shift from *"what traffic exists"* to *"what traffic is required for the substation to run."*

      From the flow inventory you built with the aggregation command in the previous step, and from the RTAC state API output, identify the **critical conduits** - the flows this substation cannot lose without breaking operations.

      ### Answer three questions in your Exercise Notes

      1. **Q1.** Which cross-zone flows did you see at the firewall that look operationally required?
      2. **Q2.** Which flows are *not* visible in the firewall capture but must exist for operations? (Look at the RTAC state API.)
      3. **Q3.** If the firewall allowed only the required flows and denied everything else between zones, would the substation still run normally?

      > Reason from the output you just produced. You do not need to build a matrix or diagram. If you get stuck, expand the hint below to see the expected answer.

      :::hint Reveal expected answer
      The substation has **two categories of required flows**:

      - **Autonomous baseline** - runs 24×7 regardless of students or exercises
      - **Scenario-driven** - only appears when the traffic generator is running to model engineering or vendor activity

      Both are "required" - they represent legitimate operations - but they have very different semantic meaning in a capture.

      ### Group 1 - Cross-zone autonomous baseline

      Always running, independent of the traffic generator. Write firewall rules to **preserve** these.

      | Flow | Source → Destination | Protocol | Rule |
      |------|---------------------|----------|------|
      | **A. GPS → field NTP** | `10.30.30.50` → `10.40.40.{20,21,22,23}` | UDP 123 | `ALLOW`, pin source to `10.30.30.50` |
      | **E. RTAC → field Modbus** | `10.30.30.20` → `10.40.40.{20,21,22,23}` | TCP 502 | `ALLOW`, pin source to `10.30.30.20`, apply ICS DPI (function codes) |
      | **E. RTAC → field DNP3** | `10.30.30.20` → `10.40.40.{20,21,22,23}` | TCP 20000 | `ALLOW`, pin source to `10.30.30.20`, apply ICS DPI (object groups) |

      > **Why the RTAC's source IP is `10.30.30.20`, not `10.40.40.10`:** the RTAC is multi-homed (it also has a field_net interface at `10.40.40.10` for realism), but host-level routing on the RTAC deliberately sends all field-bound traffic through the OT Ops firewall. The wire-visible source is the OT Ops interface.

      ### Group 2 - Cross-zone scenario flows

      Only present when the traffic generator is running (engineering or vendor activity). Write firewall rules to **restrict and pin** these.

      | Flow | Source → Destination | Protocol | Rule |
      |------|---------------------|----------|------|
      | **B. Eng-ws → RTAC** | `10.20.20.20` → `10.30.30.20` | HTTP 8080 | `ALLOW`, pin source to eng-ws |
      | **C. Eng-ws → OpenPLC** | `10.20.20.20` → `10.30.30.30` | HTTP 8080 | `ALLOW`, pin source to eng-ws |
      | **D. Vendor-jump → HMI** | `10.20.20.10` → `10.30.30.10` | FUXA 1881 | **Required but restrict** - legitimate pattern, but the baseline is too broad. Should be HTTPS-only, monitoring-only. Flagged for hardening in the next exercise. |

      ### Group 3 - Intra-zone, invisible to the firewall

      These happen on a single Docker subnet and never transit the firewall. You can prove they exist by querying the RTAC state API or by running `tcpdump` inside the HMI / historian containers directly. They must be protected by **host-level trust**, not firewall rules.

      | Flow | Source → Destination | Protocol | Proof it exists |
      |------|---------------------|----------|-----------------|
      | **F. HMI → RTAC** | `10.30.30.10` → `10.30.30.20` | Modbus 502 (every 2s) | RTAC's `device_comms` and the HMI poller sidecar being alive |
      | **G. Historian → RTAC** | `10.30.30.40` → `10.30.30.20` | HTTP 8080 (every 5s) | Historian's `last_poll_time` and `last_reading` with live RTAC data |

      ### Answers to the three questions

      - **Q1.** Flows **A** and **E** are the autonomous cross-zone flows (present in every capture regardless of the generator). Flows **B**, **C**, and **D** are the scenario cross-zone flows (present because you ran the generator). Together these five are the cross-zone flows you need firewall rules for.
      - **Q2.** Flows **F** and **G** exist and are critical, but are invisible in the firewall capture because they are intra-zone.
      - **Q3.** *Yes* - operations would still run, because these seven flows together cover every operational dependency. Anything else in the capture that isn't on this list is **exposure**, not a required flow.

      ### Key insights

      > **Insight #1 - The cross-zone firewall rules govern five flows.**
      > Two (A, E) are the 24×7 operational baseline. Three (B, C, D) are legitimate but scenario-driven - they represent access patterns you'd narrow during hardening.

      > **Insight #2 - Flows F and G are invisible to the firewall.**
      > They still need to be protected - but by host-level trust, network access controls within OT Ops, or physical security of the control room. The firewall is a powerful layer but it is not the whole story; defense in depth still applies to intra-zone communication.

      ### Counting methodology

      The packet counts you see in a capture include **both directions** (request plus reply) plus any TCP setup/teardown frames (`SYN`, `SYN-ACK`, `ACK`, `FIN`) when the session opens or closes during the capture window.

      - A single Modbus FC3 read transaction over a **persistent** TCP session is **2 packets** (request + response). If the session opens or closes inside the window, add the handshake (3) and/or teardown (~4) frames.
      - A simple HTTP `GET` over a fresh connection produces **roughly 10–14 packets** end-to-end (handshake + request + response + teardown); reuse over keep-alive drops it to **2–4** per request.
      - When a table lists "504 Modbus packets in 30 seconds" for the RTAC poller, that is a bidirectional packet count over a persistent session — it maps to roughly **250 request/response transactions**, which lines up with the RTAC's ~8/sec aggregate poll rate across the four field devices.
      :::

  - title: "Findings - what you observed"
    description: |
      Now look at what you captured through a security lens. This step is **observation**, not decision - for each category below, mark what you saw in your analysis. Was it present and concerning? Present but justified? Or not visible at all?

      The design decisions ("what should we BLOCK / RESTRICT / ALLOW") are Lab 1.3's job - here you're just inventorying findings.

      :::decision id=enterprise-to-field options=EXPOSURE_OBSERVED,LIKELY_OK,NOT_OBSERVED correct=NOT_OBSERVED
      **Enterprise → Field** on Modbus 502 / DNP3 20000 - did you see corporate IT addresses (`10.10.10.0/24`) reaching field devices on control-plane protocols?
      :::

      :::decision id=enterprise-to-ot options=EXPOSURE_OBSERVED,LIKELY_OK,NOT_OBSERVED correct=NOT_OBSERVED
      **Enterprise → OT Ops** on ICS ports - did you see corporate IT speaking ICS to RTAC / HMI / OpenPLC?
      :::

      :::decision id=vendor-to-ot options=EXPOSURE_OBSERVED,LIKELY_OK,NOT_OBSERVED correct=EXPOSURE_OBSERVED
      **Vendor DMZ → OT Ops** on Modbus or HMI control ports - was the vendor zone reaching OT on more than just SSH/HTTPS?
      :::

      :::decision id=non-rtac-to-field options=EXPOSURE_OBSERVED,LIKELY_OK,NOT_OBSERVED correct=NOT_OBSERVED
      **Non-RTAC OT hosts → Field devices** - did anything other than the RTAC (10.30.30.20) reach relays / recloser / regulator / capbank?
      :::

      :::decision id=unauth-modbus-writes options=EXPOSURE_OBSERVED,LIKELY_OK,NOT_OBSERVED correct=EXPOSURE_OBSERVED
      **Unauthorized Modbus writes / DNP3 Direct Operate** - did the firewall produce visibility (logs, deny events) for write attempts from non-RTAC sources, or were they silent?
      :::

      Your findings become context for Lab 1.3, where you decide what the design should *do* about each one.

      :::hint What an analyst would conclude from this baseline
      What you should see in the **passive capture** from steps 2–4:

      1. **Enterprise → Field on Modbus/DNP3** - `NOT_OBSERVED`. The traffic generator and autonomous baseline don't produce flows from `10.10.10.0/24`. You don't see this in the capture *because nobody made it happen during your capture window*. That doesn't mean the path is closed - it just wasn't exercised.
      2. **Enterprise → OT Ops on ICS ports** - `NOT_OBSERVED`. Same reason as above.
      3. **Vendor → OT Ops on Modbus/HMI control** - `EXPOSURE_OBSERVED`. Step 4's eng-ws (vendor zone) probes against RTAC and OpenPLC are in the capture.
      4. **Non-RTAC OT Ops → Field** - `NOT_OBSERVED`. RTAC is the only OT host that polls field devices. The HMI, historian, and OpenPLC don't poll field directly in the autonomous baseline.
      5. **Unauthorized Modbus writes / DNP3 Direct Operate** - `EXPOSURE_OBSERVED`. Step 4's eng-ws mbpoll write commands against the regulator are in the capture. The firewall did not block them.

      Three categories landed at `NOT_OBSERVED` - but **that's a passive-monitoring artifact, not proof those paths are closed.** The next step (Probe for latent exposure) tests the connectivity directly. This is the most important pattern in OT assessments: **passive capture tells you what's been used, not what's possible.**
      :::

  - title: "Probe for latent exposure"
    expected_config: weak
    description: |
      Three of your passive findings landed at `NOT_OBSERVED`. That doesn't mean those paths are closed - it just means nobody used them during your capture window. In real OT assessments, **passive monitoring routinely misses paths an attacker can exercise on demand**. The threat model isn't *"what did I see"* - it's *"what's reachable."*

      Run the probes below from the **kali terminal** (`kali-1` on the [Network Map](/console)) to test the paths your passive analysis didn't cover. Every command that returns data instead of timing out is a path that exists in the policy and was simply not exercised in the capture.

      **Test enterprise → field on Modbus and DNP3:**

          nmap -p 502,8080,20000 10.40.40.20 --max-retries 1 -T4

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20

          dnp3poll 10.40.40.21:20000 -a 2

      **Test enterprise → OT Operations on ICS ports:**

          nmap -p 502,1881,8080,20000 10.30.30.20 --max-retries 1 -T4

          curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool | head -10

      All of these should succeed. The weak baseline permits enterprise traffic to OT and field zones - your capture just happened not to contain any.

      :::decision id=latent-exposure-confirmed options=YES,NO,UNSURE correct=YES
      **After running the active probes, did you confirm exposure that the passive capture missed?**
      :::

      :::hint Why this matters for the design
      The verdict you give in Lab 1.3 must address what's **reachable**, not just what's **observed**. If you only block the flows the capture showed (vendor → OT, unauth writes), the latent enterprise → field path still works - it was just dormant during your capture. A real attacker doesn't care whether the flow was in your last 30s of pcap; they care whether they can use it now.

      This is also why segmentation needs both perimeter rules (block reachability) AND visibility (logging + DPI) - so when a previously-dormant path gets exercised, you actually see it.
      :::

  - title: "Transition - decide what to fix first"
    description: |
      You have now:

      - **Observed** real traffic at the firewall
      - **Identified** the five critical conduits operations depends on
      - **Found** which exposures showed in passive capture
      - **Confirmed** additional latent exposure via active probing
      - **Written** concrete success criteria

      > You cannot fix everything at once. Firewall work, protocol-aware DPI, architecture review, and validation testing all compete for the same limited team capacity.

      The next exercise - [Lab 1.3: Segmentation Requirements & Policy Design](/exercises/segmentation-requirements) - takes your findings (passive *and* latent) and turns them into design verdicts. Lab 1.4 (Remediation Planning) follows that, where you'll choose which fixes to execute this quarter under a real labor budget. Your decisions there will determine which attack paths remain open in later exercises.

      Before moving on, confirm the substation is still operating normally. This is your **"known good"** baseline - the state your segmentation must preserve.
    action:
      type: check
      expect:
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true
