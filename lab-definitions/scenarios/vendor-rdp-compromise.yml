id: vendor-rdp-compromise
order: 2
name: "Vendor Remote Access Compromise (Bonus)"
summary: "Optional — Compromised vendor credentials used to pivot from DMZ to field devices via Modbus."
description: >
  A vendor's remote access credentials are compromised via phishing.
  The attacker uses the vendor jump box to pivot through the DMZ
  and disable protective functions on field devices via Modbus TCP.
  Students must apply containd firewall rules to block vendor zone
  from directly reaching field devices.
tags:
  - vendor
  - phishing
  - segmentation
  - defense
  - bonus
steps:
  - title: "Review initial posture"
    description: >
      Verify the feeder is energized with normal protection.
      Auto-reclose should be enabled and the recloser closed.
      Note the current firewall policy (weak baseline allows
      vendor zone to reach field devices directly).

      From the vendor jump box, verify you can reach field devices:

        nmap -p 502,8080,20000 10.40.40.21
    action:
      type: check
      expect:
        breaker_closed: true
        recloser_closed: true
        reclose_enabled: true

  - title: "Simulate vendor credential compromise"
    description: >
      The attacker has obtained vendor-jump credentials (simulated).
      From the vendor jump box (10.20.20.10), disable auto-reclose
      on the recloser. Via Modbus:

        mbpoll -a 1 -t 0 -r 2 10.40.40.21 0

      Or via the REST API:

        curl -X POST http://10.40.40.21:8080/api/command \
          -d '{"command":"disable_reclose","source":"10.20.20.10"}'

      With the weak baseline policy, containd allows this traffic
      from the vendor zone to field devices.
    action:
      type: command
      device: recloser
      command: disable_reclose
      source: "10.20.20.10"

  - title: "Trigger sustained outage"
    description: >
      With auto-reclose disabled, inject a fault on the recloser.
      Normally the recloser would automatically restore service,
      but with reclose disabled it trips and locks out — causing
      a sustained downstream outage.

      From the vendor jump box, inject a fault via Modbus:

        mbpoll -a 1 -t 0 -r 4 10.40.40.21 1

      Or via REST:

        curl -X POST http://10.40.40.21:8080/api/command \
          -d '{"command":"inject_fault","source":"10.20.20.10"}'
    action:
      type: command
      device: recloser
      command: inject_fault
      source: "10.20.20.10"

  - title: "Observe customer impact"
    description: >
      The recloser is now locked out. Downstream loads including
      the hospital and fire station have lost power. Auto-reclose
      cannot restore service because it was disabled by the attacker.

      Verify from the vendor box via Modbus:

        mbpoll -a 1 -t 0 -r 1 10.40.40.21 -c 5 -1

      Or check state via REST:

        curl -s http://10.40.40.21:8080/api/state | python3 -m json.tool

      Coil 0 (closed) should be OFF, coil 1 (reclose) OFF, coil 2 (lockout) ON.
    action:
      type: check
      expect:
        recloser_closed: false

  - title: "Restore service"
    description: >
      As the operator, restore the feeder to normal operation
      using the RangerDanger HMI. Use the Supervisory Control tab
      to: reset lockout, enable auto-reclose, clear fault, and
      close the recloser.
    action:
      type: sequence
      commands:
        - device: recloser
          command: reset_lockout
          source: "operator"
        - device: recloser
          command: enable_reclose
          source: "operator"
        - device: recloser
          command: clear_fault
          source: "operator"
        - device: recloser
          command: close
          source: "operator"

  - title: "Harden containd policy"
    description: >
      Apply the improved firewall configuration via the containd
      Segmentation tab in the RangerDanger HMI. This blocks
      vendor zone (DMZ) from directly reaching field devices
      on Modbus (502), DNP3 (20000), and HTTP (8080).
    action:
      type: firewall
      config: improved

  - title: "Verify vendor access blocked"
    description: >
      Re-attempt the vendor compromise. From the vendor jump box,
      try to reach the recloser via Modbus:

        mbpoll -a 1 -t 0 -r 2 10.40.40.21 0

      The connection should time out — containd blocks vendor→field.
      Also try DNP3:

        dnp3poll 10.40.40.21:20000 -a 2

      This should also fail. Auto-reclose remains enabled.
    action:
      type: command
      device: recloser
      command: disable_reclose
      source: "10.20.20.10"

  - title: "Validate final state"
    description: >
      Verify the feeder is operating normally with protection
      intact and the hardened firewall policy active.
    action:
      type: check
      expect:
        recloser_closed: true
        reclose_enabled: true
        breaker_closed: true
        loads_energized: true
        firewall_config: improved
