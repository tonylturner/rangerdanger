id: vendor-rdp-compromise
order: "2.3-bonus"
name: "Vendor Remote Access Compromise (Bonus)"
summary: "Optional - Compromised vendor RDP/VNC credentials let an enterprise attacker pivot through the DMZ to OT field devices (15 min)."
description: >
  A vendor's remote-access credentials are compromised via phishing.
  The attacker uses them to RDP/VNC into the vendor jump box from
  an enterprise foothold, then pivots laterally from inside that
  session to OT field devices. Students apply containd firewall
  rules that block remote-access protocols (RDP/3389, VNC/5900)
  from enterprise into the vendor DMZ - closing the lateral path
  before it ever reaches OT.

  This bonus exercise is the optional companion to Lab 2.3
  (Protocol-Hardened Configurations). The deck case study (Slide 55) and
  potential-scenario list (Slide 88) both call this kill chain out
  explicitly: stolen vendor credentials → RDP into jump host →
  east-west to controllers.
nodes:
  - kali-1
  - vendor-jump-1
tags:
  - vendor
  - remote-access
  - segmentation
  - bonus
steps:
  - title: "Confirm the lateral path is open"
    expected_config: weak
    node: kali-1
    description: |
      Under the weak baseline, the enterprise zone can reach the
      vendor DMZ on remote-access protocols. This is the lateral
      path the attacker will exploit.

      From Kali (10.10.10.50), scan for remote-access services on
      the vendor jump box (10.20.20.10):

          nmap -p 3389,5900 10.20.20.10

      You should see at least one of `3389/tcp` (RDP) or
      `5900/tcp` (VNC) open. The RangerDanger lab's vendor-jump is
      a Linux container with `xrdp` and a VNC server running - the
      same defensive lesson applies to a real Windows vendor jump
      host on RDP.

  - title: "Pivot via RDP (or VNC)"
    expected_config: weak
    node: kali-1
    description: |
      From Kali, connect to the vendor jump box's remote desktop
      using the stolen credentials (`rangerdanger` / `rangerdanger`
      - the standard lab account documented in
      `docs/lab-credentials.md`).

      **Option A - RDP** (preferred when 3389 is open):

          xfreerdp /v:10.20.20.10:3389 /u:rangerdanger /p:rangerdanger +clipboard /cert:ignore

      **Option B - VNC** (fallback, no auth required in this lab):

          xtightvncviewer 10.20.20.10:5900

      You now have an interactive desktop on the vendor jump host.
      From the vendor's perspective, the connection looks
      legitimate - credentials valid, source IP not yet anomalous,
      and the firewall allows enterprise → vendor on remote-access
      ports. **This is the foothold.** Anything the vendor box can
      do, you can now do, from the vendor's network position.

      :::hint Headless mode (no GUI on Kali)
      If you're running Kali in a terminal-only mode, you can pivot
      to the same effect with SSH (port 22 is also open under the
      weak baseline):

          sshpass -p rangerdanger ssh -o StrictHostKeyChecking=no rangerdanger@10.20.20.10

      The lesson is the same: an enterprise host should not have
      open remote-access into the vendor DMZ.
      :::

  - title: "Use the vendor foothold to attack field devices"
    expected_config: weak
    node: vendor-jump-1
    description: |
      Open a terminal **inside the RDP/VNC session you just
      established** (or use the vendor-jump terminal tab below).
      You're now operating from the vendor zone (10.20.20.10).

      Disable auto-reclose on the recloser via Modbus FC5 (write
      single coil), targeting coil 1 (`reclose_enabled`). `-t 0`
      is mbpoll's coil data type, `-r 2` is mbpoll's 1-indexed
      reference for coil 1, and `0` drives the coil low (disable):

          mbpoll -a 1 -t 0 -r 2 10.40.40.21 0

      Then inject a transient fault on coil 4 (`inject_fault`)
      with value `1`:

          mbpoll -a 1 -t 0 -r 5 10.40.40.21 1

      The recloser sees the fault and trips. Auto-reclose is off,
      so the recloser stays open instead of attempting to recover.
      Downstream loads - the hospital and fire station - lose power.

      Wait ~3 seconds for the RTAC poll → OpenDSS push to land,
      then read the RTAC's Modbus tags to confirm the kinetic
      outcome (the RTAC aggregates field-device state and
      OpenDSS electrical results into Modbus registers a vendor
      host can read):

          mbpoll -a 1 -t 4 -r 1 -c 5 10.30.30.20

      Holding register 1 (`recloser_closed`) is now `0` (the fault
      tripped the recloser), register 2 (`reclose_enabled`) is `0`
      (your earlier Modbus FC5 write disabled auto-reclose), and
      register 5 (`recloser_shot_count`) is `1` (the fault was
      counted as the first shot - but with reclose disabled there
      will be no shots 2 or 3 to recover from).

          mbpoll -a 1 -t 3 -r 1 -c 6 10.30.30.20

      Input register 1 (`downstream_voltage_v × 10`) and register
      3 (`feeder_current_a × 10`) both read `0` - the loads
      downstream of the recloser are unenergized. The substation
      bus (input register 0) stays energized at the source.

      :::hint Cyber → state → physics has a ~2-3s lag
      The Modbus writes mutate recloser-sim state immediately,
      but the *electrical* impact (voltages, energization) only
      updates after the RTAC polls field devices (every 2 seconds)
      and pushes the aggregated state to the OpenDSS solver. If
      you re-read RTAC tags *immediately* after the writes, you
      may see device state changed but not the kinetic outcome
      yet. Wait 3 seconds, then re-read.
      :::

      The attack succeeded because the kill chain had two open
      links: enterprise → vendor RDP, and vendor → field Modbus.

      > **Background:** the two-hop kill chain (compromise hop A,
      > pivot to hop B, attack from B) is the central lesson of
      > defense in depth. See [OT Network Segmentation Overview](/knowledge#ot-segmentation-overview)
      > for why segmentation between the *vendor* and *field* zones
      > is as important as the perimeter rule, even though the
      > attacker never directly touches the field network from the
      > internet. The full pattern catalog -
      > [Vendor Remote Access Patterns](/knowledge#vendor-remote-access)
      > and [The OT Kill Chain](/knowledge#ot-kill-chain) - covers how
      > real utilities defend this surface and what historical
      > incidents (Industroyer, Volt Typhoon) it mirrors.

      ### Operational consequence at the HMI

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. The kinetic outcome is identical to Lab 2.3 Attack 2 -
      different protocol path, same lights-out for downstream
      customers:

      - **Alarm banner:** "RECLOSER OPEN - downstream loads lost"
        and "AUTO-RECLOSE DISABLED - no fault recovery"
      - **General Load + Critical Load** both read "NO POWER"
      - *"Hospital and fire station without power"* under critical load
      - **Customer-service tile:** "ALL CUSTOMERS WITHOUT POWER"

      Notice that the **Last command from:** field on the recloser
      shows the vendor jump host address (`10.20.20.10`) - not the
      attacker IP (`10.10.10.50`). From the field device's
      perspective, the command came from a trusted source. This is
      why perimeter rules at the *RDP* hop matter: by the time the
      Modbus packet reaches the recloser, it looks legitimate.

      :::decision id=vendor-attack-hmi-impact options=DOWNSTREAM_OUTAGE,FEEDER_OUTAGE,LOW_VOLTAGE_ALARM,NO_ALARM correct=DOWNSTREAM_OUTAGE
      **What alarm did the Feeder One-Line tab show after this attack?**
      :::

      :::decision id=vendor-source-attribution options=ATTACKER_IP,VENDOR_JUMP_IP,RTAC_IP correct=VENDOR_JUMP_IP
      **What IP shows as the recloser's last-command source?** The
      attack laundered through the vendor session.
      :::
    action:
      type: sequence
      commands:
        - device: recloser
          command: disable_reclose
          source: "10.20.20.10"
        - device: recloser
          command: inject_fault
          source: "10.20.20.10"

  - title: "Restore service"
    expected_config: weak
    description: |
      Use the Supervisory Control tab in the [Feeder HMI](/substation)
      (or click **Reset Lab**) to restore the feeder: reset lockout,
      enable auto-reclose, clear fault, close the recloser.
    action:
      type: sequence
      commands:
        - device: recloser
          command: reset_lockout
          source: "operator"
        - device: recloser
          command: enable_reclose
          source: "operator"
        - device: recloser
          command: clear_fault
          source: "operator"
        - device: recloser
          command: close
          source: "operator"

  - title: "Apply hardened policy"
    description: |
      Apply the hardened firewall configuration with **Apply Hardened**
      in the **containd NGFW — policy actions** panel below this step, or
      **Apply Your Plan** if you built a custom policy in Lab 2.2.

      The hardened policy closes both links of the kill chain:

      - **Enterprise → vendor**: RDP (3389) and VNC (5900) blocked.
        The attacker cannot establish the foothold from Kali in the
        first place.
      - **Vendor → field**: Modbus (502) and DNP3 (20000) blocked.
        Even if the attacker did get a vendor session by some other
        means, the second hop to field devices is denied.

      Either control alone breaks the kill chain. Both are
      defense in depth - the deck case study (Slide 55) made this
      design choice after a ransomware incident specifically because
      either layer can fail or be misconfigured, and the second
      stops the attack regardless.

      :::plan-coverage title="Your plan vs the kill chain"
      :::

      The two requirements that close this kill chain in your Lab 1.4
      plan are `vendor-to-ot` (BLOCK or RESTRICT - closes the
      enterprise → vendor → OT pivot) and `non-rtac-to-field`
      (BLOCK - pins the vendor box out of field even if the perimeter
      rule misses). If either is uncovered above, the matching
      re-test in the next step may still succeed under "Apply Your
      Plan" - re-attempt with **Apply Hardened** to compare.
    action:
      type: firewall
      config: improved

  - title: "Re-attempt the pivot"
    expected_config: hardened
    node: kali-1
    description: |
      From Kali, re-scan and re-attempt the connection:

          nmap -p 3389,5900 10.20.20.10
          xfreerdp /v:10.20.20.10:3389 /u:rangerdanger /p:rangerdanger /cert:ignore
          xtightvncviewer 10.20.20.10:5900

      Both ports should be filtered; both clients should fail to
      connect. The enterprise → vendor lateral path is closed at
      the perimeter.

      As a defense-in-depth check, even if the perimeter rule were
      missing, the vendor → field rule would still block the second
      hop. From the vendor-jump terminal tab below (which still
      represents the vendor zone), retry the Modbus attack:

          mbpoll -a 1 -t 0 -r 2 10.40.40.21 0

      Should also time out. The kill chain is broken at two points.

      ### Operational consequence at the HMI

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. The alarm chain you saw in step 3 is absent:

      - **No alarm banner**
      - **Recloser (79)** closed, **Auto-reclose ON** green badge
      - **General + Critical Load** energized (green kW values)
      - **Customer-service tile:** "N kW serving ~M customers"

      The enterprise → vendor perimeter rule stopped the foothold
      before it formed. Even if a future misconfiguration re-opens
      that rule, the vendor → field rule still pins lateral movement
      out of the field zone. Either layer alone closes this kill
      chain - having both is defense in depth.

      :::decision id=vendor-retest-hmi-state options=NORMAL_OPS,DOWNSTREAM_OUTAGE,UNCHANGED_FROM_ATTACK correct=NORMAL_OPS
      **What did the Feeder One-Line tab show after the re-test?**
      :::

      :::decision id=vendor-retest-defense-layer options=ENTERPRISE_TO_VENDOR,VENDOR_TO_FIELD,EITHER_LAYER correct=EITHER_LAYER
      **Which firewall layer broke the kill chain?** Both layers
      are present in the hardened policy - but only one had to be in
      place to stop this specific attempt.
      :::
    action:
      type: check
      expect:
        firewall_config: improved
        recloser_closed: true
        reclose_enabled: true

  - title: "Validate"
    expected_config: hardened
    description: |
      Confirm the feeder is operating normally with the hardened
      policy in place and the vendor remote-access lateral path is
      closed.
    action:
      type: check
      expect:
        recloser_closed: true
        reclose_enabled: true
        breaker_closed: true
        firewall_config: improved
