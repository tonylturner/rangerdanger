id: segmentation-requirements
order: "1.3"
name: "Segmentation Requirements & Policy Design"
summary: "Define zone-pair communication requirements and compare your design to the hardened configuration (20 min)."
description: >
  Using the baseline assessment findings, define what
  communications should be allowed between each zone pair.
  Apply the principle of least privilege: deny by default,
  allow only named flows required for operations. Then
  compare your requirements to the improved containd
  configuration to see how they translate to firewall rules.
tags:
  - requirements
  - planning
  - segmentation
  - defense
steps:
  - title: "Confirm requirements from your assessment"
    expected_config: weak
    description: |
      Lab 1.2 step 6 asked you to commit to a verdict for each of the five exposure categories you observed. Those verdicts are your input here — Lab 1.3 turns them into the **design requirements** the firewall must enforce.

      Each block below is pre-filled with the verdict you chose in Lab 1.2 (look for the *inherited from earlier lab* note). You can:

      - **Confirm** by leaving the verdict as-is — it becomes a Lab 1.3 requirement.
      - **Refine** by changing the verdict if your design has evolved since the assessment.
      - **Fill in** a verdict if you skipped Lab 1.2 step 6.

      The verdict you commit to here is what Lab 1.4 reads to map your design onto specific remediation actions and labor budget.

      :::decision id=enterprise-to-field default-from=baseline-assessment:enterprise-to-field
      **Requirement: Enterprise → Field** on Modbus 502 / DNP3 20000.
      :::

      :::decision id=enterprise-to-ot default-from=baseline-assessment:enterprise-to-ot
      **Requirement: Enterprise → OT Operations** on any ICS port.
      :::

      :::decision id=vendor-to-ot default-from=baseline-assessment:vendor-to-ot
      **Requirement: Vendor DMZ → OT Operations** on Modbus / HMI control.
      :::

      :::decision id=non-rtac-to-field default-from=baseline-assessment:non-rtac-to-field
      **Requirement: Non-RTAC OT hosts → Field devices**.
      :::

      :::decision id=unauth-modbus-writes default-from=baseline-assessment:unauth-modbus-writes
      **Requirement: Unauthorized Modbus writes / DNP3 Direct Operate** from any source.
      :::

      :::hint Reveal expected requirements
      A hardened substation lands at:

      1. **Enterprise → Field on Modbus/DNP3:** `BLOCK`. Corporate IT should never speak control-plane protocols to field devices. This closes the path used in the **DNP3 Command Injection** exercise.
      2. **Enterprise → OT Ops on ICS ports:** `BLOCK`. Enterprise reaches OT only via constrained management paths, never on Modbus/DNP3. Closes the **Modbus Override** staging path.
      3. **Vendor → OT Ops on Modbus/HMI control:** `RESTRICT`. Vendor remote access stays on encrypted management protocols (HTTPS, SSH); direct Modbus/HMI control is the **Vendor RDP Compromise** vector.
      4. **Non-RTAC OT Ops → Field:** `BLOCK`. Only the RTAC (pinned to source `10.30.30.20`) should reach field devices. A compromised HMI or OpenPLC must not become an attack path.
      5. **Unauthorized Modbus writes / DNP3 Direct Operate:** `BLOCK and LOG`. Port-level filtering isn't enough — this requires **ICS DPI** to filter by function code, plus per-rule logging so blocked attempts are visible.

      Your design might differ — that's fine. The verdict you commit drives Lab 1.4's labor budget against *your* stated design, not against this answer key.
      :::

      :::hint Zone-pair reference (the rules these requirements imply)
      The verdicts above translate into per-zone-pair rules. Use this as a quick reference when you build the policy in Lab 2.2:

      | From → To | Allowed protocols | Notes |
      |---|---|---|
      | Enterprise → Vendor/DMZ | SSH (22), HTTP/S (80, 443) | jump-box access |
      | Enterprise → OT Ops | — | DENY all (1.3 verdict 2) |
      | Enterprise → Field | — | DENY all (1.3 verdict 1) |
      | Vendor/DMZ → OT Ops | SSH (22), HTTPS (443) | management only (1.3 verdict 3 RESTRICT) |
      | Vendor/DMZ → Field | — | DENY all |
      | OT Ops intra-zone | Modbus (502), DNP3 (20000), HTTP (8080), FUXA (1881), NTP (123) | HMI ↔ RTAC, etc. |
      | OT Ops → Field | Modbus (502), DNP3 (20000), HTTP (8080) — **RTAC only** | source-pin to `10.30.30.20` (1.3 verdict 4) |

      DPI layer (1.3 verdict 5):
      - **Modbus**: RTAC may read (FC1–4) and write (FC5/6); other sources blocked at FC level.
      - **DNP3**: RTAC may poll (FC01 Read) and operate (FC05 Direct Operate); other sources blocked.
      :::

  - title: "Resourcing reality check"
    expected_config: weak
    description: |
      Real OT segmentation projects fail more often on resourcing than on technology — vendor change windows that never materialise, OT engineers stretched between operations and security work, unclear risk-acceptance authority. Before you pick remediation actions in Lab 1.4, commit to your team's current state. Lab 1.4 will surface dependencies on these answers per action.

      :::decision id=ot-eng-availability options=AVAILABLE,STRETCHED,UNAVAILABLE
      **OT engineering capacity** — do you have a dedicated OT engineer for this segmentation work, or is that person also covering operations / on-call?
      :::

      :::decision id=fw-admin-skills options=IN_HOUSE,VENDOR_LED,GAP
      **Firewall admin skills** — who actually configures containd? In-house staff who understand it, vendor-led with your team observing, or a real skills gap that needs hiring or training?
      :::

      :::decision id=vendor-change-window options=SECURED,NEGOTIATING,NOT_DISCUSSED
      **Vendor change windows** — have you secured outage / change windows for the vendor-touching changes (vendor-to-OT restriction, vendor-to-field block)?
      :::

      :::decision id=risk-acceptance-authority options=CLEAR,UNCLEAR,DISPUTED
      **Risk-acceptance authority** — for residual risk in OT (e.g. an attack path you're deferring), is it clear who signs off? Or is the authority ambiguous / contested between IT, OT, and operations leadership?
      :::

      :::hint Why this matters
      Lab 1.4 will read these answers and overlay each remediation action with the resourcing dependencies that affect it. For example, if you mark OT engineering as `STRETCHED`, the action `pin-rtac-to-field` (which requires OT Engineer review of the source-pin) gets a warning that it's harder to land than the labor-budget number suggests. If you mark vendor change windows as `NOT_DISCUSSED`, vendor-touching actions get a "blocked by readiness" flag — the technical change can't ship until that conversation happens.

      Right now these annotations are observational — they don't reduce the Lab 1.4 labor budget. A future workshop iteration may drive 1.4's role caps directly from these answers (tracked in [issue #27](https://github.com/tonylturner/rangerdanger/issues/27)).
      :::

  - title: "Define success criteria for segmentation"
    description: |
      Before moving on, write down what **"good"** looks like for this substation. These are concrete, testable statements - not a plan, not a matrix. You will use them in Lab 2.4 (Testing & Validation) to validate your changes worked.

      ### Good segmentation for this substation means

      1. **Enterprise cannot directly reach Field devices.**
         *Test:* `tcpdump` on the firewall's field interface should show zero packets originating from `10.10.10.0/24`.

      2. **Vendor access to OT Ops is constrained and brokered.**
         *Test:* vendor DMZ can reach the RTAC/HMI only on approved management ports, not on raw Modbus/DNP3.

      3. **Unauthorized writes are blocked and logged.**
         *Test:* a Modbus FC6 write or DNP3 Direct Operate from a non-RTAC source should be denied and produce a firewall event.

      4. **Enterprise ransomware cannot propagate into OT.**
         *Test:* SMB, RDP, and SSH from `10.10.10.0/24` to `10.30.30.0/24` or `10.40.40.0/24` should be denied.

      5. **Operations are not broken by the segmentation change.**
         *Test:* after applying rules, all five critical conduits from Lab 1.2 continue to work.

      > **Operational continuity is a hard constraint.** If your segmentation blocks any of the critical conduits you identified earlier, you will break operations.
