id: segmentation-requirements
order: "1.3"
name: "Segmentation Requirements & Policy Design"
summary: "Define zone-pair communication requirements and compare your design to the hardened configuration (20 min)."
description: >
  Using the baseline assessment findings, define what
  communications should be allowed between each zone pair.
  Apply the principle of least privilege: deny by default,
  allow only named flows required for operations. Then
  compare your requirements to the improved containd
  configuration to see how they translate to firewall rules.
tags:
  - requirements
  - planning
  - segmentation
  - defense
steps:
  - title: "Confirm requirements from your assessment"
    expected_config: weak
    description: |
      Lab 1.2 step 6 asked you to commit to a verdict for each of the five exposure categories you observed. Those verdicts are your input here — Lab 1.3 turns them into the **design requirements** the firewall must enforce.

      Each block below is pre-filled with the verdict you chose in Lab 1.2 (look for the *inherited from earlier lab* note). You can:

      - **Confirm** by leaving the verdict as-is — it becomes a Lab 1.3 requirement.
      - **Refine** by changing the verdict if your design has evolved since the assessment.
      - **Fill in** a verdict if you skipped Lab 1.2 step 6.

      Whichever verdict is selected here at the end of this step is what Lab 1.4 (Remediation Planning) will use to size your remediation plan against your committed design.

      :::decision id=enterprise-to-field default-from=baseline-assessment:enterprise-to-field
      **Requirement: Enterprise → Field** on Modbus 502 / DNP3 20000.
      :::

      :::decision id=enterprise-to-ot default-from=baseline-assessment:enterprise-to-ot
      **Requirement: Enterprise → OT Operations** on any ICS port.
      :::

      :::decision id=vendor-to-ot default-from=baseline-assessment:vendor-to-ot
      **Requirement: Vendor DMZ → OT Operations** on Modbus / HMI control.
      :::

      :::decision id=non-rtac-to-field default-from=baseline-assessment:non-rtac-to-field
      **Requirement: Non-RTAC OT hosts → Field devices**.
      :::

      :::decision id=unauth-modbus-writes default-from=baseline-assessment:unauth-modbus-writes
      **Requirement: Unauthorized Modbus writes / DNP3 Direct Operate** from any source.
      :::

      :::hint What "BLOCK" actually means downstream
      A `BLOCK` requirement here will, in Lab 1.4, gravitate you toward firewall-rule remediation actions (e.g. *block-enterprise-to-ot*, *block-enterprise-to-field*). A `RESTRICT` requirement leans toward narrower allow-list rules (e.g. *restrict-vendor-to-ot* allows SSH/HTTPS only). `LOG` requires per-rule logging plus PCAP retention (the *improve-logging* action).

      The point of this step is that **the verdict is your decision** — the labor budget in Lab 1.4 is sized to your stated design, not to a fixed ideal. If your design says "ALLOW vendor → OT on Modbus," Lab 1.4 won't pressure you to remove it; it will just record the residual risk.
      :::

  - title: "Define enterprise zone requirements"
    expected_config: weak
    description: >
      The enterprise zone (10.10.10.0/24) contains corporate
      workstations and the Kali attacker box. Define what this
      zone SHOULD be allowed to reach:

        Enterprise → Vendor/DMZ: SSH (22), HTTP/S (80, 443) for jump box access
        Enterprise → OT Ops: DENY (no direct access)
        Enterprise → Field Devices: DENY (no direct access)

      Key principle: Enterprise should never initiate connections
      into OT or field zones. All access goes through the DMZ
      jump host.

      **Time budget:** 20 minutes.

  - title: "Define vendor/DMZ zone requirements"
    expected_config: weak
    description: >
      The vendor zone (10.20.20.0/24) contains the jump host
      and engineering workstation. Define allowed flows:

        Vendor/DMZ → OT Ops: SSH (22), HTTPS (443) only - for monitoring
        Vendor/DMZ → Field Devices: DENY (no direct access)

      Vendor access to field devices should be brokered through
      the RTAC, never direct. This is the lesson from the Vendor RDP Compromise exercise.

  - title: "Define OT operations zone requirements"
    expected_config: weak
    description: >
      The OT ops zone (10.30.30.0/24) contains the HMI, RTAC,
      OpenPLC, historian, and GPS. Define internal and outbound flows:

        OT Ops intra-zone: Modbus (502), DNP3 (20000), HTTP (8080), FUXA (1881), NTP (123)
        OT Ops → Field Devices: RTAC ONLY - Modbus (502), DNP3 (20000), HTTP (8080)
        Other OT nodes → Field Devices: DENY

      Critical: only the RTAC (source IP 10.30.30.20, its OT Ops
      interface, after host-level hardening routes field traffic
      through the firewall) should control field devices. A
      compromised HMI or OpenPLC must not be able to reach relays
      directly, and the firewall pin enforces this at the network
      layer.

  - title: "Define protocol-specific constraints"
    expected_config: weak
    description: >
      Beyond port-level rules, define what protocol operations
      should be allowed at the DPI level:

        Modbus: RTAC may read (FC1-4) and write (FC5-6) to field devices
        Modbus: Other sources - deny all function codes
        DNP3: RTAC may poll (FC01 Read) and operate (FC05 Direct Operate)
        DNP3: Other sources - deny all

      The containd NGFW supports ICS DPI with function code filtering.
      Modbus function codes 1-4 are read operations: FC1 Read Coils,
      FC2 Read Discrete Inputs, FC3 Read Holding Registers, FC4 Read
      Input Registers. Function codes 5 and 6 are write operations:
      FC5 Write Single Coil, FC6 Write Single Register. A least-privilege
      policy restricts writes to the RTAC only while allowing reads
      more broadly for monitoring.

  - title: "Capture your findings"
    expected_config: weak
    description: |
      Before moving on, write down the five key findings from your baseline assessment and requirements analysis. These findings are the input to the next exercise (Remediation Planning), where you will decide which ones to fix first.

      **The five findings:**

      1. **Vendor zone access is too broad.** The vendor/DMZ zone can reach OT Operations on Modbus, DNP3, and HMI ports - far more than SSH/HTTPS management.
      2. **Enterprise zone can reach ICS protocols.** Corporate IT hosts can speak Modbus and DNP3 directly to field relays and OT Ops devices.
      3. **No protocol-aware constraints on ICS ports.** The firewall allows all traffic on port 502 and 20000 regardless of function code - reads and writes are treated the same.
      4. **Any OT Ops host can reach field devices.** The rules allow the entire 10.30.30.0/24 subnet to reach field devices, not just the RTAC. A compromised HMI or OpenPLC can talk directly to relays.
      5. **Firewall visibility has a blind spot at the RTAC.** The RTAC is multi-homed but host-level hardening routes its traffic through the firewall. This is not visible in the firewall config and could drift without monitoring.

      Open your **Exercise Notes** (below) and confirm you have captured these findings. Add any additional observations from your own analysis. The Remediation Planning exercise will ask you to map each remediation action back to these findings.

  - title: "Define success criteria for segmentation"
    description: |
      Before moving on, write down what **"good"** looks like for this substation. These are concrete, testable statements - not a plan, not a matrix. You will use them in Lab 2.4 (Testing & Validation) to validate your changes worked.

      ### Good segmentation for this substation means

      1. **Enterprise cannot directly reach Field devices.**
         *Test:* `tcpdump` on the firewall's field interface should show zero packets originating from `10.10.10.0/24`.

      2. **Vendor access to OT Ops is constrained and brokered.**
         *Test:* vendor DMZ can reach the RTAC/HMI only on approved management ports, not on raw Modbus/DNP3.

      3. **Unauthorized writes are blocked and logged.**
         *Test:* a Modbus FC6 write or DNP3 Direct Operate from a non-RTAC source should be denied and produce a firewall event.

      4. **Enterprise ransomware cannot propagate into OT.**
         *Test:* SMB, RDP, and SSH from `10.10.10.0/24` to `10.30.30.0/24` or `10.40.40.0/24` should be denied.

      5. **Operations are not broken by the segmentation change.**
         *Test:* after applying rules, all five critical conduits from Lab 1.2 continue to work.

      > **Operational continuity is a hard constraint.** If your segmentation blocks any of the critical conduits you identified earlier, you will break operations.
