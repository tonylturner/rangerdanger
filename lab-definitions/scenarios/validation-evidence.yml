id: validation-evidence
order: 9
name: "Post-Change Validation & Evidence Collection"
summary: "Run positive and negative segmentation tests, capture PCAPs, and build an evidence package (20 min)."
description: >
  After applying the hardened firewall configuration, validate
  that segmentation is working correctly with both positive tests
  (authorized flows still work) and negative tests (unauthorized
  flows are blocked). Capture packet captures as evidence and
  document the results. This is the validation step required
  before any segmentation change goes to production.
nodes:
  - kali-1
  - vendor-jump-1
  - eng-ws-1
tags:
  - validation
  - testing
  - pcap
  - evidence
  - defense
steps:
  - title: "Verify improved config is active"
    expected_config: hardened
    description: >
      Confirm a hardened firewall policy is loaded. Check via API:

        curl -s http://localhost:8088/api/firewall/active

      The active config should be "improved" or "custom" (if you
      built your own policy in the Firewall Implementation exercise).
      If the weak baseline is still active, apply the hardened
      config using the **Apply Hardened** or **Apply Your Plan** button.

      **Time budget:** 20 minutes.
    action:
      type: check
      expect:
        firewall_config: improved

  - title: "Positive test: RTAC → field device Modbus"
    description: >
      Verify the RTAC can still read and write to field devices
      via Modbus. This is the authorized path that must keep working.

      From the RTAC terminal, confirm Modbus to the relay works:

        mbpoll -m tcp -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20

      Or check the lab's RTAC status API (supplementary — not available on real RTACs):

        curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool

      All three field devices should show in the response with
      current state data. device_comms should all be true.

      The RTAC polls field devices every 1 second via HTTP and
      every 5 seconds via DNP3. Both paths should be operational.
    action:
      type: check
      expect:
        breaker_closed: true

  - title: "Positive test: RTAC → field device DNP3"
    description: >
      Verify DNP3 polling from the RTAC is working through the
      firewall. From the RTAC or any OT ops host:

        dnp3poll 10.40.40.20:20000 -a 1
        dnp3poll 10.40.40.21:20000 -a 2
        dnp3poll 10.40.40.22:20000 -a 3

      All three should return point data. This confirms the
      rtac-to-field-dnp3 ALLOW rule is working.

  - title: "Positive test: HMI → RTAC communication"
    description: >
      Verify the HMI can still reach the RTAC within the OT ops
      zone (intra-zone traffic):

        curl -s http://10.30.30.20:8080/api/health

      Should return status: ok. OT intra-zone rules allow
      Modbus, DNP3, HTTP, and FUXA between OT ops nodes.

  - title: "Negative test: Enterprise → field device blocked"
    description: >
      From Kali (10.10.10.50), verify enterprise cannot reach
      field devices on any ICS protocol:

        nmap -p 502,8080,20000 10.40.40.20 --max-retries 1 -T4

      All ports should show as filtered (blocked by containd).

      Try Modbus:

        mbpoll -a 1 -t 0 -r 1 10.40.40.20 -c 1 -1

      Should time out. Try DNP3:

        dnp3poll 10.40.40.20:20000 -a 1

      Should fail to connect. Document each blocked attempt.

  - title: "Negative test: Vendor → field device blocked"
    description: >
      From the vendor jump box (10.20.20.10), verify vendor
      zone cannot reach field devices:

        nmap -p 502,20000 10.40.40.21 --max-retries 1 -T4

      Should show filtered. Try:

        mbpoll -a 1 -t 0 -r 1 10.40.40.21 -c 1 -1

      Should time out. This confirms the vendor compromise
      attack path from the Vendor RDP Compromise exercise is now blocked.

  - title: "Negative test: Non-RTAC OT node → field device blocked"
    description: >
      From a non-RTAC OT operations node (e.g., OpenPLC at
      10.30.30.30), verify direct field device access is blocked:

        nmap -p 502,20000 10.40.40.22 --max-retries 1 -T4

      Should show filtered. Only the RTAC (source IP 10.30.30.20,
      the OT Ops interface — host-level hardening routes field
      traffic through the firewall) is allowed through. This
      confirms the Modbus override attack path from the Modbus Override exercise
      is blocked.

  - title: "Capture PCAP evidence"
    description: >
      From the firewall terminal (fw-1 on the Network Map),
      capture traffic on the field_net interface (eth3) to
      document which hosts are communicating with field devices.
      Under the improved config, RTAC-to-field ICS traffic
      transits containd and is visible on eth3:

        tcpdump -i eth3 -w /data/captures/validation.pcap \
          tcp port 502 or tcp port 20000

      Let it run for 30 seconds while the RTAC polls, then
      stop with Ctrl-C. Examine the capture on fw-1:

        tcpdump -r /data/captures/validation.pcap -nn \
          | awk '{print $3, $5}' | sort | uniq -c | sort -rn

      The only Modbus/DNP3 traffic to field devices should be
      from the RTAC (source IP 10.30.30.20). No enterprise,
      vendor, or other OT source IPs should appear talking to
      10.40.40.x.

  - title: "Document validation results"
    description: >
      Summarize your evidence package:

      Positive tests (PASS = authorized traffic works):
      - RTAC → relay Modbus: PASS / FAIL
      - RTAC → recloser DNP3: PASS / FAIL
      - RTAC → regulator DNP3: PASS / FAIL
      - HMI → RTAC HTTP: PASS / FAIL

      Negative tests (PASS = unauthorized traffic blocked):
      - Enterprise → field Modbus: PASS / FAIL
      - Enterprise → field DNP3: PASS / FAIL
      - Vendor → field Modbus: PASS / FAIL
      - Non-RTAC OT → field Modbus: PASS / FAIL

      Evidence artifacts:
      - PCAP file: validation.pcap
      - Firewall config: improved (active)
      - Containd rule hit counts from Segmentation tab

      This evidence package is what you'd present to a change
      board before moving segmentation changes to production.
    action:
      type: check
      expect:
        firewall_config: improved
        breaker_closed: true
