id: validation-evidence
order: "2.4"
name: "Testing & Validation"
summary: "Generate a change-board validation report (authorized/unauthorized tests + PCAP) against the policy you have active, then reflect on residual risk."
estimated_minutes: 6
description: >
  After applying the hardened firewall configuration in Lab 2.2 and
  stress-testing it in Lab 2.3, this exercise builds the formal
  evidence package: positive tests confirming authorized flows still
  work, negative tests confirming unauthorized flows are blocked, and
  PCAP evidence from the firewall. You generate it in one click against
  the policy you have active - then read it like a reviewer would. This
  is the validation step required before any segmentation change goes to
  production.
nodes:
  - kali-1
  - vendor-jump-1
tags:
  - validation
  - testing
  - pcap
  - evidence
  - defense
steps:
  - title: "Confirm hardened config is active"
    expected_config: hardened
    description: |
      You're now validating the work you did across Labs 1.2 → 2.3. Below is the design + plan you committed; this validation pass tests whether the firewall enforces what you specified.

      :::findings-panel from=segmentation-requirements title="Your design verdicts (Lab 1.3)"
      enterprise-to-field: Enterprise → Field on Modbus/DNP3
      enterprise-to-ot: Enterprise → OT Operations on ICS ports
      vendor-to-ot: Vendor DMZ → OT Operations on Modbus/HMI control
      non-rtac-to-field: Non-RTAC OT hosts → Field devices
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      **Start with the policy banner above this step.** If it shows
      green ("Hardened reference" or "Your custom policy"), the
      hardened policy you built earlier is still loaded and you're
      ready to validate. If it shows amber ("Policy mismatch"),
      re-apply it via the policy-action buttons below the step -
      **Apply Hardened** for the reference policy, or **Apply Your
      Plan** to reload the one you built in Lab 2.2 - before
      continuing. (You're validating an existing policy here, not
      authoring a new one.) The validation in the next step runs
      against whatever policy is active, so make sure it's the one
      you intend to certify.

      :::hint Optional: cross-check the running policy in containd
      Once the banner is green, you can confirm the running policy from
      either interface:

      - **Web UI:** [http://localhost:9080](http://localhost:9080),
        Policy & Rules → Firewall Rules (or Configuration → Running).
      - **CLI:** from the `fw-1` terminal, `containd cli` then:

            show running-config

      Either should show the hardened rule set: RTAC source-pinned to
      field, vendor restricted to SSH/HTTPS, enterprise-to-field
      removed, default deny on cross-zone.
      :::

      **Time budget:** ~6 minutes (Guided path - one-click report plus reflection. The by-hand Advanced verification hints are optional).
    action:
      type: check
      expect:
        firewall_config: improved

  - title: "Generate the validation report"
    expected_config: hardened
    description: |
      A segmentation change ships with *evidence*: proof that authorized
      flows still work, proof that unauthorized flows are blocked, and a
      capture showing only the RTAC reaching field devices. Rather than run
      nineteen probes by hand, generate the evidence package against the
      policy you have active:

      :::validation-report
      :::

      The report runs the full authorized + unauthorized test matrix,
      captures PCAP at the firewall, and analyzes which sources reached the
      field zone - the same work an operator does after a change, assembled
      into a change-board-ready document. A green **PASS** means every
      authorized flow works and every unauthorized flow is blocked.

      **Read the report, not just the verdict:**

      - Each **✗ authorized** row means a rule is too tight - it's blocking a
        flow operations depend on. Each **✗ unauthorized** row means a rule
        is missing or too loose - an attack path is still open.
      - The **PCAP source analysis** should show only `10.30.30.20` (the
        RTAC) and `10.30.30.50` (GPS/NTP) reaching the field zone. Any other
        source IP is a leak.
      - This grades the policy you *actually* have active - if you applied
        your own plan in Lab 2.2, it certifies *your* policy, not the
        reference. A FAIL here is the lab telling you your plan left a gap;
        go back, tighten the rule, and re-run.

      ### Confirm operations at the HMI

      The report proves *enforcement*; the HMI proves *operations didn't
      break*. Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab: no alarm banner, breaker + recloser closed, both loads energized,
      customers served - identical to the Lab 2.3 baseline. The combination
      (report PASS + HMI normal) is the two-sided evidence a change board
      needs: attacks are blocked *and* the substation still runs.

      :::decision id=pos-test-ops-intact options=NORMAL_OPS,DEGRADED,ALARMS_PRESENT correct=NORMAL_OPS
      **After validation, does the HMI show normal operations (authorized
      flows worked AND the substation still runs)?**
      :::

      :::decision id=neg-test-no-impact options=UNCHANGED,DEGRADED,UNCLEAR correct=UNCHANGED
      **Did every unauthorized flow in the report come back blocked, with the
      HMI unchanged from baseline?**
      :::

      :::hint Advanced: run the positive tests by hand
      The report automates this, but the manual method is what you'd do on a
      real appliance. From the **RTAC** terminal, confirm authorized flows:

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20
          dnp3poll 10.40.40.20:20000 -a 1
          dnp3poll 10.40.40.21:20000 -a 2
          dnp3poll 10.40.40.22:20000 -a 3

      All should return data. Then intra-zone HMI → RTAC, and the RTAC's
      aggregated field-comms view:

          curl -s http://10.30.30.20:8080/api/health
          curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool

      `device_comms` should be `true` for every field device. From
      **vendor-jump** (`10.20.20.10`), the hardened policy keeps SSH/HTTPS
      open for vendor monitoring (but blocks Modbus/DNP3):

          ssh -o StrictHostKeyChecking=no rangerdanger@10.30.30.20 'hostname'
          curl -ks https://10.30.30.20/ -o /dev/null -w '%{http_code}\n'

      Both should succeed (banner + `200`) - proof the "encrypted-management
      only" allowance is enforced, not just declared.
      :::

      :::hint Advanced: run the negative tests by hand
      From **Kali** (`10.10.10.50`, enterprise) - lead with DNP3, the primary
      attack vector from Lab 2.3:

          nmap -p 20000 10.40.40.20 --max-retries 1 -T4
          dnp3poll 10.40.40.20:20000 -a 1

      From **vendor-jump** (`10.20.20.10`) - the vendor-pivot path (Lab
      2.3-bonus):

          nmap -p 20000 10.40.40.21 --max-retries 1 -T4
          dnp3poll 10.40.40.21:20000 -a 2

      From **historian** (a single-homed non-RTAC OT host) - the source-pin
      test: only the RTAC may reach field, even from inside OT Ops:

          nmap -p 20000 10.40.40.22 --max-retries 1 -T4

      All should be filtered / time out. The same L4 source-pin closes Modbus
      too - repeat with port 502 and `mbpoll` for a two-protocol package.
      Any single-homed OT host (historian-sim, fuxa-hmi, openplc) works as
      the probe source.
      :::

      :::hint Advanced: capture PCAP by hand
      The report captures this automatically; the manual form, from the
      `fw-1` terminal, uses `-i any` + a BPF subnet filter (Docker's `ethN`
      ordering drifts between hosts):

          tcpdump -i any -nn 'net 10.40.40.0/24 and (tcp port 502 or tcp port 20000)' -w /data/captures/validation.pcap

      Let it run ~30s while the RTAC polls, Ctrl-C, then see who's on the
      wire:

          tcpdump -r /data/captures/validation.pcap -nn | awk '{print $3, $5}' | sort | uniq -c | sort -rn

      The only Modbus/DNP3 sources reaching field should be `10.30.30.20`
      (the RTAC).
      :::

      :::hint Advanced: assemble the evidence package by hand
      Beyond the test results + PCAP, a change board wants the policy itself
      and proof it's the one running. From the `fw-1` terminal:

          export config > /data/student-policy.json
          show audit

      `export config` is the change-board-ready record of the running rule
      set; the recent `config.commit` entries in `show audit` prove the
      policy you attached is the policy that's loaded. Add an **HMI
      screenshot** (Feeder One-Line, no alarms, customers served) for the
      operational side. Per-rule deny events for each blocked probe are in
      the [/console](/console) Segmentation drawer's **Live DPI Events**
      strip - each row is kernel-side proof the rule fired.
      :::
    action:
      type: check
      expect:
        firewall_config: improved
        breaker_closed: true

  - title: "Reflection - what did your plan close?"
    description: |
      Before wrapping up, take five minutes to look at what your plan addressed vs deferred.

      Below are the design verdicts and findings you committed across the planning labs. The Plan Coverage panel in [Lab 1.4](/exercises/remediation-planning) shows, in real-time, which of these your selected actions implement and which remain gaps. Use that as the structured input to your reflection.

      :::findings-panel from=baseline-assessment title="What you observed (Lab 1.2 step 6)"
      enterprise-to-field: Enterprise → Field on Modbus/DNP3
      enterprise-to-ot: Enterprise → OT Operations on ICS ports
      vendor-to-ot: Vendor DMZ → OT Operations on Modbus/HMI control
      non-rtac-to-field: Non-RTAC OT hosts → Field devices
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      :::findings-panel from=baseline-assessment title="What active probing revealed (Lab 1.2 step 7)"
      latent-exposure-confirmed: Latent exposure beyond passive observation
      :::

      :::findings-panel from=segmentation-requirements title="What you committed to as design (Lab 1.3)"
      enterprise-to-field: Enterprise → Field
      enterprise-to-ot: Enterprise → OT Operations
      vendor-to-ot: Vendor DMZ → OT Operations
      non-rtac-to-field: Non-RTAC OT hosts → Field
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      ### Other observations from Lab 2.2 / 2.3

      - **Firewall visibility blind spot at the RTAC.** The RTAC is multi-homed (it polls field devices over DNP3/Modbus) but its application traffic is routed through containd by host-level hardening (the `rtac-architecture-review` action). Worth noting as a compensating control on your evidence package, not a network-layer enforcement. The RTAC is the *only* host with a leg in field_net - every other OT host is single-homed on ot_ops_net.
      - **No protocol-aware constraints by default.** L4 port filtering doesn't distinguish reads from writes; the `modbus-dpi` and `dnp3-dpi` actions close that gap.

      ### What your plan closed vs deferred

      :::plan-coverage title="Coverage of your committed Lab 1.3 design"
      :::

      The panel above is computed live from your Lab 1.4 selections. Each requirement is marked **fully addressed**, **partial**, **deferred** (gap), or **n/a** (you marked the verdict as ALLOW or didn't commit one). This is the structured input for your reflection - answer the prompts below against what the panel shows.

      ### Now reflect

      Take five minutes in your Exercise Notes to answer:

      1. **Which findings did your plan close?** The "fully addressed" rows above. Map each to the action in your plan that implements it.
      2. **Which findings remain open as residual risk?** The "deferred" or "partial" rows. What's the operational impact if those residuals are exploited? Why did you defer them - labor budget, role capacity, or design choice?
      3. **What would you revisit next quarter?** Given a fresh labor budget, which deferred remediation would you pull in first? Why?
      4. **What would you change about the substation architecture itself?** The firewall is one layer; what additional controls (host hardening, monitoring, change management) would deepen defense in depth?

      These answers travel with you into the next planning cycle. Defensible segmentation is continuous - this is the start of the next iteration, not the end.
