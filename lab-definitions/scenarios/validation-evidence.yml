id: validation-evidence
order: "2.4"
name: "Testing & Validation"
summary: "Run a holistic positive/negative test pass against your hardened policy, capture PCAP evidence, and assemble a change-board ready package (15 min)."
description: >
  After applying the hardened firewall configuration in Lab 2.2 and
  stress-testing it in Lab 2.3, this exercise builds the formal
  evidence package: positive tests confirming authorized flows still
  work, negative tests confirming unauthorized flows are blocked,
  and PCAP evidence from the firewall. This is the validation step
  required before any segmentation change goes to production.
nodes:
  - kali-1
  - vendor-jump-1
tags:
  - validation
  - testing
  - pcap
  - evidence
  - defense
steps:
  - title: "Confirm hardened config is active"
    expected_config: hardened
    description: |
      You're now validating the work you did across Labs 1.2 → 2.3. Below is the design + plan you committed; this validation pass tests whether the firewall enforces what you specified.

      :::findings-panel from=segmentation-requirements title="Your design verdicts (Lab 1.3)"
      enterprise-to-field: Enterprise → Field on Modbus/DNP3
      enterprise-to-ot: Enterprise → OT Operations on ICS ports
      vendor-to-ot: Vendor DMZ → OT Operations on Modbus/HMI control
      non-rtac-to-field: Non-RTAC OT hosts → Field devices
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      Confirm the hardened firewall policy is loaded.

      **Web UI:** open [http://localhost:9080](http://localhost:9080)
      and check the policy summary on the dashboard - it should
      reflect the rule set you built in Lab 2.2 (or the reference
      hardened policy if you used **Apply Hardened**).

      **CLI:** from the `fw-1` terminal, run `containd cli`, then:

          show running-config

      You should see the hardened rule set: RTAC source-pinned to
      field, vendor restricted to SSH/HTTPS, enterprise-to-field
      removed, default deny on cross-zone. If the weak baseline is
      still active, apply the hardened config with **Apply Hardened**
      or **Apply Your Plan** and re-check.

      **Time budget:** 15 minutes.
    action:
      type: check
      expect:
        firewall_config: improved

  - title: "Positive tests - authorized flows still work"
    description: |
      Verify the flows the substation depends on are unaffected by
      the hardened policy. From the **RTAC** terminal:

      Modbus poll to a relay:

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20

      DNP3 polls across all three field outstations:

          dnp3poll 10.40.40.20:20000 -a 1
          dnp3poll 10.40.40.21:20000 -a 2
          dnp3poll 10.40.40.22:20000 -a 3

      All should return data. Then confirm intra-zone HMI → RTAC
      traffic is still flowing - in real life you'd open the HMI
      and check live data updates. As a lab smoke test from any
      OT Ops node:

          curl -s http://10.30.30.20:8080/api/health

      Should return `{"status":"ok"}` (the lab's RTAC health helper -
      same convenience class as `/api/state`).

      For a single-pane view of all field-device comms, hit the lab's
      RTAC state API (lab convenience - real RTACs don't expose a
      JSON `/api/state`; their status surfaces in the SCADA system):

          curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool

      `device_comms` should be `true` for every field device.

      **Vendor management to OT** (from vendor-jump, 10.20.20.10) - the
      improved policy keeps SSH and HTTPS open from DMZ → OT for vendor
      monitoring. Verify the listener responds:

          ssh -o StrictHostKeyChecking=no rangerdanger@10.30.30.20 'hostname'
          curl -ks https://10.30.30.20/ -o /dev/null -w '%{http_code}\n'

      Both should succeed (SSH banner + `200`). This proves the
      "encrypted-management-only" allowance is enforced, not just
      declared. Modbus / DNP3 from vendor-jump to RTAC must still
      be blocked - `firewall-smoke.sh` covers that contrast row.

      ### Confirm operations are intact at the HMI

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. After your positive tests, the operational state should
      look identical to the Lab 2.3 step 1 baseline:

      - **No alarm banner** at the top
      - **Feeder Breaker (52)** and **Recloser (79)** both closed
      - **General + Critical Load** both energized (green kW)
      - **Customer-service tile:** "N kW serving ~M customers"
      - **Critical-load voltage** chip green, in the 114-126V band

      This is the "operations aren't broken" half of the evidence
      package — the change board needs to see both that unauthorized
      traffic is blocked *and* that the substation still runs.

      :::decision id=pos-test-ops-intact options=NORMAL_OPS,DEGRADED,ALARMS_PRESENT correct=NORMAL_OPS
      **After the positive tests, does the HMI show normal operations?**
      :::

  - title: "Negative tests - unauthorized flows blocked"
    description: |
      Verify the cross-zone paths your policy closed are actually
      unreachable. Each subsection probes a different L4 rule —
      lead with DNP3 (the primary distribution-substation attack
      vector you exercised in Lab 2.3); the optional sidebar at the
      bottom shows the same rules close Modbus too.

      **Enterprise → Field DNP3** (from Kali, 10.10.10.50):

          nmap -p 20000 10.40.40.20 --max-retries 1 -T4
          dnp3poll 10.40.40.20:20000 -a 1

      Port should be filtered; `dnp3poll` should time out.

      **Vendor → Field DNP3** (from vendor-jump, 10.20.20.10):

          nmap -p 20000 10.40.40.21 --max-retries 1 -T4
          dnp3poll 10.40.40.21:20000 -a 2

      Should be filtered / timeout. Confirms the vendor-pivot attack
      path (Lab 2.3-bonus) is closed against the field zone.

      **From historian** (`historian-1` on the [Network Map](/console)) — represents a typical lan1-only non-RTAC OT host. The historian sits on OT Ops only; it has no direct field interface:

          nmap -p 20000 10.40.40.22 --max-retries 1 -T4

      Should be filtered / time out. Only the RTAC (source IP `10.30.30.20`, its OT Ops interface) is allowed through. This is the source-pin lesson from Labs 1.3 / 1.4 / 2.2 in action — even an attacker who lands on an OT host can't reach field devices unless they ARE the RTAC. Document each blocked attempt for the evidence package.

      :::hint Optional: also confirm Modbus is blocked
      The hardened policy applies the same L4 source-pin and DPI
      rules on Modbus (TCP/502) as on DNP3. If you want a two-protocol
      evidence package — or if you ran the Modbus sidebar attacks in
      Lab 2.3 — repeat the three probes above with port 502 and
      `mbpoll` instead of port 20000 and `dnp3poll`:

          # Enterprise → Field Modbus
          nmap -p 502 10.40.40.20 --max-retries 1 -T4
          mbpoll -a 1 -t 0 -r 1 10.40.40.20 -c 1 -1

          # Vendor → Field Modbus
          nmap -p 502 10.40.40.21 --max-retries 1 -T4
          mbpoll -a 1 -t 0 -r 1 10.40.40.21 -c 1 -1

          # Non-RTAC OT → Field Modbus
          nmap -p 502 10.40.40.22 --max-retries 1 -T4

      All filtered / timeout. The same source-pin rule closes both
      protocols; documenting both gives the change board a complete
      cross-protocol picture rather than a single-protocol snapshot.
      :::

      :::hint Pick any single-homed OT host as the probe source
      historian-sim, fuxa-hmi, and openplc all live on `ot_ops_net`
      only - single-homed, no direct field interface, every probe
      to `10.40.40.x` must traverse the firewall. Any of them is
      a clean enforcement test. The example uses historian; you'd
      see the same result from any of the three.
      :::

      ### Confirm the HMI is unchanged

      Switch to the [Feeder HMI](/substation) → **Feeder One-Line**
      tab. After every blocked probe above, the HMI should look
      exactly like it did before you started — no alarms, breaker
      closed, customers served. **The absence of change is the
      evidence.** Compare against what you saw in Lab 2.3 when the
      same writes from the same sources ran *under the weak policy*
      and produced visible outages.

      :::decision id=neg-test-no-impact options=UNCHANGED,DEGRADED,UNCLEAR correct=UNCHANGED
      **After all the negative tests, is the HMI unchanged from baseline?**
      :::

      :::hint Live DPI events for blocked attempts
      The [Network Map](/console) Segmentation drawer has a **Live DPI
      Events** strip that surfaces each blocked probe in real time —
      containd's L4 event emission shipped in v0.1.25 (closes
      [containd #19](https://github.com/tonylturner/containd/issues/19)).
      After running the negative probes above, you should see a row
      per blocked attempt with `verdict: DENY` and the matching rule
      ID. If the strip stays empty after a probe, check that the
      hardened policy is committed and the `nflogGroup` is set on the
      lab profile — the L4 events ride the NFLOG group containd
      configures from the lab YAML. The HMI unchanged-state plus the
      DPI events together are your two-source evidence: the HMI
      proves operations didn't break, the DPI events prove the
      firewall is the reason why.
      :::

  - title: "Capture PCAP evidence"
    node: fw-1
    description: |
      From the firewall terminal (`fw-1`), capture all traffic going
      to the field zone (`10.40.40.0/24`) regardless of which kernel
      interface that subnet currently lives on. Docker's `ethN`
      ordering varies across hosts, so a `tcpdump -i eth3` can drift
      under you between machines and even between rebuilds; the
      portable form is `-i any` plus a BPF subnet filter:

          tcpdump -i any -nn 'net 10.40.40.0/24 and (tcp port 502 or tcp port 20000)' \
            -w /data/captures/validation.pcap

      Let it run for 30 seconds while the RTAC polls, then stop with
      Ctrl-C. Check what's on the wire:

          tcpdump -r /data/captures/validation.pcap -nn \
            | awk '{print $3, $5}' | sort | uniq -c | sort -rn

      The only Modbus / DNP3 sources reaching field devices should
      be `10.30.30.20` (the RTAC). No enterprise, vendor, or other
      OT source IPs should appear talking to `10.40.40.x`.

  - title: "Assemble the evidence package"
    description: |
      Summarize the package you'd take to a change board.

      **Positive tests** (PASS = authorized traffic works):
      - RTAC → relay Modbus
      - RTAC → recloser DNP3
      - RTAC → regulator DNP3
      - HMI → RTAC HTTP (intra-zone)
      - All `device_comms` true

      **Negative tests** (PASS = unauthorized traffic blocked):
      - Enterprise → field Modbus
      - Enterprise → field DNP3
      - Vendor → field Modbus
      - Non-RTAC OT → field Modbus

      **Artifacts to attach**:

      - `/data/captures/validation.pcap` — the firewall-side PCAP
        showing only RTAC sources reaching field on Modbus / DNP3
      - **Active policy export** — from the `fw-1` terminal:

            containd cli
            containd# export config > student-policy.json
            containd# shell
            $ cat /tmp/student-policy.json

        attach the JSON. This is the change-board-ready record of the
        rule set that's actually running.
      - **`show audit` output** — from the same `containd cli`, run
        `show audit` and snapshot the recent `config.commit` /
        `config.save_candidate` entries. This proves the policy you
        attached is the policy that's loaded.
      - **HMI screenshot** — the [Feeder HMI](/substation) **Feeder
        One-Line** tab after the negative-test pass, showing no
        alarms and customers served. This is the operational
        side of the evidence: blocking attacks didn't break ops.

      - **Per-rule deny event export** — the firewall's
        `/api/substation/network-events` stream shows each negative-test
        probe being rejected at the rule level, with timestamps,
        source/dest IPs, and the matched `ruleId`. From the eng-ws
        terminal:

            curl -s http://backend:8080/api/substation/network-events \
              | jq '.events[] | select(.attributes.action=="DENY")'

        Snapshot the DENY entries that correspond to your negative
        tests above. Each row is a kernel-side proof that the rule
        you wrote actually fired against the probe you ran — the
        change board sees policy intent (`student-policy.json`)
        and policy reality (these event rows) side by side. The
        same data drives the **Live DPI Events strip** in the
        [`/console` Segmentation panel](/console) — useful for
        watching enforcement happen in real time as you run probes.

      Capture pass/fail for each test in your Exercise Notes. This
      is the evidence package - a change board needs to see both
      that operations still work and that the new denies are real.
    action:
      type: check
      expect:
        firewall_config: improved
        breaker_closed: true

  - title: "Reflection - what did your plan close?"
    description: |
      Before wrapping up, take five minutes to look at what your plan addressed vs deferred.

      Below are the design verdicts and findings you committed across the planning labs. The Plan Coverage panel in [Lab 1.4](/exercises/remediation-planning) shows, in real-time, which of these your selected actions implement and which remain gaps. Use that as the structured input to your reflection.

      :::findings-panel from=baseline-assessment title="What you observed (Lab 1.2 step 6)"
      enterprise-to-field: Enterprise → Field on Modbus/DNP3
      enterprise-to-ot: Enterprise → OT Operations on ICS ports
      vendor-to-ot: Vendor DMZ → OT Operations on Modbus/HMI control
      non-rtac-to-field: Non-RTAC OT hosts → Field devices
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      :::findings-panel from=baseline-assessment title="What active probing revealed (Lab 1.2 step 7)"
      latent-exposure-confirmed: Latent exposure beyond passive observation
      :::

      :::findings-panel from=segmentation-requirements title="What you committed to as design (Lab 1.3)"
      enterprise-to-field: Enterprise → Field
      enterprise-to-ot: Enterprise → OT Operations
      vendor-to-ot: Vendor DMZ → OT Operations
      non-rtac-to-field: Non-RTAC OT hosts → Field
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      ### Other observations from Lab 2.2 / 2.3

      - **Firewall visibility blind spot at the RTAC.** The RTAC is multi-homed (it polls field devices over DNP3/Modbus) but its application traffic is routed through containd by host-level hardening (the `rtac-architecture-review` action). Worth noting as a compensating control on your evidence package, not a network-layer enforcement. The RTAC is the *only* host with a leg in field_net - every other OT host is single-homed on ot_ops_net.
      - **No protocol-aware constraints by default.** L4 port filtering doesn't distinguish reads from writes; the `modbus-dpi` and `dnp3-dpi` actions close that gap.

      ### What your plan closed vs deferred

      :::plan-coverage title="Coverage of your committed Lab 1.3 design"
      :::

      The panel above is computed live from your Lab 1.4 selections. Each requirement is marked **fully addressed**, **partial**, **deferred** (gap), or **n/a** (you marked the verdict as ALLOW or didn't commit one). This is the structured input for your reflection - answer the prompts below against what the panel shows.

      ### Now reflect

      Take five minutes in your Exercise Notes to answer:

      1. **Which findings did your plan close?** The "fully addressed" rows above. Map each to the action in your plan that implements it.
      2. **Which findings remain open as residual risk?** The "deferred" or "partial" rows. What's the operational impact if those residuals are exploited? Why did you defer them - labor budget, role capacity, or design choice?
      3. **What would you revisit next quarter?** Given a fresh labor budget, which deferred remediation would you pull in first? Why?
      4. **What would you change about the substation architecture itself?** The firewall is one layer; what additional controls (host hardening, monitoring, change management) would deepen defense in depth?

      These answers travel with you into the next planning cycle. Defensible segmentation is continuous - this is the start of the next iteration, not the end.
