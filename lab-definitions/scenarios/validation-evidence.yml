id: validation-evidence
order: "2.4"
name: "Testing & Validation"
summary: "Run a holistic positive/negative test pass against your hardened policy, capture PCAP evidence, and assemble a change-board ready package (15 min)."
description: >
  After applying the hardened firewall configuration in Lab 2.2 and
  stress-testing it in Lab 2.3, this exercise builds the formal
  evidence package: positive tests confirming authorized flows still
  work, negative tests confirming unauthorized flows are blocked,
  and PCAP evidence from the firewall. This is the validation step
  required before any segmentation change goes to production.
nodes:
  - kali-1
  - vendor-jump-1
tags:
  - validation
  - testing
  - pcap
  - evidence
  - defense
steps:
  - title: "Confirm hardened config is active"
    expected_config: hardened
    description: |
      Confirm a hardened firewall policy is loaded. Check via API:

          curl -s http://localhost:8088/api/firewall/active

      Active config should be `improved` or `custom` (your own
      policy from Lab 2.2). If the weak baseline is still active,
      apply the hardened config with **Apply Hardened** or
      **Apply Your Plan**.

      **Time budget:** 15 minutes.
    action:
      type: check
      expect:
        firewall_config: improved

  - title: "Positive tests — authorized flows still work"
    description: |
      Verify the flows the substation depends on are unaffected by
      the hardened policy. From the **RTAC** terminal:

      Modbus poll to a relay:

          mbpoll -m tcp -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20

      DNP3 polls across all three field outstations:

          dnp3poll 10.40.40.20:20000 -a 1
          dnp3poll 10.40.40.21:20000 -a 2
          dnp3poll 10.40.40.22:20000 -a 3

      All should return data. Then from any **OT Ops** node, confirm
      intra-zone HMI → RTAC traffic still works:

          curl -s http://10.30.30.20:8080/api/health

      Should return `{"status":"ok"}`.

      For a single sanity-check view of all comms, hit the lab's
      RTAC state API (supplementary — not available on real RTACs):

          curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool

      `device_comms` should be `true` for every field device.

  - title: "Negative tests — unauthorized flows blocked"
    description: |
      Verify the cross-zone paths your policy closed are actually
      unreachable.

      **Enterprise → Field** (from Kali, 10.10.10.50):

          nmap -p 502,8080,20000 10.40.40.20 --max-retries 1 -T4
          mbpoll -a 1 -t 0 -r 1 10.40.40.20 -c 1 -1
          dnp3poll 10.40.40.20:20000 -a 1

      All ports should be filtered; mbpoll/dnp3poll should time out.

      **Vendor → Field** (from vendor-jump, 10.20.20.10):

          nmap -p 502,20000 10.40.40.21 --max-retries 1 -T4
          mbpoll -a 1 -t 0 -r 1 10.40.40.21 -c 1 -1

      Should be filtered / timeout. This confirms the vendor-pivot
      attack path (Lab 2.3-bonus) is closed.

      **Non-RTAC OT Ops → Field** (from any non-RTAC OT host, e.g.
      OpenPLC at 10.30.30.30):

          nmap -p 502,20000 10.40.40.22 --max-retries 1 -T4

      Should be filtered. Only the RTAC (source IP 10.30.30.20,
      its OT Ops interface) is allowed through. Document each
      blocked attempt for the evidence package.

  - title: "Capture PCAP evidence"
    node: fw-1
    description: |
      From the firewall terminal (`fw-1`), capture traffic on the
      field-net interface (`eth3`) to document which hosts are
      actually communicating with field devices under the hardened
      policy:

          tcpdump -i eth3 -w /data/captures/validation.pcap \
            tcp port 502 or tcp port 20000

      Let it run for 30 seconds while the RTAC polls, then stop with
      Ctrl-C. Check what's on the wire:

          tcpdump -r /data/captures/validation.pcap -nn \
            | awk '{print $3, $5}' | sort | uniq -c | sort -rn

      The only Modbus / DNP3 sources reaching field devices should
      be `10.30.30.20` (the RTAC). No enterprise, vendor, or other
      OT source IPs should appear talking to `10.40.40.x`.

  - title: "Assemble the evidence package"
    description: |
      Summarize the package you'd take to a change board.

      **Positive tests** (PASS = authorized traffic works):
      - RTAC → relay Modbus
      - RTAC → recloser DNP3
      - RTAC → regulator DNP3
      - HMI → RTAC HTTP (intra-zone)
      - All `device_comms` true

      **Negative tests** (PASS = unauthorized traffic blocked):
      - Enterprise → field Modbus
      - Enterprise → field DNP3
      - Vendor → field Modbus
      - Non-RTAC OT → field Modbus

      **Artifacts**:
      - `/data/captures/validation.pcap`
      - Active firewall config (`improved` or `custom`)
      - containd rule hit counts from the Segmentation tab
      - Per-rule logs for the deny actions you triggered

      Capture pass/fail for each test in your Exercise Notes. This
      is the evidence package — a change board needs to see both
      that operations still work and that the new denies are real.
    action:
      type: check
      expect:
        firewall_config: improved
        breaker_closed: true

  - title: "Reflection — what did your plan close?"
    description: |
      Before wrapping up, take five minutes to write down answers in
      your Exercise Notes:

      1. **Which of the 5 baseline findings did your plan close?**
         (Vendor too broad, Enterprise → ICS, no DPI, any-OT → field,
         RTAC blind spot.) Map each finding to a remediation action
         you selected in Lab 1.4.

      2. **Which findings remain open as residual risk?** (The
         actions you deferred in Lab 1.4 due to budget or role
         capacity.) What's the operational impact if those
         residuals are exploited?

      3. **What would you revisit next quarter?** Given a fresh
         labor budget, which deferred remediation would you pull
         in first? Why?

      4. **What would you change about the substation architecture
         itself?** The firewall is one layer; what additional
         controls (host hardening, monitoring, change management)
         would deepen defense in depth?

      These answers travel with you into the next planning cycle.
      Defensible segmentation is continuous — this is the start of
      the next iteration, not the end.
