id: firewall-implementation
order: "2.2"
name: "Firewall Policy Implementation"
summary: "Apply a least-privilege segmentation policy on the containd NGFW, replacing the weak baseline with enforceable rules, then validate it holds (~15 min, Guided track)."
description: >
  You have identified the required flows, designed your
  requirements, and planned which remediations to execute.
  Now you implement. You will replace the permissive weak
  baseline on the containd NGFW with a least-privilege policy -
  applying it with one click on the Guided track, or authoring
  the rules yourself on the Advanced track. By the end,
  unauthorized cross-zone traffic will be blocked and logged,
  while critical substation operations continue without
  interruption.
nodes:
  - fw-1
  - kali-1
  - eng-ws-1
tags:
  - segmentation
  - firewall
  - defense
  - containd
steps:
  - title: "Exercise overview"
    expected_config: weak
    description: |
      In the Baseline Traffic Analysis, Segmentation Requirements, and Remediation Planning exercises you captured baseline traffic, designed zone-pair requirements, and selected which remediations to execute under labor budget. This exercise is where those design decisions become real firewall policy.

      Your prior work is summarised below - your design verdicts and findings drive the rule set you'll build in Phase 3.

      :::findings-panel from=segmentation-requirements title="Your design verdicts (Lab 1.3)"
      enterprise-to-field: Enterprise → Field on Modbus/DNP3
      enterprise-to-ot: Enterprise → OT Operations on ICS ports
      vendor-to-ot: Vendor DMZ → OT Operations on Modbus/HMI control
      non-rtac-to-field: Non-RTAC OT hosts → Field devices
      unauth-modbus-writes: Unauthorized Modbus writes / DNP3 Direct Operate
      :::

      :::findings-panel from=baseline-assessment title="What your assessment confirmed (Lab 1.2)"
      latent-exposure-confirmed: Active probing revealed latent exposure beyond passive observation
      :::

      ### How you'll work

      This lab runs **Guided by default**: you apply the policy with the
      buttons below the step (**Apply Hardened** / **Apply Your Plan**) and
      walk containd's UI and CLI to understand exactly what landed - no
      rule syntax and no commit step. The policy banner at the top of
      every step tells you what is currently running.

      Prefer to author and commit the rules yourself? Switch to the
      **Advanced** track below - recommended only if you're comfortable
      with firewall policy syntax. You can switch anytime from the track
      chip at the top of each step.

      :::track-picker
      :::

      You will:

      1. Verify your access to the containd NGFW
      2. Confirm the weak baseline is active and document what it allows
      3. Remove the broad permissive rules and establish default-deny
      4. Create minimal allow rules for each required flow
      5. Enable logging for visibility
      6. Validate that operations still work
      7. Validate that unauthorized traffic is blocked
      8. Export your finished policy

      **Time budget:** ~15 minutes on the Guided track (longer if you author rules yourself on Advanced). The containd firewall supports both a web UI and a CLI - use whichever you prefer.

  - title: "Why this matters"
    expected_config: weak
    description: |
      Segmentation is only real when it is enforced in policy and validated through observed traffic.

      A network diagram that shows zone boundaries is not segmentation. A requirements document that lists allowed flows is not segmentation. A firewall with permissive rules and no logging is not segmentation.

      Segmentation becomes real the moment you can prove two things:

      1. **Authorized traffic works.** The RTAC polls field devices. GPS delivers NTP. The HMI reads state. Operations continue.
      2. **Unauthorized traffic fails.** A Modbus write from the enterprise zone is denied. A DNP3 command from the vendor zone is blocked. The firewall logs the attempt.

      That is what you will put in place over the next ~15 minutes.

  - title: "Verify access to containd"
    expected_config: weak
    description: |
      Confirm you can reach the containd NGFW through either of its
      management interfaces. **Use whichever you prefer in this lab -
      both the Web UI and the CLI expose the same policy.**

      **Option 1: Web UI**

      Open [http://localhost:9080](http://localhost:9080). The dashboard
      shows zone interface status for all four networks (`wan`, `dmz`,
      `lan1`, `lan2`) and the current rule count.

      **Option 2: containd CLI**

      The `fw-1` terminal tab on the [Network Map](/console) opens
      directly into the **containd appliance CLI**. You'll see the
      `containd# ` prompt. List the interfaces and the running
      policy:

          show interfaces
          show running-config

      You should see four zones (`wan`, `dmz`, `lan1`, `lan2`) and
      a set of broad allow rules - this is the weak baseline. If you
      see rules that allow broad cross-zone traffic (enterprise to
      field, vendor to field, any-to-any on ICS ports), the weak
      baseline is active. That is your starting point.

      ### Switching between the CLI and bash

      Two prompts, one terminal:

      | Prompt | What you can run | How you got here |
      |---|---|---|
      | `containd#` | `show *`, `set *`, `commit`, `export config` - appliance commands | Default; opens here |
      | `$` (bash) | `tcpdump`, `nft`, `ip`, generic Linux | Type `shell`, `bash`, or `exit` from `containd#` |

      **From bash back to the CLI: type `containd cli`.** (`config` and
      `configure` look like they should work but are unrelated - they
      run the containd daemon binary. Only `containd cli` enters the
      appliance shell.)

  - title: "Phase 1 - Verify current access under the weak baseline"
    expected_config: weak
    description: |
      Before you change anything, run the commands that confirmed your latent exposure in Lab 1.2 step 7 - this time with intent. Document what the weak baseline allows. This is your "before" picture; every test below should succeed right now, and should fail after you finish building your policy.

      **From the kali terminal** (`kali-1` on the [Network Map](/console)):

      Test Modbus read from enterprise to field relay:

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20

      Test DNP3 poll from enterprise to field relay:

          dnp3poll 10.40.40.20:20000 -a 1

      Test DNP3 poll from enterprise to field recloser:

          dnp3poll 10.40.40.21:20000 -a 2

      Test Modbus read from enterprise to field recloser:

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.21

      **From the eng-ws terminal** (`eng-ws-1` on the [Network Map](/console)):

      Test Modbus read from vendor to field regulator:

          mbpoll -a 1 -r 1 -c 2 -1 -t 4 10.40.40.22

      Test Modbus to field capbank:

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.23

      All of these should return data. That is the problem. Kali (an attacker box in the enterprise zone) can speak Modbus and DNP3 directly to field protection relays. The engineering workstation can bypass the RTAC entirely. This is what you are about to fix.

  - title: "Phase 2 - Remove broad trust and establish default-deny"
    expected_config: weak
    description: |
      Move from a permissive posture to default-deny for all
      cross-zone traffic. Don't create allow rules yet - get to a
      clean deny-all baseline first.

      ### Default-deny: the principle vs the mechanism

      "Anything not explicitly allowed is denied" is the bedrock of
      segmentation. The *principle* is universal; the *mechanism*
      varies by vendor:

      - **Implicit default-deny** - the policy engine appends a
        "deny everything not matched" verdict for you. You write
        only ALLOW rules. Used by **containd** (this lab), Cisco
        ASA/FTD, Palo Alto, FortiGate, Juniper SRX.
      - **Explicit default-deny** - nothing is appended. You must
        configure the chain default to DENY or write a final deny
        rule yourself. Used by **iptables/nftables** in raw form,
        Linux bridges/OVS, and (best-practice) Check Point cleanup
        rules. Forget either and the firewall is silently allow-all.

      The thing to internalize: if you cannot point to *where* the
      default-deny is - either as documented implicit behavior or as
      an explicit rule you wrote - assume there is no default-deny.
      See **[Default-Deny: Implicit vs Explicit Across Firewalls](/knowledge#default-deny)**
      on the Knowledge page for the per-vendor breakdown.

      :::hint About containd specifically
      containd's policy has a top-level `defaultAction` field that
      is already set to **DENY**, even under the weak baseline.
      The weak posture is permissive only because broad ALLOW
      rules sit on top of it. There is no separate "set default
      to drop" switch to flip in this lab - deleting the broad
      allow rules is what exposes the existing default DENY. You
      can confirm with `show running-config | grep defaultAction`
      from `containd cli`. On a firewall with explicit
      default-deny (raw iptables, OVS, etc.) this same step would
      *also* require setting the chain policy or adding a final
      deny rule - that's the vendor-mechanism difference.

      One nuance for later: default-deny *blocks* silently - it emits
      no per-flow log. Phase 4 adds explicit logged DENY rules for the
      cross-zone pairs you most want visibility on, with the silent
      default-deny as the backstop for everything else.
      :::

      ### What to do

      1. **Review existing rules.** Identify the rules that allow
         broad cross-zone access:
         - Enterprise (`wan`) to any zone on ICS ports (502, 20000)
         - Any zone to Field (`lan2`) without source pinning
         - Vendor (`dmz`) to Field (`lan2`) on any port
         - "Any-any" rules that permit all traffic between zones

      2. **Delete those broad-allow rules.** Once they are gone,
         the policy's `defaultAction: DENY` catches all cross-zone
         traffic the rules were permitting.

      3. **Do NOT remove intra-zone rules.** Traffic within OT Ops
         (`10.30.30.0/24`) needs to keep flowing - HMI to RTAC,
         historian to RTAC, and internal NTP. These are intra-zone
         and should not be affected by cross-zone deny rules.

      :::guided
      **On the Guided track you don't delete these by hand.** In the next
      phase, **Apply Hardened** (or **Apply Your Plan**) replaces the weak
      baseline wholesale - it removes the five broad allows above *and*
      adds the minimal rules in a single commit. Read the list above so
      you understand what's being removed and why, then move on - you'll
      confirm default-deny holds in Phase 5/6. The manual Web UI / CLI
      steps below are the Advanced-track way to do the same removal.
      :::

      :::technical
      Delete the five broad allows yourself, via the Web UI or the CLI.
      (The **Apply Hardened** button below the step stays available as a
      fallback.)

      **Web UI path.** Go to **Policy & Rules → Firewall Rules** at
      [http://localhost:9080](http://localhost:9080) and delete the five
      broad cross-zone allows - `enterprise-to-ot-weak`,
      `enterprise-to-field-weak`, `vendor-to-ot-weak`,
      `vendor-to-field-weak`, and `ot-to-field-broad`. You do *not* need a
      separate "default action" switch - the policy default is already
      DENY and takes over once the broad allows are gone. Per-rule deletes
      apply immediately. Keep the intra-zone rules `ot-intrazone` and
      `field-intrazone`.

      **CLI path.** From the `fw-1` terminal, type `containd cli`, then:

          delete firewall rule enterprise-to-ot-weak
          delete firewall rule enterprise-to-field-weak
          delete firewall rule vendor-to-ot-weak
          delete firewall rule vendor-to-field-weak
          delete firewall rule ot-to-field-broad
          show diff
          commit

      `show diff` before `commit` shows exactly what's being removed.

      **Verify default-deny.** From kali, this should now time out:

          mbpoll -a 1 -r 1 -c 1 -1 -t 1 -o 3 10.40.40.20

      If it still returns register data, the default-deny isn't active -
      re-check your rule list and whether you committed.
      :::

  - title: "Phase 3 - Create minimal required rules"
    description: |
      The six rules below are the contract for what cross-zone
      traffic the substation must allow. Everything else stays
      denied.

      :::guided
      Click **Apply Hardened** in the **containd NGFW — policy actions** panel below this step to push the canned
      reference policy, or **Apply Your Plan** to push the policy
      built from your Lab 1.4 picks. Then walk the rule table below
      and confirm each row is present in containd's web UI
      ([http://localhost:9080](http://localhost:9080)) or via
      `show running-config` in the CLI. Understanding *what* is in
      the policy matters as much as *how* it gets there.
      :::

      :::technical
      Author these rules in containd directly - your choice of the
      web UI or the appliance CLI. The banner above will switch to
      "Your custom policy" once your commit lands. The exact JSON
      schema and CLI commands are in the hints below.
      :::

      ### Required Rules

      | # | Source | Destination | Proto | Port(s) | Action | Purpose |
      |---|--------|-------------|-------|---------|--------|---------|
      | 1 | `10.30.30.20` | `10.40.40.0/24` | TCP | 502 | ALLOW | RTAC Modbus polling to field devices |
      | 2 | `10.30.30.20` | `10.40.40.0/24` | TCP | 20000 | ALLOW | RTAC DNP3 polling to field devices |
      | 3 | `10.30.30.20` | `10.40.40.0/24` | TCP | 8080 | ALLOW | RTAC HTTP API to field devices |
      | 4 | `10.30.30.50` | `10.40.40.0/24` | UDP | 123 | ALLOW | GPS NTP time sync to field devices |
      | 5 | `10.20.20.0/24` | `10.30.30.0/24` | TCP | 22, 443 | ALLOW | Vendor management access (SSH/HTTPS only) |
      | 6 | `10.10.10.0/24` | `10.20.20.0/24` | TCP | 22, 80, 443 | ALLOW | Enterprise to vendor management |

      > **Critical:** Rules 1-3 are source-pinned to `10.30.30.20` (the RTAC). Do **not** use a broad OT Ops subnet rule. If the HMI or OpenPLC is compromised, it must not reach field devices directly. The RTAC is the single authorized cross-zone controller.

      Create these six rules in the containd firewall. Use whichever
      path you prefer.

      :::hint Creating rules via the Web UI
      Open [http://localhost:9080](http://localhost:9080) and go to
      **Policy & Rules → Firewall Rules** in the left nav. Scroll to the
      **Create rule** form at the bottom. For each row in the table
      above, fill in:

      - **id** (e.g. `rtac-to-field-modbus`) and a description
      - **Source zone** = `lan1` (OT Ops), **Dest zone** = `lan2` (Field)
      - **sources CIDR (csv)** = `10.30.30.20/32` - this is the RTAC
        host-pin; a zone-only `lan1 -> lan2` rule would allow *all* of
        OT Ops to field, the broad mistake the table warns against
      - **proto** = `tcp`, **port/range** = `502` (or `20000` / `8080`)
      - **action** = `ALLOW`, and tick **Log hits**
      - For the DPI rules: tick **ICS Protocol Filter**, set **ICS
        Protocol** to Modbus (or DNP3) and the **Function Code(s)**, then
        set **Rule Mode** to **Enforcement (active)**. It defaults to
        *Learning (passive)*, which only observes - in Learning mode the
        function-code filter will **not** block.

      Click **Create rule**. Each rule takes effect *immediately* - there
      is no separate commit for individual rules, so just watch the rule
      list grow. (Only *bulk* edits to the candidate JSON on the
      **Configuration** page need a commit: an amber "candidate differs
      from running" banner then appears at the top of every page - click
      **Commit** on it, or **Review Candidate Diff** to inspect first.)
      :::

      :::hint Creating rules via the containd CLI
      The granular protocol-port rule schema (with ICS DPI fields) is
      best edited via JSON in the CLI rather than typed-in argument
      lists. From the `fw-1` terminal (or SSH), type `containd cli`
      to enter the appliance CLI, then:

          export config > /tmp/policy.json
          shell                   # drop to bash
          vi /tmp/policy.json     # edit the firewall.rules array
          exit                    # back to containd CLI
          import config /tmp/policy.json
          show diff               # confirm what will change
          commit

      Each rule object in `firewall.rules` looks like:

          {
            "id": "rtac-to-field-modbus",
            "description": "RTAC Modbus polling to field devices",
            "sourceZones": ["lan1"],
            "sources": ["10.30.30.20/32"],
            "destZones": ["lan2"],
            "protocols": [{"name": "tcp", "port": "502"}],
            "ics": {"protocol": "modbus", "functionCode": [1, 2, 3, 4, 5, 6]},
            "action": "ALLOW",
            "log": true
          }

      The `sources` field is the source-pin that makes Rules 1-3 "RTAC
      only" - a zone-only rule (`lan1` -> `lan2`) would allow *all* of
      OT Ops to field, exactly the broad-subnet mistake the table warns
      against. The `ics` block is the protocol-aware DPI layer (here,
      Modbus function codes); use `{"protocol": "dnp3"}` for the DNP3
      rule and `{}` for the plain HTTP rule.

      The simpler `set firewall rule <id> <action> <src> <dst>` CLI
      command works for plain zone-pair rules but doesn't carry
      protocol/port/DPI fields, which is why the JSON path is the
      right one for substation rule writing.

      Tip: `commit confirmed 60` commits with auto-rollback after
      60 seconds unless you type `confirm` - useful when you're
      pushing rules to a remote firewall and don't want to lock
      yourself out.
      :::

  - title: "Phase 4 - Enable logging and visibility"
    expected_config: weak
    description: |
      A firewall rule without logging is invisible. You need to see both what is allowed and what is denied - and you need a place to look.

      ### Configure logging on the right rules

      In your rule JSON, add `"log": true` to each rule that
      matters operationally:

      1. **All DENY actions.** Every blocked cross-zone connection attempt should produce a log entry. This is your primary detection mechanism for unauthorized access attempts.

      2. **ALLOW actions on critical rules.** Log the RTAC-to-field rules (Rules 1-3) so you have an audit trail of legitimate control traffic. This is useful for forensics and for validating that operations are running normally.

      3. **Enterprise/Vendor to Field attempts.** The silent default-deny *blocks* these but produces no per-flow log. To get an audit trail, the hardened reference policy adds **explicit DENY rules with `log: true`** for these high-value cross-zone pairs (`deny-enterprise-to-ot`, `deny-enterprise-to-field`, `deny-vendor-to-field`, `deny-ot-to-field-direct`). The default-deny stays as the silent backstop for everything else.

      :::hint Enabling logging on a rule
      The `firewall.rules` JSON schema has a `log: true` field. Add
      it to the rule object alongside `action`, then `import config`
      + `commit` as you did in Phase 3, or toggle the **Log matches**
      checkbox in the Web UI's rule editor.
      :::

      ### Verify your configuration committed

      Open a terminal on `fw-1` (below, or on the [Network Map](/console))
      and inspect the audit log:

          containd cli

      …then at the `containd#` prompt:

          show audit

      You should see recent `config.save_candidate` and `config.commit`
      entries corresponding to the policy changes you just pushed.
      The audit log is containd's record of *administrative* actions
      against the firewall (config commits, login events, service
      changes) - confirmation that your rules are loaded and active.

      ### Where to look for traffic-level events

      Per-flow firewall events (a kali probe being denied, an RTAC
      Modbus write being allowed) are surfaced in two places today:

      - **Feeder HMI → Command Audit tab** at [/substation](/substation):
        scenario-driven actions (RTAC commands, attack writes) are
        captured here with their source zone and outcome. This is
        what you'll watch during Lab 2.3 and 2.4 when you fire
        attacks under your policy and want to see whether they
        landed or were blocked.
      - **Network Map → Segmentation drawer** at [/console](/console):
        the **Live DPI Events** strip shows containd's per-packet
        deny/allow stream as it happens.

      :::hint Note on the Live DPI Events strip
      Under the current containd build, traffic-level deny events
      from L4 firewall rules (Modbus/DNP3 timeouts at the perimeter)
      are not yet emitted to the events stream - this is tracked in
      [rangerdanger #34](https://github.com/tonylturner/rangerdanger/issues/34)
      and [containd #19](https://github.com/tonylturner/containd/issues/19).
      The strip is live and forward-compatible: when containd lands
      the emission fix, deny events will flow into it automatically.
      Until then, use Command Audit at /substation and `show audit`
      on `fw-1` as your primary verification surfaces, and rely on
      the *operational* outcome at the HMI to confirm a probe was
      blocked (TCP timeout + no kinetic change).
      :::

  - title: "Phase 5 - Validate allowed traffic"
    expected_config: hardened
    description: |
      Your rules are in place. Now verify that operations still work. If any of these tests fail, you have a rule that is too restrictive or missing.

      **RTAC to field devices (protocol test):**

      From the RTAC terminal (`rtac-1` on the [Network Map](/console)):

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 10.40.40.20
          dnp3poll 10.40.40.20:20000 -a 1

      Both should return data. This confirms the RTAC-to-field ALLOW rules are working for Modbus and DNP3.

      For a single-pane view of the RTAC's view of the field, use
      the lab's RTAC status API (lab convenience - real RTACs don't
      expose a JSON `/api/state`; their status comes from the SCADA
      system):

          curl -s http://10.30.30.20:8080/api/state | python3 -m json.tool

      The `device_comms` section should show all field devices with
      `comms_ok: true` and recent timestamps.

      **HMI to RTAC (intra-zone, should still work):**

      In a real environment you'd verify this by opening the HMI
      and confirming live data updates. As a smoke test from any
      OT Ops node:

          curl -sf http://10.30.30.10:1881 --connect-timeout 3

      The FUXA HMI should respond. This is intra-zone traffic and
      should not be affected by your cross-zone rules.

      **GPS NTP to field devices:**

      From the GPS terminal or by checking a field device's NTP status. The NTP flow is UDP/123 from `10.30.30.50` to field devices.

      If any test fails, check your rules. The most common mistake is forgetting to allow a required flow, or pinning the source too narrowly on the GPS rule.

  - title: "Phase 6 - Validate blocked traffic"
    expected_config: hardened
    description: |
      Now verify that unauthorized traffic is denied. Every test below should fail with a timeout or connection refused.

      **From kali** (`kali-1` on the [Network Map](/console)):

      Modbus to field relay (enterprise to field, should be blocked):

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 -o 3 10.40.40.20

      DNP3 to field relay (enterprise to field, should be blocked):

          dnp3poll 10.40.40.20:20000 -a 1 -t 3

      **From eng-ws** (`eng-ws-1` on the [Network Map](/console)):

      Modbus to field capbank (vendor/DMZ to field, should be blocked):

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 -o 3 10.40.40.23

      **From vendor-jump** (`vendor-jump-1` on the [Network Map](/console)):

      DNP3 to field relay (vendor/DMZ to field, should be blocked):

          dnp3poll 10.40.40.20:20000 -a 1 -t 3

      Modbus to field relay (vendor/DMZ to field, should be blocked):

          mbpoll -a 1 -r 1 -c 5 -1 -t 1 -o 3 10.40.40.20

      After each failed attempt, the connection should time out and
      the substation HMI should remain unchanged. The combination is
      what tells you the policy is enforcing.

      **HMI confirmation:** open the [Feeder HMI](/substation) →
      **Feeder One-Line** tab. No alarms, breaker closed, customers
      served. Compare against the deliberate-failure state from Lab
      2.3 step 1 baseline.

      **Administrative confirmation:** from the `fw-1` terminal,
      `containd cli` then `show audit` - your recent `config.commit`
      entries should appear, proving the rule set you're testing
      against is the rule set that's loaded.

      If any test succeeds when it should fail, you have a rule that
      is too permissive. Review your policy and tighten it.

      :::hint Live per-flow deny visibility - coming soon
      Live DPI deny events for these blocked probes will appear in the
      Segmentation drawer's **Live DPI Events** strip on `/console`
      once containd ships the L4 event emission fix
      ([containd #19](https://github.com/tonylturner/containd/issues/19)).
      For this release, "TCP timeout + HMI unchanged" is the working
      evidence pattern.
      :::

  - title: "Export your policy"
    expected_config: hardened
    description: |
      You have a working least-privilege firewall policy active.
      Export it so you have a record of what is running - most
      change boards want the policy as a versioned artifact, not
      just "rules live in the firewall."

      This step matters regardless of which path you chose at the
      top of the lab. If you applied the canned hardened reference,
      exporting gives you the starting point for your own future
      edits. If you applied your Lab 1.4 plan, the export captures
      what the planner produced from your picks. If you authored
      the policy in containd, the export is the artifact you hand
      to change management.

      **Web UI:** go to **Configuration** in the left nav and click
      **Download full** to save the running config as JSON (**Download
      redacted** strips secrets if you're sharing it).

      **CLI:** from the `fw-1` terminal, run `containd cli`, then:

          export config > student-policy.json
          shell                       # drop to bash
          cat /tmp/student-policy.json | python3 -m json.tool
          exit

      Your policy should contain:

      - Default-deny for all cross-zone traffic
      - RTAC (`10.30.30.20`) allowed to field on Modbus/502, DNP3/20000, HTTP/8080
      - GPS (`10.30.30.50`) allowed to field on NTP/123
      - Vendor/DMZ allowed to OT Ops on SSH/22 and HTTPS/443 only
      - Enterprise allowed to Vendor/DMZ on SSH/22, HTTP/80, HTTPS/443 only
      - Logging enabled on deny actions and critical allow rules

      Compare your policy against the provided hardened configuration in the RangerDanger Feeder HMI segmentation tab. The two should be functionally equivalent. Any differences are worth discussing with your instructor: did you allow something the reference policy blocks, or did you block something the reference allows?

      :::hint Expected final state summary
      **Allowed (6 rules):**

      | # | Source | Destination | Protocol/Port | Purpose |
      |---|--------|-------------|---------------|---------|
      | 1 | `10.30.30.20` | `10.40.40.0/24` | TCP/502 | RTAC Modbus to field |
      | 2 | `10.30.30.20` | `10.40.40.0/24` | TCP/20000 | RTAC DNP3 to field |
      | 3 | `10.30.30.20` | `10.40.40.0/24` | TCP/8080 | RTAC HTTP to field |
      | 4 | `10.30.30.50` | `10.40.40.0/24` | UDP/123 | GPS NTP to field |
      | 5 | `10.20.20.0/24` | `10.30.30.0/24` | TCP/22,443 | Vendor management to OT Ops |
      | 6 | `10.10.10.0/24` | `10.20.20.0/24` | TCP/22,80,443 | Enterprise management to Vendor |

      **Denied (default):**

      Everything else. Enterprise to OT Ops, enterprise to field, vendor to field, non-RTAC OT Ops to field, and any protocol not explicitly listed above.
      :::
