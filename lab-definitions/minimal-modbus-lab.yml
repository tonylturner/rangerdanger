id: "minimal-modbus-lab"
name: "Minimal Modbus Lab"
description: "HMI + PLC for Modbus Override scenario. Traffic routed through containd NGFW."
networks:
  - name: wan
    cidr: 192.168.240.0/24
  - name: dmz
    cidr: 192.168.241.0/24
  - name: ot_control
    cidr: 192.168.242.0/24
nodes:
  - id: fw-1
    type: containd_ngfw
    name: "containd NGFW"
    networks: [wan, dmz, ot_control]
  - id: hmi-1
    type: hmi_scada
    name: "FUXA HMI"
    networks: [dmz, ot_control]
  - id: plc-1
    type: plc_trainer
    name: "Process PLC"
    networks: [ot_control]
scenarios:
  - id: modbus-pump-speed-override
    name: "Modbus Pump Speed Override"
    description: "Manipulate Modbus registers to force unsafe pump speeds. Observe DPI events in containd."
    tags: ["modbus", "plc", "attack", "dpi"]
    steps:
      - title: "Explore Network Topology"
        description: "Open the RangerDanger console. Review the network topology showing HMI, PLC, and containd firewall."
      - title: "Access HMI"
        description: "Click the HMI node and open its web UI. Observe the current pump speed setpoint."
      - title: "Monitor Firewall Events"
        description: "Open the containd firewall UI at :9080. Navigate to Events to see Modbus traffic."
      - title: "Issue Modbus Write"
        description: "From the HMI, change the pump speed setpoint. Observe the Modbus write event in containd."
      - title: "Detect Anomaly"
        description: "Set an unsafe speed value. Check if containd DPI flags the anomalous register write."
