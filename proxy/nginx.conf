worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Basic security headers for embedded apps
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  server_tokens off;

  # WebSocket support maps
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream backend { server backend:8080; }
  upstream frontend { server frontend:3000; }
  upstream hmi_view { server fuxa_hmi:1881; }
  upstream hmi_control { server fuxa_hmi:1881; }
  upstream plc_trainer { server openplc:8080; }
  upstream firewall_ui { server firewall:8080; }
  upstream ews { server eng_workstation:3000; }
  upstream jumpbox { server vendor_jump:3000; }

  # Substation lab services
  upstream corp_ws { server corp_ws:3000; }
  upstream vendor_jump { server vendor_jump:3000; }
  upstream eng_ws { server eng_workstation:3000; }
  upstream fuxa_hmi { server fuxa_hmi:1881; }
  upstream openplc { server openplc:8080; }

  server {
    listen 8080;

    # Use relative redirects (don't include host:port in Location headers)
    absolute_redirect off;

    # Frontend entrypoint
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # FUXA API endpoints at root level (must come before general /api/)
    # FUXA uses absolute paths that bypass base href
    location /api/version { proxy_pass http://hmi_view; }
    location /api/settings { proxy_pass http://hmi_view; }
    location /api/project { proxy_pass http://hmi_view; }
    location /api/projectData { proxy_pass http://hmi_view; }
    location /api/device { proxy_pass http://hmi_view; }
    location /api/alarmsHistory { proxy_pass http://hmi_view; }
    location /api/resources { proxy_pass http://hmi_view; }

    # FUXA socket.io at root level - proxy to hmi_control for now
    # (FUXA Angular client uses absolute /socket.io/ path regardless of base href)
    location /socket.io/ {
      proxy_pass http://hmi_control;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }

    # API gateway with WebSocket support for terminal
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }

    # containd firewall UI (legacy path)
    location /apps/firewall/ {
      proxy_pass http://firewall_ui/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Redirect containd paths for iframe embedding
    location = /login {
      return 302 /containd/login$is_args$args;
    }
    location = /index.txt {
      return 302 /containd/index.txt$is_args$args;
    }
    location = /favicon.ico {
      return 302 /containd/favicon.ico;
    }

    # Containd UI top-level routes accessed at the proxy root (e.g.
    # someone bookmarks http://localhost:8088/templates or types
    # /pcap directly). The sub_filter block inside /containd/ rewrites
    # in-app navigation, but direct URL hits land here. Redirect to
    # the proper /containd/<route> path so the UI loads instead of a
    # bare 404. List mirrors ui/app/* one-for-one (kept here so a new
    # containd route doesn't need a rangerdanger compose change to
    # work — just add to both this regex and the sub_filter list
    # above). `assets` is intentionally excluded because /assets/* at
    # the proxy root is FUXA's static-asset path; containd's assets
    # are reachable via the sub_filter rewrite to /containd/assets.
    location ~ ^/(alerts|audit|config|dataplane|dhcp|diagnostics|docs|events|firewall|flows|forbidden|ics|ids|interfaces|monitoring|nat|pcap|proxies|routing|sessions|system|templates|topology|vpn|wizard|zones)(/.*)?$ {
      return 302 /containd$uri$is_args$args;
    }

    # Defensive lock on the containd password-change endpoints when
    # accessed through the proxy. containd >= v0.1.22 already returns
    # 403 here when CONTAIND_LAB_MODE=1; this nginx block returns the
    # same 403 a layer earlier so older containd images (or any future
    # regression) never even reach the upstream. The lab convention
    # is `containd/containd` — drifting it via the UI would silently
    # break every SSH-on-:2222 step in the labs.
    location ~ ^/containd/api/v[0-9]+/(auth/me|users/[^/]+)/password$ {
      add_header Content-Type text/plain always;
      return 403 "lab mode: containd credentials are pinned to the documented default (containd/containd). Password change is disabled to keep workshop SSH and lab-doc commands working. See docs/lab-credentials.md for rationale.";
    }

    # containd firewall UI - full proxy with path rewriting for iframe embedding
    location /containd/ {
      proxy_pass http://firewall_ui/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Remove X-Frame-Options to allow iframe embedding
      proxy_hide_header X-Frame-Options;

      # Rewrite redirect URLs to use /containd/ prefix
      proxy_redirect / /containd/;
      proxy_redirect http://firewall:8080/ /containd/;

      # Rewrite paths in responses
      sub_filter_types text/html application/javascript text/javascript application/json text/plain;
      sub_filter_once off;
      sub_filter '"/api/' '"/containd/api/';
      sub_filter '"/_next/' '"/containd/_next/';
      sub_filter 'href="/' 'href="/containd/';
      sub_filter 'src="/' 'src="/containd/';
      # Lab-mode banner injected at the top of containd's HTML body.
      # Sets explicit student-facing expectations:
      # (1) credentials are pinned (containd / containd) — same cred
      #     the lab YAMLs document for SSH on :2222;
      # (2) password change is intentionally disabled in lab mode and
      #     the proxied path returns 403 (defended by both nginx
      #     above and containd >= v0.1.22 lab-mode locks).
      # The sub_filter triggers on the literal `<body` opening tag
      # (sub_filter_once off ensures it fires on every page render).
      sub_filter '<body' '<body data-rangerdanger-lab="1"><div style="position:sticky;top:0;z-index:9999;background:#7c2d12;color:#fef3c7;padding:8px 14px;font:600 12px/1.4 system-ui,sans-serif;border-bottom:2px solid #fbbf24;">RangerDanger lab mode — credentials are pinned to <code style="background:#000;color:#fbbf24;padding:1px 6px;border-radius:3px">containd / containd</code>. Do not change. SSH-on-:2222 and lab YAML commands depend on this default; password change is disabled (returns 403).</div><div';
      # Next.js client-side navigation patterns
      sub_filter '"p":""' '"p":"/containd"';
      # Containd UI top-level routes (one entry per dir under
      # ui/app/). Next.js client-side navigation emits absolute root
      # paths from these JS bundles; without rewriting them to the
      # /containd/ prefix the in-app navigation 404s when the UI is
      # iframed or viewed via the proxy. The list mirrors the
      # ui/app/* directory exactly — when a new route lands in
      # containd, add it here. The regex `location` block further
      # below also redirects direct URL hits to /containd/<route> as
      # belt-and-suspenders for bookmarks and external links.
      sub_filter '"/alerts' '"/containd/alerts';
      sub_filter '"/assets' '"/containd/assets';
      sub_filter '"/audit' '"/containd/audit';
      sub_filter '"/config' '"/containd/config';
      sub_filter '"/dataplane' '"/containd/dataplane';
      sub_filter '"/dhcp' '"/containd/dhcp';
      sub_filter '"/diagnostics' '"/containd/diagnostics';
      sub_filter '"/docs' '"/containd/docs';
      sub_filter '"/events' '"/containd/events';
      sub_filter '"/firewall' '"/containd/firewall';
      sub_filter '"/flows' '"/containd/flows';
      sub_filter '"/forbidden' '"/containd/forbidden';
      sub_filter '"/ics' '"/containd/ics';
      sub_filter '"/ids' '"/containd/ids';
      sub_filter '"/interfaces' '"/containd/interfaces';
      sub_filter '"/login' '"/containd/login';
      sub_filter '"/monitoring' '"/containd/monitoring';
      sub_filter '"/nat' '"/containd/nat';
      sub_filter '"/pcap' '"/containd/pcap';
      sub_filter '"/proxies' '"/containd/proxies';
      sub_filter '"/routing' '"/containd/routing';
      sub_filter '"/sessions' '"/containd/sessions';
      sub_filter '"/system' '"/containd/system';
      sub_filter '"/templates' '"/containd/templates';
      sub_filter '"/topology' '"/containd/topology';
      sub_filter '"/vpn' '"/containd/vpn';
      sub_filter '"/wizard' '"/containd/wizard';
      sub_filter '"/zones' '"/containd/zones';
    }

    # HMI/SCADA (FUXA) - proxy FUXA assets from root paths
    # FUXA's Angular build has hardcoded paths that bypass base href
    location /assets/ {
      proxy_pass http://hmi_view/assets/;
      proxy_set_header Host $host;
    }
    location ~ ^/(runtime|polyfills|main|scripts|styles)\.[a-f0-9]+\.(js|css)$ {
      proxy_pass http://hmi_view;
      proxy_set_header Host $host;
    }
    location ~ ^/(roboto-|logo\.|Quicksand|material-icons)[^/]+\.(woff2?|ttf|svg)$ {
      proxy_pass http://hmi_view;
      proxy_set_header Host $host;
    }

    # FUXA API endpoints (must come before /api/ to take precedence)
    location /apps/hmi/api/ {
      proxy_pass http://hmi_view/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # FUXA socket.io for real-time updates
    location /apps/hmi/socket.io/ {
      proxy_pass http://hmi_view/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }

    # HMI/SCADA (FUXA)
    location /apps/hmi/ {
      proxy_pass http://hmi_view/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;

      # Allow iframe embedding
      proxy_hide_header X-Frame-Options;

      # Rewrite base href so assets load from /apps/hmi/
      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '<base href="/">' '<base href="/apps/hmi/">';
    }

    # OpenPLC trainer UI
    location /apps/plc/ {
      proxy_pass http://plc_trainer/;
      proxy_set_header Host $host;
    }

    # HMI View (read-only) - DMZ zone
    location /apps/hmi-view/api/ {
      proxy_pass http://hmi_view/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /apps/hmi-view/socket.io/ {
      proxy_pass http://hmi_view/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }
    location /apps/hmi-view/ {
      proxy_pass http://hmi_view/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '<base href="/">' '<base href="/apps/hmi-view/">';
    }

    # HMI Control (full access) - OT Control zone only
    location /apps/hmi-control/api/ {
      proxy_pass http://hmi_control/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /apps/hmi-control/socket.io/ {
      proxy_pass http://hmi_control/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }
    location /apps/hmi-control/ {
      proxy_pass http://hmi_control/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '<base href="/">' '<base href="/apps/hmi-control/">';
    }

    # Engineering Workstation (DMZ)
    location /apps/ews/ {
      proxy_pass http://ews/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
    }

    # Jump Box (DMZ - sole gateway to OT Control)
    location /apps/jumpbox/ {
      proxy_pass http://jumpbox/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
    }

    # Corporate Workstation (Enterprise zone)
    location /apps/corp-ws/ {
      proxy_pass http://corp_ws/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
    }

    # Vendor Jump Box (Vendor zone)
    location /apps/vendor-jump/ {
      proxy_pass http://vendor_jump/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
    }

    # Engineering Workstation (Vendor zone)
    location /apps/eng-ws/ {
      proxy_pass http://eng_ws/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
    }

    # FUXA HMI (OT Ops zone) - API and socket.io first
    location /apps/fuxa-hmi/api/ {
      proxy_pass http://fuxa_hmi/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /apps/fuxa-hmi/socket.io/ {
      proxy_pass http://fuxa_hmi/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }
    location /apps/fuxa-hmi/ {
      proxy_pass http://fuxa_hmi/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_hide_header X-Frame-Options;
      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '<base href="/">' '<base href="/apps/fuxa-hmi/">';
    }

    # OpenPLC (OT Ops zone)
    location /apps/openplc/ {
      proxy_pass http://openplc/;
      proxy_set_header Host $host;
      proxy_hide_header X-Frame-Options;
    }

    # Friendly hint if someone hits /apps without a service suffix
    location = /apps {
      return 404 "Use /apps/hmi/ /apps/hmi-control/ /apps/ews/ /apps/jumpbox/ /apps/plc/ /apps/firewall/ /apps/corp-ws/ /apps/vendor-jump/ /apps/eng-ws/ /apps/fuxa-hmi/ /apps/openplc/";
    }
  }
}
