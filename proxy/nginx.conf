worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Basic security headers for embedded apps
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  server_tokens off;

  # WebSocket support maps
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream backend { server backend:8080; }
  upstream frontend { server frontend:3000; }
  upstream hmi_scada { server 192.168.241.10:1881; }
  upstream plc_trainer { server 192.168.242.20:8080; }
  upstream firewall_ui { server 192.168.240.2:8080; }

  server {
    listen 8080;

    # Frontend entrypoint
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # API gateway with WebSocket support for terminal
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }

    # containd firewall UI
    location /apps/firewall/ {
      proxy_pass http://firewall_ui/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # HMI/SCADA (FUXA)
    location /apps/hmi/ {
      proxy_pass http://hmi_scada/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # OpenPLC trainer UI
    location /apps/plc/ {
      proxy_pass http://plc_trainer/;
      proxy_set_header Host $host;
    }

    # Friendly hint if someone hits /apps without a service suffix
    location = /apps {
      return 404 "Use /apps/hmi/ /apps/plc/ /apps/firewall/";
    }
  }
}
