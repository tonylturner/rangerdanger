worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Basic security headers for embedded apps
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  server_tokens off;

  upstream hmi_scada { server hmi_scada:1881; }
  upstream plc_trainer { server plc_trainer:8080; }
  upstream sis_plc { server sis_plc:8080; }
  upstream grafana { server grafana:3000; }
  upstream jump_host { server jump_host:6080; }
  upstream ids { server ids:80; }
  upstream backend { server backend:8080; }

  server {
    listen 8080;

    # Frontend entrypoint
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
    }

    # API gateway
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }

    # Friendly hint if someone hits /apps without a service suffix
    location = /apps {
      return 404 "Use /apps/hmi/ /apps/plc/ /apps/sis/ /apps/grafana/ /apps/jump/ /apps/ids/";
    }

    location /apps/hmi/ {
      proxy_pass http://hmi_scada/;
      proxy_set_header Host $host;
    }

    location /apps/plc/ {
      proxy_pass http://plc_trainer/;
      proxy_set_header Host $host;
    }

    location /apps/sis/ {
      proxy_pass http://sis_plc/;
      proxy_set_header Host $host;
    }

    location /apps/grafana/ {
      proxy_pass http://grafana/;
      proxy_set_header Host $host;
    }

    location /apps/jump/ {
      proxy_pass http://jump_host/;
      proxy_set_header Host $host;
    }

    location /apps/ids/ {
      proxy_pass http://ids/;
      proxy_set_header Host $host;
    }
  }
}
