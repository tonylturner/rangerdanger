version: 2

# Pre-1.0 policy: dependabot opens minor and patch updates only. Major
# version bumps are suppressed until v0.1.0 ships and we have CI signal
# we trust. Re-evaluate by removing the `ignore` blocks once stable.

updates:
  # Backend Go module
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Field-device simulators Go module
  - package-ecosystem: gomod
    directory: /services
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Standalone DNP3 library
  - package-ecosystem: gomod
    directory: /dnp3go
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend (Next.js)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Dockerfiles (base image bumps)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
