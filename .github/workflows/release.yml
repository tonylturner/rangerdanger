name: Release

# Build and publish first-party images to GHCR on tag push.
#
# Triggers on any tag matching v* (so v0.1.0, v0.0.1-alpha,
# v1.2.3-rc.1 all work). Pre-release tags (anything containing a
# hyphen) get :vX.Y.Z-pre but do NOT update :latest, so an alpha
# can't accidentally replace the stable :latest pointer.
#
# Multi-arch (linux/amd64 + linux/arm64) for everything except
# openplc, whose upstream base (tuttas/openplc_v3) is amd64-only.
#
# To re-run for an existing tag: workflow_dispatch from the Actions
# tab and provide the tag name.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)build (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: tonylturner

jobs:
  publish:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rangerdanger-backend
            dockerfile: Dockerfile.backend
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-frontend
            dockerfile: Dockerfile.frontend
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-kali
            dockerfile: Dockerfile.kali
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-vendor-jump
            dockerfile: Dockerfile.vendor-jump
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-eng-ws
            dockerfile: Dockerfile.eng-ws
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-openplc
            dockerfile: Dockerfile.openplc
            platforms: linux/amd64
          - image: rangerdanger-rtac-sim
            dockerfile: services/Dockerfile
            target: rtac-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-relay-sim
            dockerfile: services/Dockerfile
            target: relay-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-recloser-sim
            dockerfile: services/Dockerfile
            target: recloser-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-regulator-sim
            dockerfile: services/Dockerfile
            target: regulator-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-capbank-sim
            dockerfile: services/Dockerfile
            target: capbank-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-historian-sim
            dockerfile: services/Dockerfile
            target: historian-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-gps-sim
            dockerfile: services/Dockerfile
            target: gps-sim
            platforms: linux/amd64,linux/arm64
          - image: rangerdanger-opendss-sim
            dockerfile: services/opendss-sim/Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=${{ steps.tag.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata + tag plan
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.name, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.name }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          # Build args are consumed by Dockerfile.backend; other
          # Dockerfiles ignore unknown ARGs without erroring.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
