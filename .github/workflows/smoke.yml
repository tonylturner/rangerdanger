name: Smoke

# Bring the lab up against the locally-built images, run a layered
# series of correctness gates, then tear it down:
#
#   1. /api/health and /api/build respond              (boot gate)
#   2. lab inventory matches the workshop deck         (content gate)
#   3. sim healthchecks pass                           (init gate)
#   4. firewall enforces the traffic matrix correctly  (dataplane gate)
#   5. every documented lab command runs cleanly       (lab-doc gate)
#
# Runs on every push to main + PR. Catches startup regressions and
# lab-doc rot before a workshop student trips over them.
#
# Budget: ~8–11 min on a GitHub-hosted runner. ~6 min for the build
# (no cache pull), ~2 min for boot, ~3 min for the matrix probes
# (mostly the negative-test 3s timeouts). Tradeoff: longer CI for
# never depending on GHCR availability for PR feedback.

on:
  push:
    branches: [main, oss-release]
  pull_request:
    branches: [main, oss-release]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: docker compose up + health check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Validate compose syntax
        run: |
          docker compose config -q
          docker compose -f docker-compose.release.yml config -q

      - name: Free disk space (GH runner has ~14 GB by default)
        run: |
          # The 14 lab images plus their bases need more than the
          # default runner has. Shed a few hundred MB of preinstalled
          # tooling we don't need (Android SDK, .NET, Haskell).
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Build the stack
        run: docker compose build --parallel

      - name: Bring up the stack
        run: docker compose up -d

      - name: Wait for backend to report healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8088/api/health >/dev/null 2>&1; then
              echo "backend healthy after ${i}0 seconds"
              exit 0
            fi
            sleep 10
          done
          echo "backend did not report healthy in 5 minutes"
          exit 1

      - name: Probe API endpoints
        run: |
          curl -fsS http://localhost:8088/api/health | tee /tmp/health.json
          curl -fsS http://localhost:8088/api/build  | tee /tmp/build.json

      - name: Validate lab inventory
        # 6 workshop labs + 1 bonus, deck-aligned ordering. The list
        # of (order, id) pairs is the canonical workshop inventory -
        # add/remove rows here in lockstep with lab YAML files.
        run: |
          set -euo pipefail
          inv=$(curl -fsS http://localhost:8088/api/scenarios)
          declare -a expected=(
            "1.2|baseline-assessment"
            "1.3|segmentation-requirements"
            "1.4|remediation-planning"
            "2.2|firewall-implementation"
            "2.3|hardening-configurations"
            "2.3-bonus|vendor-rdp-compromise"
            "2.4|validation-evidence"
          )
          n=$(echo "$inv" | jq '.scenarios | length')
          if [ "$n" != "${#expected[@]}" ]; then
            echo "::error::expected ${#expected[@]} scenarios, got $n"
            echo "$inv" | jq -r '.scenarios[] | "  \(.order // "-")  \(.id)"'
            exit 1
          fi
          fail=0
          for entry in "${expected[@]}"; do
            order="${entry%%|*}"
            id="${entry##*|}"
            found=$(echo "$inv" | jq -r --arg id "$id" --arg ord "$order" \
                '.scenarios[] | select(.id == $id and .order == $ord) | .id')
            if [ "$found" = "$id" ]; then
              echo "  Lab $order  $id"
            else
              echo "::error::Lab $order $id missing or has wrong order"
              fail=1
            fi
          done
          # Every lab must have at least 3 steps. Counting via
          # "description": occurrences in the steps string blob -
          # each step has exactly one, action items don't have any.
          # (Direct fromjson parsing fails because the stored steps
          # blob has literal newlines inside string descriptions.)
          for entry in "${expected[@]}"; do
            id="${entry##*|}"
            steps=$(echo "$inv" | jq -r --arg id "$id" \
                '.scenarios[] | select(.id == $id) | .steps | [scan("\"description\":")] | length')
            if [ "$steps" -lt 3 ]; then
              echo "::error::$id has only $steps steps (expected >=3)"
              fail=1
            fi
          done
          exit $fail

      - name: Confirm sims report healthy
        run: |
          # All 7 alpine sims + opendss expose /api/health; rtac depends
          # on the field sims being healthy via service_healthy gates.
          # If startup ordering broke, this is where it surfaces.
          docker compose ps --format '{{.Service}} {{.Status}}'
          healthy=$(docker compose ps --format '{{.Status}}' | grep -c '(healthy)')
          [ "$healthy" -ge 8 ] || { echo "expected >=8 healthy services, got $healthy"; exit 1; }

      - name: Firewall traffic enforcement smoke
        # scripts/firewall-smoke.sh applies weak then improved via the
        # lab API and probes a positive+negative traffic matrix from
        # inside the lab containers. Catches enforcement regressions
        # in the dataplane (multi-protocol bug, rule ordering,
        # autobind, etc.) before a workshop student trips over them.
        run: |
          set -euo pipefail
          ./scripts/firewall-smoke.sh

      - name: Lab commands smoke
        # scripts/lab-commands-smoke.sh extracts every documented
        # command from the lab YAMLs and runs them via docker exec
        # from the right container under the right policy. Catches
        # lab-doc rot - typo'd IPs, missing tools, wrong source
        # containers, broken policies - before a student does.
        # PyYAML is needed by the script's parser; install once
        # alongside any other ad-hoc deps.
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          ./scripts/lab-commands-smoke.sh

      - name: Events + ICS DPI smoke
        # scripts/events-smoke.sh covers the v0.1.25 firewall.rule.hit
        # pipeline (kali probe → DENY event in engine + backend), ICS
        # template name normalization (hyphen ↔ underscore at the
        # apply boundary), and ICS DPI function-code allowlist
        # enforcement (RTAC FC8 → block_flows nft set entry). These
        # have their own failure modes the traffic-matrix and lab-doc
        # gates won't catch: backend Event JSON schema drift, NFQUEUE
        # library compat, chain ordering vs ct established fast-path,
        # template name normalization at the apply boundary.
        run: |
          set -euo pipefail
          ./scripts/events-smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/logs
          for svc in backend firewall rtac_sim relay_sim recloser_sim regulator_sim capbank_sim opendss_sim fuxa_hmi proxy frontend; do
            docker compose logs --tail=200 "$svc" > "/tmp/logs/$svc.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs
          path: /tmp/logs/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
