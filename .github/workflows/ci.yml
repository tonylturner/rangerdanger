name: CI

on:
  push:
    branches: [main, oss-release]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: go vet
        working-directory: backend
        run: go vet ./...
      - name: go test
        working-directory: backend
        run: go test -race ./...
      - name: go build
        working-directory: backend
        run: go build ./cmd/server

  services:
    name: Services (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/go.mod
          cache-dependency-path: services/go.sum
      - name: go vet
        working-directory: services
        run: go vet ./...
      - name: go test
        working-directory: services
        run: go test -race ./...
      - name: go build
        working-directory: services
        run: go build ./...

  dnp3go:
    name: dnp3go library (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: dnp3go/go.mod
          cache-dependency-path: dnp3go/go.sum
      - name: go vet
        working-directory: dnp3go
        run: go vet ./...
      - name: go test
        working-directory: dnp3go
        run: go test -race ./...
      - name: go build
        working-directory: dnp3go
        run: go build ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: lint
        working-directory: frontend
        run: npm run lint
      - name: test
        working-directory: frontend
        run: npm test
      - name: build
        working-directory: frontend
        run: npm run build

  compose-validate:
    name: Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config -q

  govulncheck:
    # Hard gate. Findings other than the documented exceptions in
    # docs/security-known-issues.md fail the build. To allowlist a
    # new finding: add a triage entry to security-known-issues.md
    # and append the GOID to ALLOWED below in the same PR.
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan + allowlist filter
        env:
          # Documented exceptions in docs/security-known-issues.md.
          # Add GOIDs here only after a triage entry lands there.
          ALLOWED: "GO-2026-4887 GO-2026-4883"
        run: |
          fail=0
          for dir in backend services dnp3go; do
            echo ""
            echo "=== govulncheck: $dir ==="
            (cd "$dir" && govulncheck -format json ./...) > "/tmp/vuln-$dir.json" 2>&1 || true
            if [ ! -s "/tmp/vuln-$dir.json" ]; then
              echo "::error::govulncheck produced no output for $dir"
              fail=1
              continue
            fi
            # Called findings only (trace length > 0). Imported-but-uncalled
            # findings appear in JSON output but aren't reported in default
            # text mode; we mirror that policy.
            found=$(jq -r '.finding | select(has("osv") and (.trace // [] | length) > 0) | .osv' "/tmp/vuln-$dir.json" 2>/dev/null | sort -u)
            if [ -z "$found" ]; then
              echo "  no findings"
              continue
            fi
            unexpected=$(comm -23 <(echo "$found") <(printf "%s\n" $ALLOWED | sort -u))
            count=$(echo "$found" | wc -l | tr -d ' ')
            if [ -n "$unexpected" ]; then
              echo "::error::Unexpected vulnerabilities in $dir:"
              echo "$unexpected" | sed 's/^/  - /'
              echo ""
              echo "Allowlist (docs/security-known-issues.md): $ALLOWED"
              echo ""
              echo "Either (1) add a triage entry to docs/security-known-issues.md"
              echo "and the ALLOWED env var in this workflow, or (2) update the"
              echo "affected dependency."
              fail=1
            else
              echo "  $count finding(s), all allowlisted"
            fi
          done
          exit $fail
