name: Dependency scan

# Trivy image scan against the published GHCR images. Pairs with
# govulncheck (in ci.yml): govulncheck does Go-source reachability
# analysis; trivy catches OS package CVEs in the built images
# (Kali rolling, Linuxserver webtop bases, Python 3.12-slim) that
# govulncheck has no visibility into.
#
# Advisory-only by design - both scanners run continue-on-error so
# noisy upstream CVE reports don't gate PRs. Findings should be
# triaged into docs/security-known-issues.md before flipping either
# to hard-fail.
#
# Triggers:
#   - weekly (Sunday 03:00 UTC) - keeps signal current as new CVEs land
#   - on every v* tag push (so each release has a fresh scan attached)
#   - manual via workflow_dispatch
#
# Per-image matrix mirrors release.yml. Scan results upload to the
# GitHub Security tab via SARIF for a unified view across the 14
# images.

on:
  schedule:
    - cron: "0 3 * * 0"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to scan (e.g. v0.1.0). Defaults to latest."
        required: false
        default: latest

permissions:
  contents: read
  security-events: write   # for SARIF upload to the Security tab

env:
  REGISTRY: ghcr.io
  NAMESPACE: tonylturner

jobs:
  scan:
    name: scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image:
          - rangerdanger-backend
          - rangerdanger-frontend
          - rangerdanger-kali
          - rangerdanger-vendor-jump
          - rangerdanger-eng-ws
          - rangerdanger-openplc
          - rangerdanger-rtac-sim
          - rangerdanger-relay-sim
          - rangerdanger-recloser-sim
          - rangerdanger-regulator-sim
          - rangerdanger-capbank-sim
          - rangerdanger-historian-sim
          - rangerdanger-gps-sim
          - rangerdanger-opendss-sim

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.name }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          # CRITICAL + HIGH only at the gate; ignore unfixed for now.
          # Tighten as the triage pipeline matures.
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # advisory: don't fail the job, let SARIF upload + summary tell the story
          vuln-type: os,library
          scanners: vuln

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Print top findings to job summary
        if: always()
        run: |
          # Quick human-readable pass for log + summary. SARIF goes to
          # the Security tab; this gives someone reading the workflow
          # output a fast 'how bad is it' read.
          if command -v jq >/dev/null && [ -f trivy-${{ matrix.image }}.sarif ]; then
            count=$(jq '[.runs[].results[]] | length' trivy-${{ matrix.image }}.sarif)
            echo "## ${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Findings: **$count** (CRITICAL/HIGH, fixed available)" >> "$GITHUB_STEP_SUMMARY"
            if [ "$count" -gt 0 ]; then
              echo '<details><summary>Top 10</summary>' >> "$GITHUB_STEP_SUMMARY"
              echo '' >> "$GITHUB_STEP_SUMMARY"
              echo '| Rule | Level | Message |' >> "$GITHUB_STEP_SUMMARY"
              echo '|------|-------|---------|' >> "$GITHUB_STEP_SUMMARY"
              jq -r '[.runs[].results[]] | .[:10] | .[] | "| \(.ruleId) | \(.level) | \(.message.text | gsub("\\|"; "\\|") | .[0:120]) |"' trivy-${{ matrix.image }}.sarif >> "$GITHUB_STEP_SUMMARY"
              echo '' >> "$GITHUB_STEP_SUMMARY"
              echo '</details>' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
