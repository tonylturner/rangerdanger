name: ot-lab-trainer
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OTLAB_HTTP_PORT: 8080
      OTLAB_DB_PATH: /data/otlab.db
      OTLAB_LAB_DEFINITIONS_PATH: /lab-definitions
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
    networks:
      - it_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - it_net

  ews:
    image: ghcr.io/linuxserver/webtop:ubuntu-mate
    environment:
      - TZ=UTC
    networks:
      - it_net
    deploy:
      resources:
        limits:
          memory: 2g

  jump_host:
    image: kalilinux/kali-rolling
    command: ["sleep", "infinity"]
    networks:
      - it_net

  hmi_scada:
    image: frangoteam/fuxa:latest
    container_name: hmi_scada
    networks:
      - dmz_net
      - ot_control_net
    volumes:
      - ./fuxa_appdata:/usr/src/app/FUXA/server/_appdata
      - ./fuxa_db:/usr/src/app/FUXA/server/_db
      - ./fuxa_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped

  historian:
    image: influxdb:2
    networks:
      - dmz_net

  grafana:
    image: grafana/grafana:10.2.0
    networks:
      - dmz_net
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  ids:
    image: jasonish/suricata:latest
    command: ["suricata", "-c", "/etc/suricata/suricata.yaml", "-i", "eth0"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - dmz_net

  plc_trainer:
    image: tuttas/openplc_v3:latest
    container_name: plc_trainer
    ports:
      - "1502:502"
    networks:
      - ot_control_net
    environment:
      - TZ=UTC
    restart: unless-stopped

  sis_plc:
    image: tuttas/openplc_v3:latest
    container_name: sis_plc
    ports:
      - "1503:502"
    networks:
      - ot_safety_net
    environment:
      - TZ=UTC
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: otlab-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:8080"
    depends_on:
      - hmi_scada
      - plc_trainer
      - sis_plc
      - grafana
      - jump_host
      - ids
      - backend
      - frontend
    networks:
      - it_net
      - dmz_net
      - ot_control_net
      - ot_safety_net

volumes:
  plc_programs:
  sis_programs:

networks:
  it_net:
    driver: bridge
  dmz_net:
    driver: bridge
  ot_control_net:
    driver: bridge
  ot_safety_net:
    driver: bridge
