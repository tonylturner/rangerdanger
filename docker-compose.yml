name: rangerdanger

services:
  # ─────────────────────────────────────────────────────────────
  # Zone 7: Security Infrastructure — containd NGFW
  # ─────────────────────────────────────────────────────────────
  firewall:
    image: ghcr.io/tonylturner/containd:latest
    pull_policy: always
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      - CONTAIND_LAB_MODE=1
      - CONTAIND_ALLOWED_ORIGINS=http://localhost:8088
      - NGFW_ENGINE_URL=http://127.0.0.1:8081
      - NGFW_CONFIG_DB=/data/config.db
      - NGFW_CAPTURE_IFACES=eth0,eth1,eth2,eth3
      - NGFW_ENFORCE_ENABLED=1
      - CONTAIND_AUTO_WAN_SUBNET=10.10.10.0/24
      - CONTAIND_AUTO_DMZ_SUBNET=10.20.20.0/24
      - CONTAIND_AUTO_LAN1_SUBNET=10.30.30.0/24
      - CONTAIND_AUTO_LAN2_SUBNET=10.40.40.0/24
    volumes:
      - ./data/firewall:/data
    ports:
      - "9080:8080"   # containd UI
      - "9443:8443"   # containd HTTPS
      - "2222:2222"   # SSH console
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.2
      enterprise_net:
        ipv4_address: 10.10.10.2
      vendor_net:
        ipv4_address: 10.20.20.2
      ot_ops_net:
        ipv4_address: 10.30.30.2
      field_net:
        ipv4_address: 10.40.40.2
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Platform services — backend, frontend, proxy
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rangerdanger-backend
    cap_add:
      - NET_ADMIN
    environment:
      OTLAB_HTTP_PORT: 8080
      OTLAB_DB_PATH: /data/rangerdanger.db
      OTLAB_LAB_DEFINITIONS_PATH: /lab-definitions
      CONTAIND_API_URL: http://10.99.99.2:8080
      CONTAIND_JWT_SECRET: ${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      OTLAB_CONTAIND_CONFIG_PATH: /lab-definitions/firewall/substation-weak.json
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.10
      enterprise_net:
        ipv4_address: 10.10.10.200
      ot_ops_net:
        ipv4_address: 10.30.30.200
    depends_on:
      - firewall
      - rtac_sim

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rangerdanger-frontend
    cap_add:
      - NET_ADMIN
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    cap_add:
      - NET_ADMIN
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.3
      vendor_net:
        ipv4_address: 10.20.20.3
      ot_ops_net:
        ipv4_address: 10.30.30.3

  # ─────────────────────────────────────────────────────────────
  # Zone 1: Enterprise Zone
  # All inter-zone traffic routes through containd (10.10.10.2)
  # ─────────────────────────────────────────────────────────────
  corp_ws:
    image: linuxserver/webtop:ubuntu-mate
    container_name: rangerdanger-corp-ws
    hostname: corp-ws
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.10.10.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.10
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 6: Adversary Zone (placed in enterprise_net for scenario 1)
  # ─────────────────────────────────────────────────────────────
  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: rangerdanger-kali
    hostname: kali
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - GATEWAY=10.10.10.2
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.50
    volumes:
      - ./data/kali_home:/home/kali
      - ./scripts/set-gateway.sh:/usr/local/bin/set-gateway.sh:ro
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 2: Vendor / Engineering Access Zone
  # All inter-zone traffic routes through containd (10.20.20.2)
  # ─────────────────────────────────────────────────────────────
  vendor_jump:
    image: linuxserver/webtop:ubuntu-xfce
    container_name: rangerdanger-vendor-jump
    hostname: vendor-jump
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.10
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - firewall

  eng_workstation:
    image: linuxserver/webtop:ubuntu-mate
    container_name: rangerdanger-eng-ws
    hostname: eng-workstation
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.20
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 3: OT Operations Zone
  # Inter-zone traffic routes through containd (10.30.30.2)
  # ─────────────────────────────────────────────────────────────
  fuxa_hmi:
    image: frangoteam/fuxa:latest
    container_name: rangerdanger-fuxa-hmi
    hostname: fuxa-hmi
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.10
    volumes:
      - ./data/fuxa_hmi_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_hmi_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_hmi_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped
    depends_on:
      - firewall

  rtac_sim:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: rtac-sim
    container_name: rangerdanger-rtac-sim
    hostname: rtac-sim
    cap_add:
      - NET_ADMIN
    environment:
      - RELAY_SIM_HOST=relay-sim:8080
      - RECLOSER_SIM_HOST=recloser-sim:8080
      - REGULATOR_SIM_HOST=regulator-sim:8080
      - OPENDSS_SIM_HOST=opendss-sim:8080
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.20
      field_net:
        ipv4_address: 10.40.40.10
      physics_net:
        ipv4_address: 10.50.50.10
    restart: unless-stopped
    depends_on:
      - firewall
      - relay_sim
      - recloser_sim
      - regulator_sim
      - opendss_sim

  openplc:
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-openplc
    hostname: openplc
    cap_add:
      - NET_ADMIN
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.30
      field_net:
        ipv4_address: 10.40.40.30
    environment:
      - TZ=UTC
      - GATEWAY=10.30.30.2
    volumes:
      - ./data/openplc:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 4: Field Device Zone
  # Inter-zone traffic routes through containd (10.40.40.2)
  # ─────────────────────────────────────────────────────────────
  relay_sim:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: relay-sim
    container_name: rangerdanger-relay-sim
    hostname: relay-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.20
    restart: unless-stopped
    depends_on:
      - firewall

  recloser_sim:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: recloser-sim
    container_name: rangerdanger-recloser-sim
    hostname: recloser-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.21
    restart: unless-stopped
    depends_on:
      - firewall

  regulator_sim:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: regulator-sim
    container_name: rangerdanger-regulator-sim
    hostname: regulator-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.22
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 5: Process / Physics Zone (not firewalled)
  # ─────────────────────────────────────────────────────────────
  opendss_sim:
    build:
      context: ./services
      dockerfile: Dockerfile
      target: opendss-sim
    container_name: rangerdanger-opendss-sim
    hostname: opendss-sim
    cap_add:
      - NET_ADMIN
    networks:
      physics_net:
        ipv4_address: 10.50.50.20
    restart: unless-stopped

networks:
  # Management network — NOT captured by containd firewall
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.99.0/24
          gateway: 10.99.99.1
  # Zone 1: Enterprise
  enterprise_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
  # Zone 2: Vendor / Engineering
  vendor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
          gateway: 10.20.20.1
  # Zone 3: OT Operations
  ot_ops_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24
          gateway: 10.30.30.1
  # Zone 4: Field Devices
  field_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.40.0/24
          gateway: 10.40.40.1
  # Zone 5: Physics / Simulation (not firewalled)
  physics_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.50.0/24
          gateway: 10.50.50.1
