name: rangerdanger

services:
  # ─────────────────────────────────────────────────────────────
  # Zone 7: Security Infrastructure — containd NGFW
  # ─────────────────────────────────────────────────────────────
  firewall:
    # RangerDanger and containd are co-developed by the same author; both repos
    # stay in sync by convention. Use :latest here so a `docker compose pull`
    # picks up containd security fixes without a rangerdanger compose bump.
    # If a containd release breaks RangerDanger, fix containd, not the pin.
    image: ghcr.io/tonylturner/containd:latest
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_TIME
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      - CONTAIND_LAB_MODE=1
      - CONTAIND_SSH_SHELL_MODE=linux
      - CONTAIND_ALLOWED_ORIGINS=http://localhost:8088
      # Containd renamed NGFW_* to CONTAIND_* in v0.1.x. The legacy
      # names still work for most vars but enforcement defaults to OFF
      # in the new image, which black-holes all cross-zone traffic
      # because no nft filter table is built. Setting CONTAIND_ENFORCE_ENABLED=1
      # explicitly is required for the lab to actually forward traffic.
      - CONTAIND_ENGINE_URL=http://127.0.0.1:8081
      - CONTAIND_CONFIG_DB=/data/config.db
      - CONTAIND_CAPTURE_IFACES=eth0,eth1,eth2,eth3
      - CONTAIND_ENFORCE_ENABLED=1
      - CONTAIND_AUTO_WAN_SUBNET=10.10.10.0/24
      - CONTAIND_AUTO_DMZ_SUBNET=10.20.20.0/24
      - CONTAIND_AUTO_LAN1_SUBNET=10.30.30.0/24
      - CONTAIND_AUTO_LAN2_SUBNET=10.40.40.0/24
      # lan3 is the RangerDanger control-plane (backend↔firewall over
      # mgmt_net). containd's auto-bind matches lan3's subnet against
      # whatever ethN docker assigned to mgmt_net. Without this, the
      # mgmt eth falls outside the policy and the input chain drops
      # backend's API calls — RangerDanger UI shows 502 on apply.
      - CONTAIND_AUTO_LAN3_SUBNET=10.99.99.0/24
    volumes:
      - ./data/firewall:/data
    ports:
      # Bound to 127.0.0.1 only (lab-only posture; A3 in release plan).
      # See SECURITY.md → "Exposing the lab beyond localhost" for how
      # to share the stack with another machine on purpose.
      - "127.0.0.1:9080:8080"   # containd UI
      - "127.0.0.1:9443:8443"   # containd HTTPS
      - "127.0.0.1:2222:2222"   # containd SSH console
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.2
      enterprise_net:
        ipv4_address: 10.10.10.2
      vendor_net:
        ipv4_address: 10.20.20.2
      ot_ops_net:
        ipv4_address: 10.30.30.2
      field_net:
        ipv4_address: 10.40.40.2
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Platform services — backend, frontend, proxy
  # ─────────────────────────────────────────────────────────────
  # RangerDanger platform services live on mgmt_net only. They never
  # attach to zone networks — so their traffic never shows up in any
  # capture taken at the firewall's zone interfaces. Lab containers
  # that expose user-facing UIs get a mgmt_net leg so the nginx proxy
  # can reach them out-of-band without crossing the data plane.
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rangerdanger-backend
    environment:
      RANGERDANGER_HTTP_PORT: 8080
      RANGERDANGER_DB_PATH: /data/rangerdanger.db
      RANGERDANGER_LAB_DEFINITIONS_PATH: /lab-definitions
      RANGERDANGER_CONTAIND_API_URL: http://10.99.99.2:8080
      RANGERDANGER_CONTAIND_CONFIG_PATH: /lab-definitions/firewall/substation-weak.json
      CONTAIND_JWT_SECRET: ${CONTAIND_JWT_SECRET:-rangerdanger-dev}
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.10
    # backend gates on rtac_sim being ready so /api/substation/state
    # works on first request — avoids a 5xx burst while sims warm up.
    depends_on:
      firewall:
        condition: service_started
      rtac_sim:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rangerdanger-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      # Bound to 127.0.0.1 only (lab-only posture; A3 in release plan).
      # See SECURITY.md → "Exposing the lab beyond localhost" for how
      # to share the stack with another machine on purpose.
      - "127.0.0.1:8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.3

  # ─────────────────────────────────────────────────────────────
  # Zone 1: Enterprise Zone
  # All inter-zone traffic routes through containd (10.10.10.2)
  # ─────────────────────────────────────────────────────────────
  corp_ws:
    # webtop ubuntu-mate pinned by digest (A7 — Linuxserver only ships
    # rolling tags, this freezes the snapshot for reproducible builds).
    image: linuxserver/webtop:ubuntu-mate@sha256:39afefa41a46fefe3ae910ccf5861933ead54e70d935f1695e70b0627f1b5666
    container_name: rangerdanger-corp-ws
    hostname: corp-ws
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.10.10.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
      - ./scripts/strip-noisy-profile.sh:/custom-cont-init.d/30-strip-noisy-profile.sh:ro
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.10
      mgmt_net:
        ipv4_address: 10.99.99.70
    shm_size: "1gb"
    # Cap memory on the heavy webtop containers so a runaway browser
    # can't OOM the host. Webtops only need to display a desktop +
    # a few terminals; 2 GB is comfortable headroom.
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 6: Adversary Zone (placed in enterprise_net for scenario 1)
  # ─────────────────────────────────────────────────────────────
  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: rangerdanger-kali
    hostname: kali
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - GATEWAY=10.10.10.2
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.50
    volumes:
      - ./data/kali_home:/home/kali
      - ./data/firewall/captures:/home/kali/pcaps:ro
      - ./scripts/set-gateway.sh:/usr/local/bin/set-gateway.sh:ro
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 2: Vendor / Engineering Access Zone
  # All inter-zone traffic routes through containd (10.20.20.2)
  # ─────────────────────────────────────────────────────────────
  vendor_jump:
    build:
      context: .
      dockerfile: Dockerfile.vendor-jump
    container_name: rangerdanger-vendor-jump
    hostname: vendor-jump
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.10
      mgmt_net:
        ipv4_address: 10.99.99.60
    shm_size: "1gb"
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  eng_workstation:
    build:
      context: .
      dockerfile: Dockerfile.eng-ws
    container_name: rangerdanger-eng-ws
    hostname: eng-workstation
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
      - ./scripts/strip-noisy-profile.sh:/custom-cont-init.d/30-strip-noisy-profile.sh:ro
      - ./data/firewall/captures:/home/abc/pcaps:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.20
      mgmt_net:
        ipv4_address: 10.99.99.61
    shm_size: "1gb"
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 3: OT Operations Zone
  # Inter-zone traffic routes through containd (10.30.30.2)
  # ─────────────────────────────────────────────────────────────
  fuxa_hmi:
    # FUXA :latest as of 2026-05-04 — pinned by digest for reproducibility.
    # To update: docker buildx imagetools inspect frangoteam/fuxa:<tag>
    image: frangoteam/fuxa:latest@sha256:025e693971f72de9fabf2c811296f9dca3854dc501cb309b02302c7b94717d0f
    container_name: rangerdanger-fuxa-hmi
    hostname: fuxa-hmi
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.10
      mgmt_net:
        ipv4_address: 10.99.99.50
    volumes:
      - ./data/fuxa_hmi_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_hmi_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_hmi_logs:/usr/src/app/FUXA/server/_logs
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      - firewall

  # HMI poller sidecar — shares fuxa_hmi's network namespace so its
  # traffic has source IP 10.30.30.10 (the HMI). Runs a simple Modbus
  # read against the RTAC every 2 seconds. This is intra-OT-Ops traffic
  # (not cross-zone) and therefore never transits the firewall, but it
  # keeps the HMI visibly "alive" from the RTAC's perspective and
  # matches how a real operator HMI polls its SCADA aggregator.
  hmi_poller:
    image: alpine:3.21
    container_name: rangerdanger-hmi-poller
    network_mode: "service:fuxa_hmi"
    command:
      - sh
      - -c
      - |
        # Busybox nc is included in alpine and supports -w. Send a raw
        # Modbus FC3 Read Holding Registers request (12-byte frame) to
        # the RTAC at 10.30.30.20:502 on a steady interval. No output
        # is needed; the goal is producing observable Modbus wire
        # traffic from the HMI container.
        MODBUS_FRAME='\x00\x01\x00\x00\x00\x06\x01\x03\x00\x00\x00\x0a'
        while true; do
          printf "$$MODBUS_FRAME" | nc -w 1 10.30.30.20 502 > /dev/null 2>&1 || true
          sleep 2
        done
    restart: unless-stopped
    depends_on:
      - fuxa_hmi
      - rtac_sim

  rtac_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: rtac-sim
    container_name: rangerdanger-rtac-sim
    hostname: rtac-sim
    cap_add:
      - NET_ADMIN
    # RTAC hardening sysctls — prevent the RTAC from ever acting as a
    # router or transit node between its multiple zone interfaces.
    # /proc/sys is read-only inside the container, so these must be set
    # via docker-compose sysctls: (namespaced network sysctls that Docker
    # applies at container creation).
    sysctls:
      net.ipv4.ip_forward: 0
      net.ipv4.conf.all.forwarding: 0
      net.ipv4.conf.default.forwarding: 0
      net.ipv4.conf.all.proxy_arp: 0
      net.ipv4.conf.default.proxy_arp: 0
      net.ipv4.conf.all.send_redirects: 0
      net.ipv4.conf.default.send_redirects: 0
      net.ipv4.conf.all.accept_redirects: 0
      net.ipv4.conf.default.accept_redirects: 0
      net.ipv4.conf.all.rp_filter: 1
      net.ipv4.conf.default.rp_filter: 1
    environment:
      - RELAY_SIM_HOST=relay-sim:8080
      - RECLOSER_SIM_HOST=recloser-sim:8080
      - REGULATOR_SIM_HOST=regulator-sim:8080
      - OPENDSS_SIM_HOST=opendss-sim:8080
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.20
      field_net:
        ipv4_address: 10.40.40.10
      physics_net:
        ipv4_address: 10.50.50.10
      mgmt_net:
        ipv4_address: 10.99.99.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # rtac waits for the field-device sims (Modbus/DNP3 polling
    # targets) to be healthy before it starts polling them, so
    # /api/state never returns half-initialised data.
    depends_on:
      firewall:
        condition: service_started
      relay_sim:
        condition: service_healthy
      recloser_sim:
        condition: service_healthy
      regulator_sim:
        condition: service_healthy
      capbank_sim:
        condition: service_healthy
      opendss_sim:
        condition: service_healthy

  openplc:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-openplc
    hostname: openplc
    cap_add:
      - NET_ADMIN
    # OpenPLC runs the substation automation overlay in
    # data/openplc/substation_automation.st — voltage regulation,
    # auto-reclose protection, alarm aggregation. The ladder logic
    # is a Modbus TCP client of the RTAC (10.30.30.20) and never
    # originates traffic to field devices directly. Single-homed
    # on ot_ops_net so it can't bypass the firewall the way a
    # field-leg would let it. Audit F-011.
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.30
      mgmt_net:
        ipv4_address: 10.99.99.30
    environment:
      - TZ=UTC
      - GATEWAY=10.30.30.2
    volumes:
      - ./data/openplc:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 4: Field Device Zone
  # Inter-zone traffic routes through containd (10.40.40.2)
  # ─────────────────────────────────────────────────────────────
  # Healthchecks below use busybox wget (built into alpine) to probe
  # /api/health on each sim's HTTP server. start_period=10s gives the
  # binary time to bind before unhealthy reports start counting.
  relay_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: relay-sim
    container_name: rangerdanger-relay-sim
    hostname: relay-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  recloser_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: recloser-sim
    container_name: rangerdanger-recloser-sim
    hostname: recloser-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.21
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  regulator_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: regulator-sim
    container_name: rangerdanger-regulator-sim
    hostname: regulator-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.22
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  capbank_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: capbank-sim
    container_name: rangerdanger-capbank-sim
    hostname: capbank-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.23
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  historian_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: historian-sim
    container_name: rangerdanger-historian-sim
    hostname: historian-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
      - RTAC_ENDPOINT=http://10.30.30.20:8080
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.40
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall
      - rtac_sim

  gps_sim:
    build:
      context: .
      dockerfile: services/Dockerfile
      target: gps-sim
    container_name: rangerdanger-gps-sim
    hostname: gps-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  # ─────────────────────────────────────────────────────────────
  # Zone 5: Process / Physics Zone (not firewalled)
  # ─────────────────────────────────────────────────────────────
  opendss_sim:
    build:
      context: .
      dockerfile: services/opendss-sim/Dockerfile
    container_name: rangerdanger-opendss-sim
    hostname: opendss-sim
    cap_add:
      - NET_ADMIN
    networks:
      physics_net:
        ipv4_address: 10.50.50.20
    # opendss-sim uses python:3.12-slim, not alpine, so no busybox wget.
    # python's urllib is always available — use it directly.
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/api/health',timeout=2).read(); sys.exit(0)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  # Management network — NOT captured by containd firewall
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.99.0/24
          gateway: 10.99.99.1
  # Zone 1: Enterprise
  enterprise_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
  # Zone 2: Vendor / Engineering
  vendor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
          gateway: 10.20.20.1
  # Zone 3: OT Operations
  ot_ops_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24
          gateway: 10.30.30.1
  # Zone 4: Field Devices
  field_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.40.0/24
          gateway: 10.40.40.1
  # Zone 5: Physics / Simulation (not firewalled)
  physics_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.50.0/24
          gateway: 10.50.50.1
