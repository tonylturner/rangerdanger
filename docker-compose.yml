name: rangerdanger

services:
  # containd NGFW - central gateway for all zone traffic
  firewall:
    image: containd:local
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      - CONTAIND_LAB_MODE=1
      - CONTAIND_ALLOWED_ORIGINS=http://localhost:8088
      - NGFW_ENGINE_URL=http://127.0.0.1:8081
      # Config persistence
      - NGFW_CONFIG_DB=/data/config.db
      # Dataplane - capture traffic on all interfaces, enable enforcement
      - NGFW_CAPTURE_IFACES=eth0,eth1,eth2,eth3
      - NGFW_ENFORCE_ENABLED=1
      # Auto-assign subnet mapping for RangerDanger networks
      - CONTAIND_AUTO_WAN_SUBNET=10.10.10.0/24
      - CONTAIND_AUTO_DMZ_SUBNET=10.20.20.0/24
      - CONTAIND_AUTO_LAN1_SUBNET=10.30.30.0/24
      - CONTAIND_AUTO_LAN2_SUBNET=10.40.40.0/24
    volumes:
      - ./data/firewall:/data
    ports:
      - "9080:8080"   # containd UI
      - "9443:8443"   # containd HTTPS
      - "2222:2222"   # SSH console
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.2
      it_net:
        ipv4_address: 10.10.10.2
      dmz_net:
        ipv4_address: 10.20.20.2
      ot_control_net:
        ipv4_address: 10.30.30.2
      ot_safety_net:
        ipv4_address: 10.40.40.2
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rangerdanger-backend
    environment:
      OTLAB_HTTP_PORT: 8080
      OTLAB_DB_PATH: /data/rangerdanger.db
      OTLAB_LAB_DEFINITIONS_PATH: /lab-definitions
      # Use management network IP to bypass firewall rules
      CONTAIND_API_URL: http://10.99.99.2:8080
      CONTAIND_JWT_SECRET: ${CONTAIND_JWT_SECRET:-rangerdanger-dev}
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.10
      it_net:
        ipv4_address: 10.10.10.10
      dmz_net:
        ipv4_address: 10.20.20.200
      ot_control_net:
        ipv4_address: 10.30.30.200
      ot_safety_net:
        ipv4_address: 10.40.40.200
    depends_on:
      - firewall

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rangerdanger-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      it_net:
        ipv4_address: 10.10.10.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
      - hmi_view
      - hmi_control
      - plc_process
    networks:
      it_net:
        ipv4_address: 10.10.10.3
      dmz_net:
        ipv4_address: 10.20.20.3
      ot_control_net:
        ipv4_address: 10.30.30.3

  # HMI View - Read-only HMI in DMZ (can monitor all PLCs including safety)
  hmi_view:
    image: frangoteam/fuxa:latest
    container_name: rangerdanger-hmi-view
    hostname: hmi-view
    networks:
      dmz_net:
        ipv4_address: 10.20.20.10
      ot_control_net:
        ipv4_address: 10.30.30.10
      ot_safety_net:
        ipv4_address: 10.40.40.10
    volumes:
      - ./data/fuxa_view_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_view_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_view_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped
    depends_on:
      - firewall

  # HMI Control - Full-control HMI in OT Control zone
  hmi_control:
    image: frangoteam/fuxa:latest
    container_name: rangerdanger-hmi-control
    hostname: hmi-control
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.11
    volumes:
      - ./data/fuxa_control_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_control_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_control_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped
    depends_on:
      - firewall

  # Engineering Workstation in DMZ
  ews:
    image: linuxserver/webtop:ubuntu-mate
    container_name: rangerdanger-ews
    hostname: ews
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    networks:
      dmz_net:
        ipv4_address: 10.20.20.50
    volumes:
      - ./data/ews_config:/config
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - firewall

  # Kali Pentest Box in IT network (full tools)
  kali_pentest:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: rangerdanger-kali
    hostname: kali-pentest
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      it_net:
        ipv4_address: 10.10.10.50
    volumes:
      - ./data/kali_home:/home/kali
    restart: unless-stopped
    depends_on:
      - firewall

  # Ubuntu Jump Box in DMZ - only host allowed to access OT Control
  ubuntu_jumpbox:
    image: linuxserver/webtop:ubuntu-xfce
    container_name: rangerdanger-jumpbox
    hostname: ubuntu-jumpbox
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    cap_add:
      - NET_ADMIN
    networks:
      dmz_net:
        ipv4_address: 10.20.20.60
    volumes:
      - ./data/jumpbox_config:/config
      - ./data/vpn_profiles:/vpn:ro
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-101: Process Control (Separator, Inlet Pump, Valves)
  plc_process:
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-plc-process
    hostname: plc-101
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.20
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_process:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-201: Compressor Control (Gas Compressor)
  plc_compressor:
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-plc-compressor
    hostname: plc-201
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.21
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_compressor:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # SIS-301: Safety Instrumented System (ESD, Safety Interlocks)
  plc_safety:
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-plc-safety
    hostname: sis-301
    networks:
      ot_safety_net:
        ipv4_address: 10.40.40.20
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_safety:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-401: Utilities (Water Treatment, Tank Farm)
  plc_utilities:
    build:
      context: .
      dockerfile: Dockerfile.openplc
    container_name: rangerdanger-plc-utilities
    hostname: plc-401
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.22
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_utilities:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # Lab tools containers - full OS with networking tools for testing/training
  tools_it:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-it
    hostname: tools-it
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      it_net:
        ipv4_address: 10.10.10.100
    depends_on:
      - firewall
    restart: unless-stopped

  tools_dmz:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-dmz
    hostname: tools-dmz
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      dmz_net:
        ipv4_address: 10.20.20.100
    depends_on:
      - firewall
    restart: unless-stopped

  tools_ot:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-ot
    hostname: tools-ot
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.100
    depends_on:
      - firewall
    restart: unless-stopped

networks:
  # Management network - NOT captured by containd firewall
  # Used for RangerDanger app <-> containd API communication
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.99.0/24
          gateway: 10.99.99.1
  it_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
  dmz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
          gateway: 10.20.20.1
  ot_control_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24
          gateway: 10.30.30.1
  ot_safety_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.40.0/24
          gateway: 10.40.40.1
