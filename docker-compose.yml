name: rangerdanger

services:
  # containd NGFW - central gateway for all zone traffic
  firewall:
    image: ghcr.io/tturner/containd:latest
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
    volumes:
      - ./data/firewall:/data
    ports:
      - "9080:8080"   # containd UI
      - "9443:8443"   # containd HTTPS
      - "2222:2222"   # SSH console
    networks:
      wan:
        ipv4_address: 192.168.240.2
      dmz:
        ipv4_address: 192.168.241.2
      ot_control:
        ipv4_address: 192.168.242.2
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rangerdanger-backend
    environment:
      OTLAB_HTTP_PORT: 8080
      OTLAB_DB_PATH: /data/rangerdanger.db
      OTLAB_LAB_DEFINITIONS_PATH: /lab-definitions
      CONTAIND_API_URL: http://firewall:8080
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      wan:
        ipv4_address: 192.168.240.10
    depends_on:
      - firewall

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rangerdanger-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      wan:
        ipv4_address: 192.168.240.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
    networks:
      wan:
        ipv4_address: 192.168.240.3

  # ICS Lab Containers - wired through containd firewall
  hmi_scada:
    image: frangoteam/fuxa:latest
    container_name: rangerdanger-hmi
    networks:
      dmz:
        ipv4_address: 192.168.241.10
      ot_control:
        ipv4_address: 192.168.242.10
    volumes:
      - ./data/fuxa_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped
    depends_on:
      - firewall

  plc_trainer:
    image: tuttas/openplc_v3:latest
    container_name: rangerdanger-plc
    networks:
      ot_control:
        ipv4_address: 192.168.242.20
    environment:
      - TZ=UTC
    restart: unless-stopped
    depends_on:
      - firewall

networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.240.0/24
          gateway: 192.168.240.1
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.241.0/24
          gateway: 192.168.241.1
  ot_control:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.242.0/24
          gateway: 192.168.242.1
