name: rangerdanger

services:
  # containd NGFW - central gateway for all zone traffic
  firewall:
    image: containd:local
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      - CONTAIND_ALLOWED_ORIGINS=http://localhost:8088
      - NGFW_ENGINE_URL=http://127.0.0.1:8081
      # Config persistence
      - NGFW_CONFIG_DB=/data/config.db
      # Dataplane - capture traffic on all interfaces, enable enforcement
      - NGFW_CAPTURE_IFACES=eth0,eth1,eth2,eth3
      - NGFW_ENFORCE_ENABLED=1
      # Auto-assign subnet mapping for RangerDanger networks
      - CONTAIND_AUTO_WAN_SUBNET=10.10.10.0/24
      - CONTAIND_AUTO_DMZ_SUBNET=10.20.20.0/24
      - CONTAIND_AUTO_LAN1_SUBNET=10.30.30.0/24
      - CONTAIND_AUTO_LAN2_SUBNET=10.40.40.0/24
    volumes:
      - ./data/firewall:/data
    ports:
      - "9080:8080"   # containd UI
      - "9443:8443"   # containd HTTPS
      - "2222:2222"   # SSH console
    networks:
      it_net:
        ipv4_address: 10.10.10.2
      dmz_net:
        ipv4_address: 10.20.20.2
      ot_control_net:
        ipv4_address: 10.30.30.2
      ot_safety_net:
        ipv4_address: 10.40.40.2
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rangerdanger-backend
    environment:
      OTLAB_HTTP_PORT: 8080
      OTLAB_DB_PATH: /data/rangerdanger.db
      OTLAB_LAB_DEFINITIONS_PATH: /lab-definitions
      CONTAIND_API_URL: http://firewall:8080
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      it_net:
        ipv4_address: 10.10.10.10
      dmz_net:
        ipv4_address: 10.20.20.200
      ot_control_net:
        ipv4_address: 10.30.30.200
      ot_safety_net:
        ipv4_address: 10.40.40.200
    depends_on:
      - firewall

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rangerdanger-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      it_net:
        ipv4_address: 10.10.10.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
      - hmi_scada
      - plc_process
    networks:
      it_net:
        ipv4_address: 10.10.10.3
      dmz_net:
        ipv4_address: 10.20.20.3
      ot_control_net:
        ipv4_address: 10.30.30.3

  # ICS Lab Containers - wired through containd firewall
  hmi_scada:
    image: frangoteam/fuxa:latest
    container_name: rangerdanger-hmi
    networks:
      dmz_net:
        ipv4_address: 10.20.20.10
      ot_control_net:
        ipv4_address: 10.30.30.10
    volumes:
      - ./data/fuxa_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_logs:/usr/src/app/FUXA/server/_logs
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-101: Process Control (Separator, Inlet Pump, Valves)
  plc_process:
    image: tuttas/openplc_v3:latest
    container_name: rangerdanger-plc-process
    hostname: plc-101
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.20
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_process:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-201: Compressor Control (Gas Compressor)
  plc_compressor:
    image: tuttas/openplc_v3:latest
    container_name: rangerdanger-plc-compressor
    hostname: plc-201
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.21
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_compressor:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # SIS-301: Safety Instrumented System (ESD, Safety Interlocks)
  plc_safety:
    image: tuttas/openplc_v3:latest
    container_name: rangerdanger-plc-safety
    hostname: sis-301
    networks:
      ot_safety_net:
        ipv4_address: 10.40.40.20
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_safety:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # PLC-401: Utilities (Water Treatment, Tank Farm)
  plc_utilities:
    image: tuttas/openplc_v3:latest
    container_name: rangerdanger-plc-utilities
    hostname: plc-401
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.22
    environment:
      - TZ=UTC
    volumes:
      - ./data/plc_utilities:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  # Lab tools containers - full OS with networking tools for testing/training
  tools_it:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-it
    hostname: tools-it
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      it_net:
        ipv4_address: 10.10.10.100
    depends_on:
      - firewall
    restart: unless-stopped

  tools_dmz:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-dmz
    hostname: tools-dmz
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      dmz_net:
        ipv4_address: 10.20.20.100
    depends_on:
      - firewall
    restart: unless-stopped

  tools_ot:
    build:
      context: .
      dockerfile: Dockerfile.labtools
    container_name: rangerdanger-tools-ot
    hostname: tools-ot
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      ot_control_net:
        ipv4_address: 10.30.30.100
    depends_on:
      - firewall
    restart: unless-stopped

networks:
  it_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
  dmz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
          gateway: 10.20.20.1
  ot_control_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24
          gateway: 10.30.30.1
  ot_safety_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.40.0/24
          gateway: 10.40.40.1
