name: rangerdanger

# Release-flavor compose. Pulls pre-built images from GHCR instead of
# building from source. Use this if you don't have a Go/Node/Docker
# toolchain and just want to run the lab.
#
# Usage:
#
#   # default — uses :latest images
#   docker compose -f docker-compose.release.yml up -d
#
#   # pin to a specific release
#   VERSION=v0.1.0 docker compose -f docker-compose.release.yml up -d
#
# Bind-mount sources (lab-definitions/, proxy/nginx.conf, scripts/,
# data/ directories) still come from the cloned repo. Either git
# clone the project alongside this file, or drop the release tarball
# attached to the GitHub release into the same working directory.
#
# This file is kept in lockstep with docker-compose.yml. If you
# modify one, mirror the change to the other.

services:
  firewall:
    # See docker-compose.yml — containd tracks :latest by design.
    image: ghcr.io/tonylturner/containd:latest
    container_name: rangerdanger-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_TIME
    environment:
      - CONTAIND_MODE=all
      - CONTAIND_JWT_SECRET=${CONTAIND_JWT_SECRET:-rangerdanger-dev}
      - CONTAIND_LAB_MODE=1
      - CONTAIND_SSH_SHELL_MODE=linux
      - CONTAIND_ALLOWED_ORIGINS=http://localhost:8088
      - CONTAIND_ENGINE_URL=http://127.0.0.1:8081
      - CONTAIND_CONFIG_DB=/data/config.db
      # CONTAIND_CAPTURE_IFACES intentionally unset; see
      # docker-compose.yml for rationale (containd's PCAP path doesn't
      # autobind zone names, backend uses `tcpdump -i any` fallback).
      - CONTAIND_ENFORCE_ENABLED=1
      - CONTAIND_AUTO_WAN_SUBNET=10.10.10.0/24
      - CONTAIND_AUTO_DMZ_SUBNET=10.20.20.0/24
      - CONTAIND_AUTO_LAN1_SUBNET=10.30.30.0/24
      - CONTAIND_AUTO_LAN2_SUBNET=10.40.40.0/24
      # Required so backend↔firewall API calls survive the input chain
      # under the policy. Was missing in this file (release-image users
      # would hit 502 on apply); keeping it in lockstep with the source
      # compose now.
      - CONTAIND_AUTO_LAN3_SUBNET=10.99.99.0/24
    volumes:
      - ./data/firewall:/data
    ports:
      - "127.0.0.1:9080:8080"
      - "127.0.0.1:9443:8443"
      - "127.0.0.1:2222:2222"
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.2
      enterprise_net:
        ipv4_address: 10.10.10.2
      vendor_net:
        ipv4_address: 10.20.20.2
      ot_ops_net:
        ipv4_address: 10.30.30.2
      field_net:
        ipv4_address: 10.40.40.2
    restart: unless-stopped

  backend:
    image: ghcr.io/tonylturner/rangerdanger-backend:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-backend
    environment:
      RANGERDANGER_HTTP_PORT: 8080
      RANGERDANGER_DB_PATH: /data/rangerdanger.db
      RANGERDANGER_LAB_DEFINITIONS_PATH: /lab-definitions
      RANGERDANGER_CONTAIND_API_URL: http://10.99.99.2:8080
      RANGERDANGER_CONTAIND_CONFIG_PATH: /lab-definitions/firewall/substation-weak.json
      CONTAIND_JWT_SECRET: ${CONTAIND_JWT_SECRET:-rangerdanger-dev}
    volumes:
      - ./backend/data:/data
      - ./lab-definitions:/lab-definitions:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.10
    depends_on:
      firewall:
        condition: service_started
      rtac_sim:
        condition: service_healthy

  frontend:
    image: ghcr.io/tonylturner/rangerdanger-frontend:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.11

  proxy:
    image: nginx:1.27-alpine
    container_name: rangerdanger-proxy
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      - firewall
      - backend
      - frontend
    networks:
      mgmt_net:
        ipv4_address: 10.99.99.3

  corp_ws:
    image: linuxserver/webtop:ubuntu-mate@sha256:39afefa41a46fefe3ae910ccf5861933ead54e70d935f1695e70b0627f1b5666
    container_name: rangerdanger-corp-ws
    hostname: corp-ws
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.10.10.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
      - ./scripts/strip-noisy-profile.sh:/custom-cont-init.d/30-strip-noisy-profile.sh:ro
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.10
      mgmt_net:
        ipv4_address: 10.99.99.70
    shm_size: "1gb"
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  kali:
    image: ghcr.io/tonylturner/rangerdanger-kali:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-kali
    hostname: kali
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - GATEWAY=10.10.10.2
    networks:
      enterprise_net:
        ipv4_address: 10.10.10.50
    volumes:
      - ./data/kali_home:/home/kali
      - ./data/firewall/captures:/home/kali/pcaps:ro
      - ./scripts/set-gateway.sh:/usr/local/bin/set-gateway.sh:ro
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      - firewall

  vendor_jump:
    image: ghcr.io/tonylturner/rangerdanger-vendor-jump:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-vendor-jump
    hostname: vendor-jump
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.10
      mgmt_net:
        ipv4_address: 10.99.99.60
    shm_size: "1gb"
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  eng_workstation:
    image: ghcr.io/tonylturner/rangerdanger-eng-ws:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-eng-ws
    hostname: eng-workstation
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - GATEWAY=10.20.20.2
    volumes:
      - ./scripts/set-gateway.sh:/custom-cont-init.d/10-set-gateway.sh:ro
      - ./scripts/strip-noisy-profile.sh:/custom-cont-init.d/30-strip-noisy-profile.sh:ro
      - ./data/firewall/captures:/home/abc/pcaps:ro
    networks:
      vendor_net:
        ipv4_address: 10.20.20.20
      mgmt_net:
        ipv4_address: 10.99.99.61
    shm_size: "1gb"
    mem_limit: 2g
    restart: unless-stopped
    depends_on:
      - firewall

  fuxa_hmi:
    image: frangoteam/fuxa:latest@sha256:025e693971f72de9fabf2c811296f9dca3854dc501cb309b02302c7b94717d0f
    container_name: rangerdanger-fuxa-hmi
    hostname: fuxa-hmi
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.10
      mgmt_net:
        ipv4_address: 10.99.99.50
    volumes:
      - ./data/fuxa_hmi_appdata:/usr/src/app/FUXA/server/_appdata
      - ./data/fuxa_hmi_db:/usr/src/app/FUXA/server/_db
      - ./data/fuxa_hmi_logs:/usr/src/app/FUXA/server/_logs
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      - firewall

  hmi_poller:
    image: alpine:3.21
    container_name: rangerdanger-hmi-poller
    network_mode: "service:fuxa_hmi"
    command:
      - sh
      - -c
      - |
        MODBUS_FRAME='\x00\x01\x00\x00\x00\x06\x01\x03\x00\x00\x00\x0a'
        while true; do
          printf "$$MODBUS_FRAME" | nc -w 1 10.30.30.20 502 > /dev/null 2>&1 || true
          sleep 2
        done
    restart: unless-stopped
    depends_on:
      - fuxa_hmi
      - rtac_sim

  rtac_sim:
    image: ghcr.io/tonylturner/rangerdanger-rtac-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-rtac-sim
    hostname: rtac-sim
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: 0
      net.ipv4.conf.all.forwarding: 0
      net.ipv4.conf.default.forwarding: 0
      net.ipv4.conf.all.proxy_arp: 0
      net.ipv4.conf.default.proxy_arp: 0
      net.ipv4.conf.all.send_redirects: 0
      net.ipv4.conf.default.send_redirects: 0
      net.ipv4.conf.all.accept_redirects: 0
      net.ipv4.conf.default.accept_redirects: 0
      net.ipv4.conf.all.rp_filter: 1
      net.ipv4.conf.default.rp_filter: 1
    environment:
      - RELAY_SIM_HOST=relay-sim:8080
      - RECLOSER_SIM_HOST=recloser-sim:8080
      - REGULATOR_SIM_HOST=regulator-sim:8080
      - OPENDSS_SIM_HOST=opendss-sim:8080
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.20
      field_net:
        ipv4_address: 10.40.40.10
      physics_net:
        ipv4_address: 10.50.50.10
      mgmt_net:
        ipv4_address: 10.99.99.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      firewall:
        condition: service_started
      relay_sim:
        condition: service_healthy
      recloser_sim:
        condition: service_healthy
      regulator_sim:
        condition: service_healthy
      capbank_sim:
        condition: service_healthy
      opendss_sim:
        condition: service_healthy

  openplc:
    platform: linux/amd64
    image: ghcr.io/tonylturner/rangerdanger-openplc:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-openplc
    hostname: openplc
    cap_add:
      - NET_ADMIN
    # Single-homed on ot_ops_net — the ladder logic is a Modbus
    # client of the RTAC and never originates field-device traffic.
    # Removing the field_net leg eliminates the firewall-bypass
    # surface that historian-sim probes used to demonstrate. Audit
    # F-011 (paired with docker-compose.yml).
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.30
      mgmt_net:
        ipv4_address: 10.99.99.30
    environment:
      - TZ=UTC
      - GATEWAY=10.30.30.2
    volumes:
      - ./data/openplc:/workdir
    restart: unless-stopped
    depends_on:
      - firewall

  relay_sim:
    image: ghcr.io/tonylturner/rangerdanger-relay-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-relay-sim
    hostname: relay-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  recloser_sim:
    image: ghcr.io/tonylturner/rangerdanger-recloser-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-recloser-sim
    hostname: recloser-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.21
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  regulator_sim:
    image: ghcr.io/tonylturner/rangerdanger-regulator-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-regulator-sim
    hostname: regulator-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.22
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  capbank_sim:
    image: ghcr.io/tonylturner/rangerdanger-capbank-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-capbank-sim
    hostname: capbank-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.40.40.2
    networks:
      field_net:
        ipv4_address: 10.40.40.23
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  historian_sim:
    image: ghcr.io/tonylturner/rangerdanger-historian-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-historian-sim
    hostname: historian-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
      - RTAC_ENDPOINT=http://10.30.30.20:8080
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.40
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall
      - rtac_sim

  gps_sim:
    image: ghcr.io/tonylturner/rangerdanger-gps-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-gps-sim
    hostname: gps-sim
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY=10.30.30.2
    networks:
      ot_ops_net:
        ipv4_address: 10.30.30.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - firewall

  opendss_sim:
    image: ghcr.io/tonylturner/rangerdanger-opendss-sim:${VERSION:-latest}
    pull_policy: always
    container_name: rangerdanger-opendss-sim
    hostname: opendss-sim
    cap_add:
      - NET_ADMIN
    networks:
      physics_net:
        ipv4_address: 10.50.50.20
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/api/health',timeout=2).read(); sys.exit(0)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  mgmt_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.99.0/24
          gateway: 10.99.99.1
  enterprise_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1
  vendor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
          gateway: 10.20.20.1
  ot_ops_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.30.0/24
          gateway: 10.30.30.1
  field_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.40.0/24
          gateway: 10.40.40.1
  physics_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.50.0/24
          gateway: 10.50.50.1
